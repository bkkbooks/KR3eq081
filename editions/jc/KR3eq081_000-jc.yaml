自述腹膜炎病者百人中至少要死去九十九人今見西醫張廷安君之大作對於此症之療治不過是敷衍塞責井未有十分把握余心熱如火不敢自秘謹以中醫對於此症穩妥療治方法貢獻於西醫諸君之前諸君學此乖去就可傲視儕輩自稱發明大家博得博士頭銜矣特先將張君原稿錄下慢性腹膜炎原因大多為結核性者即結核菌侵入腹膜所生細菌侵入門戶為血管淋巴管而入腹膜近鄰臟器有結核性疾惠往往可蔓延及之幼兒與青年易患男女無關係解剖因腹膜變化者有粟粒結核腹膜呈粒狀塊狀或成形性腹膜炎解剖上有纖維性滲出液腹膜腸胃脾淋巴腺在腹腔內各臟器互相愈著且腹壁中亦起愈著滲出液凝固後變成結締質成塊狀物而如瘤狀此腫瘍物稱曰假性腫瘍如程度高腹膜腔全部完全愈著一塊腹水性腹膜炎解剖後腹膜外炎症如肋膜心囊類漿液膜亦生炎症亦名漿液膜性結核症狀成形性腹膜炎腹部同等膨滿臍部呈頂狀全腹壁硬固痛少有許多硬固之大小結節其次為壓痛而不著自覺痛亦不著嘔反嘔逆普通亦無大便都秘結腹水性與鬱血性腹水相仿液體多不流動腹部觸診如診查則大網膜厚而緊縮胃下部如有橫腫瘍然腸間部亦以愈著性結締組織增殖而有瘤及塊狀物索狀可視見即假性腫瘍全身熱無至於靛藍反應結核性者通常不現肝脾腫大或縮小者本症有與肋膜炎心囊炎合併或與關節炎腦膜炎併發者但甚少稱為結核性多發性滲液腹膜炎診斷腹部硬固結節易診斷如為腹水性腹膜炎與腹水不能鑒別可行胸廓背部精查有無肋膜炎之痕跡有痕疑及結核性腹膜炎矣經過慢性轉歸大都不良然比他部結核為良常為特續性或一時性的治癒療法注重滋養空氣新鮮適宜運動內服藥今已淘汰故刪校者有多量腹水者可行穿腹術抽出本病腹壁與腸管常愈著行腹穿術時應注意現時行外科手術可治療本病此症在我們中醫可以有兩種療治之法輕者用五苓散方重者用十棗湯方確有把握傷寒論俱在可一查也中醫與科學劉仲邁君整理國醫學之我見一篇對於中醫對於科學說理均鞭劈入裏爽快之極其晟精警最切當處莫如所謂科學化者在以現代科學之資料以國醫學會全體診斷之定理定義證明國醫之原理凡一種學術有定理定義具論理學演繹歸納為程式而研究者即為科學非混合西說自失故步附會於聲光化電者乃為科學也此種見理真確遠非一般時髦人物自命為新中醫者所得望其項背皮販西說隱戤西醫響牌子不僅無恥對於中醫對於西醫對於科學何嘗有絲毫之認識晚近士習好虛名而忽實務對於學術亦喜東抄西襲攘為己有而一究其實絕無心得新中醫之所謂科學者抄襲西醫之說耳我謂分經論治即是科學對症發藥即是科學今得劉君之論益信我言之不謬論咳嗽謦音讀頃欬叫做欬欬的樣子提起來很是怕人肺氣上而不下逆而不收衝擊膈咽弄得喉中淫淫如癢習習如梗謦欬沖喉而出這就是欬欬得厲害的他那樣子是續續不已連連不止坐臥都不能安語言都不能竟動引百骸聲聞四近欬嗽這一症有外感之欬有雜病之欬外感有風寒風溫之殊雜病有五臟六腑之異只要看唐人王燾著的外台秘要把欬分做十種第一種叫做風欬其狀是要講話時為了欬言不得終第二種叫做寒欬為了飲了冷水或是吃了寒性的東西釀成了欬症第三種叫做支飲其狀心下堅滿欬的時光引動四肢都痛脈反見遲第四種叫做肝欬欬的時光兩脅下都被牽引作痛第五種叫做心欬欬而吐血就為引動了少陰心之詠呢第六種叫做脾欬欬的時光涎從口出續續不止下引少腹第七種叫做肺欬欬的時光引動頸項頻吐涎沫不止第八種叫做腎欬其狀是耳聾無所聞腰部及臍中都被引動第九種叫做膽欬欬的時光就要引動到頭痛口苦第十種是厥陰欬欬的時光就要引動舌本欬今通咳校者這十種欬病病源不一病狀不同那治法更是各有其法各有其方決不能張冠李戴移東湊西我要請教西醫你們研究微菌為欬之主困我們中醫把欬在唐朝時代已經分做十種現在你們把欬菌分有幾種呢倘不能分做幾種那麼寒欬熱欬肺欬腎欬同用一種藥治療豈不是糟了麼你們已經發明微菌請你們繼續不斷努力繼續不斷研究再把此欬菌分別出種類來那才好呢倘說外人不曾發明中國人便不敢另有主張那是奴隸性已經鑽筋入骨不可救藥了越是外人不曾發明越要研究越要努力人爭一口氣佛爭一炷香能發外人所未發明外人所未明請諸位西醫先生依據了中醫書成一個驚人的大發明家我現在再把清賢高士宗先生的欬論介紹出來高先生說俗語諸病易治咳嗽難醫咳嗽所以難醫就為咳嗽的根由甚多不止於肺現在遇有咳嗽就說是肺病隨用發散消痰清涼潤肺之藥藥日投而咳日甚有病之經詠未蒙其治無病之經脈徒受其殃到了一個月不愈那就弱證將成兩月不愈那就弱證已成延至百日身命雖未告殂而此人已歸不治之證矣素問欬論云五臟六腑皆令人欬非獨肺也是以咳病初起有起於腎者有起於肝者有起於睥者有起於心包者有起於胃者有起於上中二焦者有起於肺者治當察其源察源之法在乎審症若喉癢而咳是火熱之氣上衝也火欲發而煙先起煙起沖喉故癢而咳又有傷風初起喉中一點作癢咽熱飲則少蘇此寒凝上焦咽喉不利而咳也或寒或熱當治其上焦其有胸中作癢此中焦津血內虛咽喉不利而咳也或寒或熱法當和其中焦此喉癢之咳而屬於上中二焦也若氣上衝而咳是肝腎虛也夫心肺居上肝腎居下腎為水臟合膀胱水腑隨太陽之氣出皮毛以合肺肺者天也水天一氣運行不息今腎臟內虛不能台水腑而行皮毛則腎氣從中土以衝上衝上則咳此上衝之咳而屬於腎也又肝藏血而衝任血海之血肝所主也其血則熱內充膚澹澹皮毛臥則內歸於肝今肝臟內虛不合衝任之血出於膚腠則肝氣從心包以上衝上衝則咳此上衝之咳而屬於肝也又有先吐血後咳嗽者吐血則肝臟內損而心包亦虛致心包之火上克肺金心包主血脈血脈虛夜則發熱日則咳嗽甚則日夜皆咳皆熱此為虛勞咳嗽先傷其血後傷其氣陰陽並竭氣血皆虧服滋陰之藥則相宜服溫補之藥則不宜如是之咳百無一生此咳之屬於心包也又手太陰屬肺金天也足太陰屬睥土地也在運氣則土生金臟腑則天地交今睥土內虛土不勝木致痰涎上湧先脾病而地氣不升因而肺病為天氣不降咳必兼喘此咳之屬於脾屬於肺也又胃為水穀之海氣屬陽明足陽明主胃手陽明主大腸陽明之上燥氣治之其氣下行今陽明之氣不從下行或過於燥而火炎或失其燥而停飲咳出黃痰胃燥熱也痰飲內積胃虛寒也此為腸胃之咳咳雖不愈不即殞軀治宜消痰散飲此欬之屬於胃也夫痰聚於胃必從欬出故效論云聚胃關肺使不知咳嗽之源但與清肺清痰疏風利氣為治適害己也處有傷風咳嗽初起便服清散藥不能取效者此為虛傷風也最忌寒涼發散投劑得宜可以漸愈又有冬時腎氣不足水不生木致肝氣內虛洞涕不收鼻竅不利亦為虛傷風亦忌發散投劑得宜至春和凍解洞涕始收鼻竅始利咳嗽大略其義如此得其意而引伸之其庶幾乎高士宗先生欬論分做五臟六腑試問微菌一物能否分別出五臟六腑肺有肺之菌肝有肝之菌胃有胃之菌腸有腸之菌凡是一種學問辨論愈細愈精何況是關係人類性命出入之醫學倘然不別臟腑不分寒熱不辨虛實只以籠統之一種微菌傲然自得其亦可以已乎論冬溫冬溫一症與他種溫病不同他種溫病多由感受時令之邪感而即病冬溫雖亦關於時令而其病之來並非暴感平時潛伏甚深值冬時氣候寒暖失常稍有外感一觸即發暴感之邪引動潛伏之邪內應外合一發不可收拾猶之外寇臨境伏莽四起治外寇猶易治伏莽最難既不可表又不可攻汗吐下三法皆不可用良莠同疇賢奸雜處治到冬溫證須胸有成竹不激不隨一面清其內熱保其陰液一面用輕清流動之品引邪外出務使邪去而正不傷昔賢葉天士王孟英皆是治溫聖手吾輩可奉為準繩者也今年冬時氣候過暖冬溫證特多深願病者認識病性毋求急效而致大誤也記中醫友聲社程君迪仁俞君同芳感於海上之學術團體尤其是中醫界都注意在會字上不注意在學字上於學術前途似乎少有益處於是欲組織一專門在學字上做功夫的純粹學術團體商之士諤不禁雀躍贊成遂定名曰中醫友聲社社中組織絕無階級社員一律平等遇有病症之疑難者公開討論各憑經驗各據學識反復駁詰必使討論之問題得徹底而始已社員對於病者之診治望聞問切不厭求詳視人慘苦痛如身受必求得病源之所在然後處方稍有疑義即向社中提出討論以求學術上之進步每日派員電臺播音以中醫之常識貢獻於社會租定大世界中研電臺在下午六時四十五分鐘起至七時三十分派出代表三人輪流演講程迪仁講腸胃病俞同芳講婦女病士諤則講醫學顧問大全每人擔任五日每月值講兩次風雨不更也社員和衷共濟每越五日一敘不談政治不談經濟專在學術上做工夫此則吾社同仁差堪自慰者也中醫條例之與中醫中醫條例國民政府已於二十五年一月二十二日公佈矣海上國醫團體歡欣鼓舞已由上海市國醫分館領導聯席開會慶祝從此中醫得法律上之保障大家可以安居樂業穩如泰山安如磐石矣惟是士諤私意以為吾中醫之存在自有其存在之真價值在決非外力所能摧殘所能動搖所能破壞本草所釋之藥性傷寒論所詳之脈證所定之方治百試百驗千試千驗萬試萬驗五千年來早已深入人心故吾儕今日自當紹述先德精心研究仲景之書從有字處看到無字處平脈辨證探本窮源以武進鄒潤庵本經疏證為研究方法處處腳踏實地字字皆有來歷不矜奇不立異大中至正必以實用為歸吾中醫而能如是則他邦醫者不能治之病吾中醫無不能醫吾中醫之聲譽中醫之治績必播滿世界吾知世界各邦必將盡棄其固有之學而學吾中醫也勉之哉中醫同道談談劉釋傷寒論瀏陽劉仲邁傷寒雜病論議疏仲邁對於傷寒頗有功夫非好出風頭之作家可比劉氏最重脈象凡本論條文脈象不詳者注中必一一為之補出本論條文有難解處劉竟為之刪改補充而處處托之秘傳古本較之柯韻伯之勇敢大膽直承相長遠矣本論有證無方處劉竟為之一一補出其所補之方或移自金匱或竟自撰本論原方亦多增損惟所補之方較之舒馳遠為妥論暑論溫仿本論筆法偽造多條一一托之秘傳古本余謂此書乃劉氏之傷寒論非仲景之傷寒論因其處處印定後人眼目大非仲景圓機活法原旨也讀仲景書必須法武進鄒潤庵先生之精研始識仲景真面目此外理論多類蛇足吾見如是敢質諸海內學者海外的國醫在美治癒沉屙向不被外人所重視的中醫近來在美國漸漸地有人注意了原因是旅美的華僑雖盡有生活習慣完全西方化的但患了病不愛求西醫診治而服中國藥的還是很多所以在紐約波士頓芝加哥三藩市等地華僑密集之所有不少國醫寄居在那裏此輩國醫因沒有外人求治所以美國當局沒有規定他們登記註冊的條例至於現在有多少國醫在美開業自然也不得而知但據說在美國四十八個州中至少當在一百至一百三十人之間有的是專以治病為業的但至少有三分之二是僑美的商人行醫不過是一種副業而已所以診費也至不一律有的每次門診收費美金五元最低的是一元但也有施診的藥房大率都由此輩醫生兼營的但也有不備藥房而病人須將藥方送到別位兼營藥房的醫生處配合的三藩市有一位美國人駱賓生害著胃病很是劇烈經各地的名醫診治病勢卻有增無減到了去年春間病得幾乎不能工作了屢次想自殺駱賓生有一華友偶然和他談起一位叔父在芝加哥經商的精通醫理勸他新往求診駱賓生起初還是不信後來經那華友一再慫恿只得懷著萬一的希望前往一試經該國醫悉心診治之後配了若干植物質的藥材所煎成的苦澀藥水以及灰黑色而粗糙的丸藥服了一星期又換了一種黑褐色的丸藥又過了一星期駱賓生的食欲大增體重也增加了十四磅病竟霍然而愈了還有一位三藩市人查理斯患神經衰弱症也是百藥罔效一天偶然想起了一位曾有一面之雅的中醫於是登門求治這位中醫每天上午十時和下午十時給按摩一次同時還給與一種藥汁令每天服用一次這麼樣的過了十天病勢大減一個月後完全痊癒了為了這兩件事實的表現有幾家報紙特著文加以評論於是紐約和三藩市有幾位醫學家紛紛去覓取這種治癒胃病和神經衰弱的藥汁與丸藥加以化驗而研究但其結果卻未曾發現有何特殊性質的成分因此有若干醫學家特地輾轉托人向這二位醫生乞取配合成為那種藥汁與丸藥的原藥再加化驗而同時各醫學家和藥物學家都紛紛地研究華藥因有些草根樹皮中所含的物質勝於礦物質的藥料這一層已為彼邦的醫藥界所承認了朱英士諤按中醫與西醫學術之出發點不同療治之手段不同中醫注重六經注重三焦注重陰陽互根西醫不知也中醫療治重在處方之組織不重在藥性之溫涼在以個性各異之藥合於一爐而煮之成藥使直抵病所西醫以一藥拆成十餘種成分而明其用且中醫治病不但因病而異因人而異因病之環境有種種治法遂亦有種種西醫欲以呆板之法化驗之猶之刻舟求劍守株待兔胡可得也傷寒論讀法傷寒論下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微知無大熱者乾薑附子湯主之解之者每多囫圇吞棗夫曰下之後出未下之前必有裏證無疑曰復發汗則未汗之前必有表證無疑論病情決無先見裏證後見表證之理則最初之病必先有表復有裏也仲景表裏皆病必先治其表表解乃可攻裏俗醫不循先後緩急之法動手便錯致成壞證晝日煩躁不得眠夜而安靜病人陽氣衰做已極藉晝日之天陽始得為煩為躁一入夜間陰分用事雖欲求其煩求其躁已不可得此為純陰無陽之病象曰不嘔不渴無表證此何故耶曰嘔為少陽見證本論曰嘔而發熱者柴胡湯證具曰不嘔表明無少陽證也渴為陽明見證本論曰渴者屬陽明也曰不渴表明無陽明證也曰無表證表明無太陽證也昔有人搖得小會收銀三十兩恐人盜去屢藏不妥忽思藏諸檻下定無人知藏畢念對門鄰人有阿二者最善盜須防之乃貼簽其上書曰下無白銀三十兩以謂莫妥於此矣未幾阿二睹簽掘地盜之去易書其簽日對門阿二不曾偷此雖寓言可知仲景之不嘔不渴無表證決不能囫圇吞棗隨便念過假使有嘔有渴有表證便當別求治法脈沉為無陽脈微為氣不足假使身有大熱又當別求治法身無大熱陽衰顯然故以乾薑生附子急救其陽也凡傷寒論條文皆當知如是讀鄒注傷寒論仲景傷寒論注釋者自成無己以來計有一百三十餘家諸家當命筆之始無不自謂畢世窮研獨得其秘盡斥前人之安自詡見理之真但是吾人今日視之諸家之紛呶正如公說公有理婆說婆有理各具一理各備一說吾人亦不過姑妄聽之而已諸家中能直抉仲景之奧者只武進鄒潤庵先生一人頗鄒先生之傷寒倫通解四卷傷寒金匱方解六卷當世不少概見大為遺憾余服膺先生三十年來拳拳如一日自恨吾生也晚未獲親炙先生門牆因諸人之釋傷寒如宋儒之說理標本中見六氣勝得樞饑變化滿紙都是空談治病絕無用處獨先生之釋傷寒如漢儒之說經全在脈證上注意無一詞半語空話字字皆有來歷句句皆歸實用吾知懸諸國門千金決不能易其一字故特於本經疏證中尋出一鱗一爪集刊本林顏曰鄒注傷寒論集吾知治傷寒學者必與余有同好也手足厥寒脈細欲絕者當歸四逆湯主之若其人內有久寒者宜當歸四逆湯加吳茱萸生薑湯主之陰邪橫及四肢於理宜行薑附乃僅用生薑吳茱萸生薑吳茱萸豈能代乾薑附子耶原人身不外陰陽邪氣亦不外陰陽病發於陰者必客於腹中腹中以肝為都會肝者體陰用陽故雖因內有久寒至手足厥逆脈細欲絕仍不能無消渴與心中疼熱吳茱萸降在上之熱以就下生薑散在下之寒而使之橫達不然熱就上為咳吐膿血寒就下為下利厥寒豈四逆輩啟生陽於腎中可比耶食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之吳茱萸湯證陽在上而陰在下食穀欲嘔吐利乾嘔吐涎沫頭痛嘔而胸滿則陽盡在中不能安於中且欲上出矣手足厥逆煩躁欲死則僅能擾於中不得達於外矣所以致此者非在下陰邪搏之而何然據於中則不越於上泄於外可知其陰自肝而不自腎矣吳茱萸湯首吳茱萸是導陽下達然僅導陽下達而不剿撫其陰則陽雖下陰仍得與之敵是故參棗所以撫定其陰生薑則能使陰邪橫散不與陽為敵者也然則生薑非治肝乃散自肝上引之陰邪耳理中湯解理中湯所主在傷寒論曰既吐且利寒多不欲飲水在金匱要略曰胸痹心中痞悶氣結在胸胸滿脅下逆搶心一者由中而潰決四出一者由上下而並湊於中惟其中無所守是以外者能內內者能外內外可以易位生死不可遂判乎方中參甘氣味柔和能羈內出外入之駛不能制內出外入之令白朮剛乎參甘能制其出入矣猶不能不令出入惟乾薑味辛氣溫能令外不敢入性守不走能令內不也出蓋惟中虛是以客氣得入惟中寒是以不能逐而使出故理中補虛即其制出之權其驅寒即其制入之威於是加以桂枝則治內寒外熱內虛外實心中痞鞭利下不止表裏不解桂枝人參湯證雜以薯蕷及諸補散則治虛勞諸不足風氣百疾薯蕷丸證間以半夏而去朮草則治妊娠嘔吐不止乾薑人參半夏丸證增以旋覆花代赭石半夏大棗而去朮則治心下痞鞭噫氣不除旋覆花代赭石湯證莫非分理中之半恃薑為卻寒散滿之長城即對待以寒涼如半夏瀉心湯生薑瀉心湯甘草瀉心湯黃連湯乾薑黃連黃芩人參湯按而察之猶有理中之參草乾薑在其中而恃乾薑不淺矣臍上築者腎氣動也去朮加桂指理中湯夫腎氣動亦不過作賁豚氣從少腹上衝心耳賁豚水氣也土能制水白朮補土健睥何不可使為中流之柱橫截於中令水氣不上衝心耶是蓋不然夫土能防水止能防其下泄不能防其上湧下泄者水之性上湧者非水之性必有激之使然者除其激之之源水自歸壑矣古之人有治堤者隨築隨潰皆緣水從下上湧則熔鐵汁灌之堤乃得成以桂易朮正此意耳苓桂朮甘湯有心下逆滿氣上衝心脈沉緊身振振搖病未嘗不涉腎而不忌朮僅因發汗後臍下悸用苓桂棗甘湯旋即以棗易朮可見朮之於腎確有所忌矧霍亂為病既吐且利正係水土反乘若更以所忌者橫梗於中令病與藥相拒相爭不至潰敗決裂不止矣霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不飲水者理中湯主之理中丸人參甘草白朮乾薑各三兩上四味搗篩為末蜜和為丸如雞子黃大以沸湯數合和一九研碎溫服之日三四服夜二服腹中未熱益至三四丸然不及湯作湯煮服法四物依兩數切用水八升煮取三升去渣溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑二兩下多者還用采悸者加茯苓二兩渴欲飲水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿揭衣被五苓散理中丸皆有白朮則白朮執霍亂之兩端為必用之物矣而去朮還用朮更加朮紛紛無定統而觀之其用朮加朮之意總在使脾氣散精上歸於肺通調水道下輸膀胱而已吐多者胃病胃既作吐則不能遊溢精氣上輸於脾脾無所受精於何輸肺下多者脾病脾既下陷不能循其上朝之職若非有以扶之則樞機於何轉於此見朮能舉脾之陷不能定胃之逆也渴者胃之虛渴必多飲飲多則縱使吐逆亦能波及於脾脾有所受而不能舉則下必更甚腹滿者脾實脾實不能上輸即下泄而不減其滿勢必自下逆上自腹及胸吐更加甚於此見未能治脾胃虛不能治脾胃實也為上為下為實為虛情勢不同而既吐且利則一既吐且利渴欲飲水斯朮為必需傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸甘草乾薑湯芍藥甘草湯一和脾一和肝和脾者安中宮陽氣之怫亂和肝者通木臟陰氣之凝結雖係乾薑芍藥之力然此重彼輕則不可見中央之病中央藥主之乾薑芍藥力雖大然保泰定功不能不歸於甘草也故兩場之治日便厥咽中干煩躁吐逆兩脛拘急是陽明內結也與甘草乾薑湯厥愈足溫重與芍藥甘草湯爾乃脛伸夫陽結為厥陰結為拘乾薑能破陽芍藥能破陰破陰破陽能愈拘愈厥不能愈咽乾止煩躁此保泰定功之所在矣夫中者上下之樞金匱要略云肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者上虛不能制下也此為肺中冷甘草乾薑湯以溫之是由中以益上制下也一變而為理中湯治上吐下利是由中以兼制上下矣再變而為桂枝人參湯治外熱內寒表裏不解是由中以兼制內外矣又一變而為四逆湯治下利清穀是由中以制下矣再變而為通脈四逆湯治下利面赤內寒外熱是由中及下兼制內外矣甘草乾薑湯制上中以及下能擴充以至外芍藥甘草湯則制中下以及外能擴充以至內如桂枝湯之治風黃芩湯之治熱芍藥甘草附子湯之治寒莫不連類及者亦可悟甘草居中安土之大凡矣批張隱庵傷寒論集注隱庵前輩致力傷寒二十年如一日觀其自序經寒暑曆歲月廢寢食絕交遊春花秋月之莫問澄水佳山之弗臨致力之勤無以復加就惜其不脫宋明理學家習氣好為高論之後讀者反覺高深莫測余之批隱庵非攻擊隱庵也實欲仲景之學無微不顯無暗不明爾辨太陽病脈證篇第一太陽之為病脈浮頭項強痛而惡寒太陽為諸陽主氣有通體分部之不同通體太陽如天主周身皮膚毫毛肌表一似天之環繞於地外分部太陽如日主頭項脊背尾閭血室一似日之旋轉於躔度躔音讀蟬躔度謂日月星辰的運行此首明太陽主通體之毫毛而復有循經之分部也太陽之為病脈浮言太陽運行於周身之膚表病通體之表陽故其脈應之而浮也頭項者太陽經脈所循之分部也病在表而涉於分部故強痛也惡寒者惡本氣之寒也蓋太陽之上寒氣主之以寒為本以熱為標故也天元紀大論云太陽之上寒氣主之所謂本也六微旨大論云本之下中之見也見之下氣之標也六氣皆然此下五節言太陽受風寒之邪而傳陰轉陽之義太陽病有表證經證兩種脈浮惡寒表證也頭項強痛羥證也何必高談天日強為附會再六經皆重見證病在表當然惡寒熱為寒遏當然發熱與標本毫無關係不必強為拉扯徒亂人意內經是內經傷寒是傷寒東拉西扯大非讀書之法太陽病發熱汗出惡風脈緩者名為中風此言風傷太陽通體之肌腠而為中風證也夫風者如冬令之寒風寒為太陽之本氣風乃寒中所生之動氣也發熱者風傷太陽之標陽也汗出者風性鼓動開發毛腠故也汗出而毛腠虛故惡風風為陽邪傷人陽氣兩不相持故脈緩也此風祁開發太陽之毛竅而搏於通體肌腠故名為中風此是中風病提綱只要認清發熱汗出惡風脈緩就是中風見證頭項強痛脈浮就是太陽見證如是而已足倘要說明其所以然則風邪開發太陽之毛竊而搏於通體之肌腠一句話已足何必說上一大堆不相干的廢話太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒太陽病者病太陽通體之表氣也或已發熱者感太陽之標陽而為熱也或束發熱者寒邪始襲於皮毛未得太陽之熱化也太陽以寒為本故無分已未發熱而必惡寒也通體之氣為陰邪所傷故體痛凝斂於周身之毛竅則裏氣不疏故嘔逆也走陰陽邪正相持其脈則緊今寒傷通體之表陽故脈陰陽俱緊而名為傷寒也太陽病者頭項強痛惡寒脈浮也不論已發熱未發熱必有惡寒體痛嘔逆脈陰陽俱緊名叫傷寒本文何等明白就知道頭項強痛如有惡寒體痛嘔逆脈緊者是太陽傷寒病標陽本寒熱化等空話說它則甚傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也此太陽受邪而即可傳於少陰也傷寒一日太陽受之言平人六氣周流環轉不息若以天之寒邪傷人毛腠則太陽正氣受之而即一日起太陽矣要知傷寒者言邪而太陽者言正脈若靜者太陽正氣自和故為不傳頗欲吐者即少陰之欲吐不吐也若躁煩者感少陰陰寒之氣則躁感少陰君天之氣則煩脈數急者諸數為熱諸急為寒寒熱相持而脈不靜此太陽受邪而感少陰之氣化者為傳也高子日本論中凡云傳者言邪傳於某經則見某經之證若紀日而云一日太陽二日陽明等者此論正氣非關邪也病在太陽有太陽見證病傳他經有他經見證如渴之為陽明嘔之為少陽欲吐躁煩之為少陰消渴之為厥陰腹滿自利之為太陰六經錯綜路路可通由病之自由出入醫者不過平脈辨證知病在何經用何方治之耳何必高談正氣假使正氣果然自和何致有病傷寒二三日陽明少陽證不見者為不傳也此承上文言傷寒一日太陽受之傳則或入於陽或入於陰若二三日而不見陽明少陽之證者病氣只在太陽為不傳也陽明見證口渴身熱不惡寒但惡熱少陽見證嘔而發熱脅下滿仲景每言不嘔不渴可知渴是陽明要證嘔是少陽要證注書而好為理論忽略證據何以開悟後人太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名日風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈疭若火熏之一逆尚引日再逆促命期冬傷於寒即病者名為傷寒不即病者至畚隨陽氣而發變為溫病溫病者熱病也邪病太陽之標陽故但發熱而渴不惡寒所謂冬傷於寒春變為溫者是也此言寒邪伏匿而變為溫病也夫寒邪伏匿寒出必解若發汗已而身反灼熱者此非寒邪扶匿乃風邪伏匿而名為風溫也風邢從內以出表故脈陰陽俱浮腠理開故自汗出身重者風傷通體之肌肉也多眠者風邪壅滯而神機不出也邪搏於陰致頏顙不通故睡息必鼾邪搏於陽致生氣不達故語言難出此風溫危險之證若被下則水津內竭姑則小便不利繼則津液不濡於上而目直視矣水道不約於下而小便失溲矣若被火攻風火交熾微則身必發黃劇則火熱傷神故如驚癇病之手足時瘈疭也此被火一逆火熏為再逆一逆尚引日再逆促命期由是而知風熱之證當滋養其血液不宜汗下火攻也溫病風溫別詳證脈忌下忌被火忌火熏忌逆治明所忌即知所宜矣後賢葉葉天士吳鞠通王孟英對於溫病特著專書可以羽翼仲景補充傷寒病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此言太陽少陰之標陽標陰為病也以寒邪而病太陽之標陽故發熱惡寒而發於太陽也以寒邪而病少陰之標陰故無熱惡寒而發於少陰也成氏曰陽法火陰法水火成數七水成數六發於陽者七日愈火數周也發於陰者六日愈水數周也此下凡四節皆論愈證發熱就是陽無熱就是陰不必鑿分太陽少陰更不必鑿分風邪寒邪至七日六日亦只要知道發熱惡寒病七日當愈無熱惡寒病六日當愈如是而已足若必深求定成蛇足試思人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一日一夜凡一萬三千五百息脈行五十度周於身六日為六周七日為七周每日一周陰經陽經無不遍焉主張陰經短陽經長之說者可以不攻自破且少陰病二三日無裏證當微發汗少陰病始得之及發熱主以麻黃附子細辛湯可知少陰並不是絕對無發熱證者標陽標陰高談大可不必太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈此論太陽為諸陽之首六氣運行七日來復球轉之無端也太陽病頭痛者所謂陽因而上病氣隨太陽之在高也七日以上自愈者以六氣已周而行其經盡太陽之氣來復於高表故也若太陽為邪所搏不能上出於高表而欲作再經者針足陽明蓋陽明主經脈經脈流通而使表邪不傳則愈高子曰以行其經盡言六氣之環繞於外內也使經不傳言使經無病邪之傳也故傳經者言邪而紀日者論正於此可見矣稱得太陽病頭痛必兼項強惡寒至七日以上自愈者必項強惡寒皆罷頭痛亦已較輕不問可知陽明亦有頭痛證惟項不強身不惡寒耳令太陽病七日自愈未經醫家診治可知病不服藥難保不留餘邪防其再經欲作刺陽明以泄病氣則邪不傳矣原文何等明白太陽不為邪所搏不能上出於高標云云試思太陽不為邪搏何必稱太陽病三陽脈皆上於頭太陽何得獨稱高標太陽病欲解時人巳至未上午乃太陽中天之時巳未前後之氣交也夫天有六氣人有六氣人得天時之助則正氣盛而邪病鮮矣風家表解而不了了者十二日愈風乃陽邪六為陰數表解而不了了者裏邪未盡也故遇重陰則愈辨脈篇曰以陽得陰則解也上條言愈之時此條言愈之期病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也此言太陽之根於少陰也皮膚者太陽表氣之所主也骨髓者少陰裏氣之所主也身大熱而反欲近衣太陽標陽外呈而少陰之陰寒方盛於內故反欲近衣也大寒而反不欲近衣太陽本寒外呈而少陰之火熱方盛於裏故反不欲近衣也此申明太陽主皮膚少陰主骨髓與發熱無熱而太陽少陰並呈乎外者之不同也此不過言假熱真寒假寒真熱兩種病證與標本毫無關涉曲說附會俗顯反晦矣傷寒論一書乃仲景探病所得隨筆記錄據事直書之文觀自序宗族素盛一節可信乃注家偏欲刻意求深難免牽強附會如太陽病七日自愈忘卻自字只說一日太陽二日陽明三日少陽六日六經行遍七日再作太陽等語此係據內經為釋謬誤一也發於陽發於陰忘卻有熱無熱以太陽少陽為釋也有以胃陽脾陰為釋也有以風邪寒邪為釋紛紛擾擾徒亂人意謬誤二也故欲識傷寒論真面目必如武進鄒潤庵而後可太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒浙淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝三兩去皮桂枝止取稍尖嫩枝內外如一若有皮者去之非去枝上之皮也後仿此芍藥三兩甘草二兩炙生薑三兩切大棗十二枚劈上五味哎咀以水七升微火者取三升擊滓適寒溫服一升服已須臾飲熱稀粥一升余以助藥力溫覆令一時許遍身執水執水微似有汗者益佳不可令如水淋漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物此論風邪搏於太陽通體之肌表而為桂枝湯證也蓋風寒之邪必先毫毛而入於肌腠太陽中風陽浮而陰弱者太陽主表故陽氣外浮而發熱風傷肌腠故陰氣內弱而汗出此風傷太陽之肌腠而然也若風邪始搏於毫毛而未入於肌腠之際則有嗇嗇浙浙翕翕之象嗇嗇者皮毛慄慄之狀邪在皮毛故嗇音惡寒淅淅者灑淅不寧之貌肌腠未開故淅淅惡風翕翕者動起合聚之意太陽邪正之氣相持故翕翕發熱夫風邪從表入肌在皮毛則肺氣不利而鼻鳴入於肌腠則三焦不和而乾嘔桂枝湯主之本論云桂枝本為解肌蓋三焦木火之氣通會於肌腠桂為百木之長氣溫色赤秉木火之性主助肌中之氣以解肌表之邪芍藥氣味苦平花開赤白放於二氣之中得少陰君火之氣主益神氣以助肌中之血肌腠之氣血調和而邪自不能容矣甘草生薑宣達胃中之氣而辛甘發散大棗色黃當指棗肉色黃而棗皮皆赤也亦有黑者味甘脾之果也主助脾氣之轉輸而為胃行其津液汗乃水穀之津故飲熱稀粥以助藥力中焦之津液外布即有留舍之邪與汗共並而出矣津液外泄則中氣暴虛故忌食生冷肉面酒酪臭惡等物使勿傷脾胃之氣內經為理論之書傷寒為治病之書所以讀傷寒須要放出傷寒眼光不可以讀內經之眼光讀傷寒前輩於此一點不肯注意議論雖高難免鑽進牛角內經最重針灸故於標本中見異常講究傷寒湯液治病只消認證清楚寒熱表裏虛實不便稍有含混如是而已足故余於傷寒論卑之毋甚高論也新注湯頭歌訣序湯頭歌訣清代休甯汪訒庵氏所作集方二百有六首附方一百二十一首分類二十有二以其便於誦習也初學者輒喜讀之顧其方不盡諄而初學之士見識有限趨向稍岐即成終身大害余既著醫學南針指示學者以門徑而汪氏湯頭歌訣為當代流行最廣之書深懼其有誤後學爰取其歌為一一釋方義間有摭錄前人舊作務使讀是書者對於古方之組織有深切之瞭解而後因病取與剪裁自易否則執死方以治活病幾乎其不誤己而誤人也民國二十有五年四月五日青浦陸士諤序於滬寓論黑熱病治法新流行之黑熱病其所謂熱熱從何來其所謂黑黑在何部既不見黑在何部又不知熱從何來何以名黑熱病新流行之病吾真不知其命名之於意云何余以現今所謂黑熱病之種種證象歸納之不禁失笑日此中國向來素有之痞癥也黑熱云乎哉痞之為病有虛有實實者日癥虛者日瘕病之源不一傷寒內陷成痞熱入成結胸痞癥之一也雜病久瘧成瘧母痞癥之一也五臟有積曰奔騰賁豚曰肥氣曰伏梁曰痞氣曰息賁痞癥之一也鱉癥米癥魚癥酒癥痞癥之一也同一痞癥其成痞之因不一治法即不能齊一乃必欲預定一藥遍治諸痞此種擬方待病之笨拙舉動尚自詡為特效藥吾中醫真要笑煞吾中醫非不有治痞之靈藥如鱉甲煎丸等萬試萬驗千投千效所以不肯提出者非特不屑與彼輩爭一日之短長亦鄭重將事不欲以一方一藥印定後人耳目也伏氣論何謂伏氣氣是何氣伏在何處伏氣之學說內經與傷寒論雖有記載卻甚含混後賢解釋分作九種學說互相攻擊各不相干有言氣之為物即是寒邪中人不即為病潛伏在少陰之經到春陽發動內應外合而為病此一說也又有人駁言人身氣血周流稍有阻滯就要成癤成瘡少陰為腎之經乃是性命之源豈有性命之源如此緊要所在而病邪潛伏一冬之久可以平安無事之理此又一說也又有人言人之一身十二經十五絡奇經八脈支絡孫絡井營腧合各穴幽微曲折猶之一城一邑萬家燈火中豈無一二莠民潛伏當政治清明時此一二莠民自不敢為非作歹一至外寇逼境則騷然起矣此又一說也又有人言冬令天氣外寒內溫外愈寒內愈溫只要看井中的水就能夠明白此理到了春風解凍外面的寒解裏面的溫自然而然向外透發裏面透出的溫遇著外面襲入的溫兩溫相合而成病這才是伏氣的真理他們主張寒邪久伏化熱的何嘗認識伏氣真面目此又一說也這四派學說除第二派非駁伏氣當然不算外據我看來其餘三派都是對的都可以講得通的那第四派講的是本氣第一派與第三派講的都是病氣本氣人人都有病氣不是人人都有所以有病有不病不過第三派主張有了外感才引動伏氣第一派主張天氣一暖伏邪自會發動事實之證明都是確實的照我的眼光吳鞠通王盂英章虛穀論的是指病氣葉子雨論的是指本氣兩說不妨並存不能偏袒某一說也伏氣之為病有犀角地黃湯證有導赤散證有黃芩湯證有蔥豉湯證有白虎湯證有小柴胡湯證所伏有淺深之分所發有氣血之異苟能見症治症病無遁形矣風病之種類風之為病種類最多就素問所載病源所述外台千金所錄名目已極繁多今姑擇要摘錄以備學者探討一曰寒熱寒熱亦風病之一也風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒腠理閉則熱而悶其寒也則衰其飲食其熱也則消其肌肉所以使人帙僳而不能食名曰寒熱也寒熱又須分出陽明經與太陽經風氣與陽明經入到胃腑循陽明脈而上至目內眥要是肥人肥人肌肉厚重則風氣不得外泄就變為熱中而目黃要是瘦人瘦人肌小肉薄易於外泄而寒就成為寒中而拉出此風入陽明經之寒熱也風氣與太陽經俱入行諸脈腧散於分肉之間與衛氣相干其道不利故使肌肉憤瞋而有瘍衛氣有所凝而不行故其肉有不仁也此風入太陽經之寒熱也一曰癘風癘者有營氣熱腑其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風也一曰五臟之風春傷於風者為肝風夏傷於風者為心風季夏傷於邪者為睥風秋中於邪者為肺風冬中於邪者為腎風此五臟之風也一曰偏風風邪中於五臟六腑之腧穴亦為臟腑之風各入其門戶所中則為偏風一曰腦風風氣循風府而上則為腦風一曰目風風入係頭則為目風一曰漏風眼寒飲酒中風則為漏風一曰內風入房汗出中風則為內風一曰首風新沐中風則為首風一曰腸風久風入中則為腸風餮泄一曰泄風外在腠理則為泄風一曰風厥汗出而身熱者風也汗出而煩滿不解者厥也病名日風厥一曰勞風勞風法在肺下其為病也使人強上宴視唾出若涕惡風而振寒此為勞風之病一曰酒風有病身熱解墮汗出如浴惡風少氣名目酒風一曰偏枯汗出偏沮使人偏枯一曰痱痱之為病身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也一曰痹風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然以上所錄皆是風病之種類至其病之因何而來從何而治當別著篇論之風病之原頭風病之種類既如上述而病風者或口噤或舌強或角弓反張或不仁其故何歟曰凡病狀之發現必皆有其所以然之故即以口噤一證論人之諸陽經筋皆在於頭三陽之筋並絡人頷頰夾於口諸陽為風寒所客則筋急所以口噤不能開此口噤之關係由乎陽經經脈也至於舌強一證不由陽經而由乎陰經蓋太陰睥脈絡胃夾咽連於舌本散乎舌下而少陰心之別脈係舌本現在心脾二臟受了風邪所以舌強不得語也此舌強之關係由乎陰經經脈也角弓反張一證太陽經行身之背風邪傷人令人腰背反折不能俛仰似角弓者由邪入太陽故也搔在皮膚上宛如隔衣一層名曰不仁不仁之由在乎營衛營氣虛衛氣實虛與實原是對待而言營氣既虛衛氣自實此時風寒入於肌肉使血氣不得宣流其狀搔之皮膚如隔衣也此不仁之故也風病善行而數變襲於陽經則口噤襲於陰經則舌強襲於太陽則角弓反張襲於營衛則肌膚不仁張仲景推原風病其言曰寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚浮為血虛脈絡空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喁僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎沫寸口脈遲而緩遲則為寒緩則為虛營緩則為亡血衛緩則為中風邪氣中經則身瘴而疹癮心氣不足邪氣入中則胸滿而短氣吾儕夙尚方術每遇一病必須反復推求窮其原委然見病知源之法全在平脈辨證而今之所謂新中醫者必欲舍古書而別辟途徑吾知其新辟之途定是岐途而於所學果有絲毫利益否耶中風中風一證西醫稱之曰腦沖血據局部證象而論西醫之名亦何嘗不是問血何以沖腦曰血壓過高之故問血壓何以過高誰使之高孰令之高西醫瞠目莫能對也只有中醫知道血之所以沖腦血壓之所以過高皆為風之故風者善行而數變此風名叫虛邪賊風中人則病人身之氣血循常軌而周流不息斯時之血壓既不過高亦不過低恰合適當之程度是謂無病之軀一中虛邪賊風氣血受風郛之鼓動激蕩沸騰而血壓高矣清靜之腦海亦被沖入而成所謂腦沖血證定病之後吾中醫稱之曰中風不稱之曰腦沖血此其故安在曰腦沖血局部病狀之稱不足概括中風全病氣血之流行於人身也無一處不至亦無一處不達故吾中醫分中風為四類一曰風中於經二曰風中於絡三曰風中於腑四曰風中於臟所中既有淺深所病亦分輕重虛邪賊風傷人四肢軀體中於經者是謂風中於經病其狀筋骨重滯不用左右不遂脈弦而浮或腰背反抑攣急如角弓之狀其脈弦或經脈閉滯氣促神昏不識人無汗拘急一或其人臟寒者必見四肢厥冷六脈沉伏等證其人腑熱者必見身熱心煩六脈浮數等證其人素有痰飲者必見痰涎湧盛之證風中於經其病為淺風中於絡較之風中於經為深一層形氣實者見口眼喎斜肌膚不仁四肢麻木骨節疼痛等證脈浮遲者吉堅大急疾者凶形氣虛者見半身不遂口眼喁斜其脈澀弱等證此症延久不愈必致變為癱瘓風中於腑較之中絡又深一層腑者六腑也風邪中腑則昏不識人二便阻隔腹脹滿脈來一息七八至甚至痰涎上湧脹悶而死風中於臟最為重症亦須分出虛實兩種一種形氣俱實者必見口閉舌瘖耳聾鼻塞目瞀痰涎壅塞神次昏憒不能言語口眼喎斜兩手握固牙關緊急等症一種形氣具虛者見面色萎黃口開唇緩不收手撒舌短目直視遺尿喘汗口吐涎沫神昏不語等症其變必至痰涎壅盛臟氣閉塞呼吸窒滯而死或呼吸之氣有出無入喘汗如油痰如拽鋸發估而直等證中醫深知此症由於營衛失調腠理不密風邪乘虛深入迥非外感傷風之比原因復雜治法繁瑣決非抽血打針及冰枕戴冰帽簡單方法所能療治以簡單之法治復雜之症不但刻舟求劍難免張冠李戴幾乎無不輕病變重重病變死耶今年之夏旬日中民党要人胡展堂先生歿於廣東醫界要人夏應堂先生歿於上海皆以中風聞余故特著此論看病法病之在於人身或伏膜原或發肌腠或行營衛或入臟腑或走於經或留於絡在不知醫者看來果極其隱微極其變化而在吾醫者看去則莫現乎隱莫顯乎微無一病不顯著於眼前不庸敲打已情情願願自寫供狀吾中醫用望問聞切四種方法觀測病情已無遁形確有真知灼見不象他人診病儀器雖精對於病症揣摹想像如云中之捉月霧裏之看花吾中醫對於愛克斯光太陽燈及種種之化驗儀器皆不須用以診察既真無需乎此無藉乎此也或疑病情既極變幻診察又無儀器疑似之際稍有錯誤難免不發生毫釐千里之謬是則何如曰無可慮吾中醫治病不重病名獨重病症天下無一定不易之病有一定不易之證傷寒中風病之名也太陽少陽病之證也吾儕因證立方不是見病投藥吾儕知以麻黃湯治太陽發熱無汗證不問其病之為傷寒為中風也知以桂枝湯治太陽發熱有汗證不問其病之為中風為傷寒也吾儕對證發藥因病撰方每一方之成總以病之環境為依歸斷不敢以死方治活病故瘧疾一症論在他人有所謂百治百驗之特效藥而中醫則既分臟腑又判六經又須分出風寒暑濕燥火決不敢以一種藥遍治諸瘧推之於痢疾推之於霍亂無不皆然此吾中醫看病法與西醫不同世人動輒以西醫眼光觀察吾中醫此則大謬也醫藥問答四十四則一花君函士諤先生大鑒削浮直陳者敝人有孫日花屏如任棲霞縣政府第四科長於去年本省黃災時間各縣派有災民工作工作浩繁操勞過甚九月間忽一日午後發熱晚間用薑湯發汗未愈該處良醫無多寒熱雜投以致發熱盜汗綿綿不已臘月初自按歸家身體虛弱六脈虛數無力盜汗之症略愈而腹疼泄瀉服二加龍牡湯及健脾和胃藥盜汗泄利均有大效後又添加咳嗽發熱服黃耆建中湯加芩杏橘桔等藥而咳嗽不愈但過午發熱及脈數之證仍舊而盜汗之症又作退熱止汗之藥服之不少至令未愈現服酸棗仁湯初服有效三四劑後即無效發熱在過午六點至八九點熱時嘔惡或水或食味酸盜汗在先睡時即盜刻下准在黎明他時不盜小便紅色而濁有渣滓胸前左邊臍上皮膚略厚如手掌按之不痛六脈輕按虛數無力左寸晚間短澀右寸寬散時已數越月身體虛弱臥床不起惟胃氣尚好久仰先生醫學深湛望重寰宇而尤心存濟世有求必應茲照潤例奉上郵票四元祈展國手賜方施治則感佩無極花上復函此伏暑證也初秋酷熱暑氣猶重因公勞頓感邪實深天之氣為暑地之氣為濕北地高燥素鮮濕邪因黃災而濁流氾濫受日炙而濕氣薰蒸災民結隊而來難免不挾有暑濕指揮其間口鼻能毋觸冒北醫不解濕邪治法難免錯誤暑病類虛最忌補澀盜汗為應有之證咳嗽乃新加之病與暑濕無涉脈數身熱伏暑顯然溲短赤濁尤為鐵證所幸胃氣尚存猶能措手總之此病治法當注意其脈數身熱不當注意其盜汗宋半夏三錢焦枳實一錢陳皮一錢竹二青當指竹茹三錢赤茯苓三錢飛滑石包四錢青蒿梗三錢黃芩錢半生甘草五分加枇杷葉去毛包三錢鮮竹葉三錢此方煎成藥去渣在身熱前一小時服外治法五倍子一枚研細末用童女口津和丸如彈子大夜臥時塞臍中外覆薄貼即淡膏藥之最薄者可止盜汗二趙函敬啟者鄙人患足疾已近六載因十九年赴滇旅行冬月回滬至農曆元旦印於左足踝骨左面發痛初起時略覺酸強隔日即不能下地中間須經過二三日大痛痛時不能伸縮移動二三日後漸松約十日後可下地步行半月以後仍可步行四五裏一如無病時自後每年一發或年發兩次大概都在冬日或季秋孟春之時惟有一年似在端午則為例外此症來時只須第一日覺酸強第二日必不能起行已成習慣起初一二年發必十餘日後始能下地愈後尚能健步雖四五裏處之泰然逮後一發即服西人藥片雖痛可減輕亦可將病之時間縮短一星期或五日後即能下地但以後偶緩步一裏即覺難支第二日必須休息方能無事其趨勢恐年甚一年定至一年數發以致步履維艱若形同痹瘓則受累無窮矣素仰貴報醫林國手提倡中國醫學不遺余力又往往為病者解釋疑難故懇惠予同情詳示病源所在及應采根治方法則感激無盡矣茲更將此病求治經過及將發徵兆發後情狀臚列如下以資參考求治經過曹請傷科石醫生打針結果只能黑膏藥塗足背用布包紮兼服中藥石醫生謂無需打針余問此症有法預防否曰無之曾請證道居士按摩按時手抵胸腹甚痛故即中輟北平孫醫生名忘空針孫醫生為段芝老打針來滬住霞飛坊鄙人曾往求診打金針四五日後因足已勉強可行余因事離滬遂未復針但打針後第二年即未發民國十九年後能不發者止此一年服西藥亞陀方一類之藥片數種雖略可止痛無補腳力症發徵兆天氣寒冷之時間為逢節走路疲乏之後以上三種徵兆以第三種為最顯著因即天寒逢節亦常借走路疲乏之為因也症發情狀第一二年在左足第三年在右足以後時左時右每次以發一足為止惟最近因隨遊侶走路稍急兩足受震左足愈後右是繼發雖一星期後兩足又能行走發時只在足之踝骨旁漸牽動至足背然後足底乃已踝骨以上從未有病所患似在筋不在骨疾作時足上不紅不腫按之不寒不熱與常無異趙回萬謹上復函病在足脛法當治腎制附塊錢半懷牛膝三錢生薏仁三錢三雷君函士翁老先生鑒頃閱報章得悉老先生醫道如神不勝景仰後生前患腦疾經年未愈欲來滬面懇診治苦乏川資且因時感頭暈不能乘車謹具蕪箋將病況詳述干後敬懇老先生鴻慈大施擬賜藥方由航空寄交為禱如蒙惠允則感再造之恩馨香頂祝於先生世世矣臨穎不勝翹企之至肅此敬請福安惟乞靄照雷謹述病況如下晚生供職法界二十有餘年歷任各職又多係繁雜事件在餘歲時雖經多勞未覺有何疾病不過偶患頭暈或內燥而已稍治即愈過歲後亦是如此至歲下半年十一月間偶一日因公務過忙忽覺頭上右邊稍有疼痛現時仍覺右邊尤甚次早又覺腦後如墜重物狀一經動作即如此晚間休息即稍減輕在當時甚不注意且因生計關係不便請假曠廢遂力疾從公至歲正月問即覺疼甚腦後既如墜重物狀又如用繩束縛狀頭左顧似墜物向右頭右顧似墜物向左且脊骨內近肩處亦似有物在內流刺有時又覺眩暈此時仍帶病服務至二月間意眩暈不能自主始請假休養並經中西醫多方診治迄今未愈右耳鳴甚左耳稍輕有時如蟬鳴有時如水壺快開時之鳴發暈亦更甚腦後束縛亦更緊又覺腰間左邊有一股氣向上衝升右邊為輕有時覺左肩背處及左胳膊左臀並腎囊下之肉顫動不已腹內及胸內亦覺顫動足下發熱亦覺有股氣在內走動覺左足下尤甚人身即站立不穩夜眠亦不安少睡即醒或有時徹夜不眠或夢遺並盜汗再後生係一膽小謹慎之人歷任各職務又多係繁難故每遇事必過思慮甚至事必躬親以致造成此病再後生在青年時代常患大小便燥熱且對於房事亦稍過此後生患病之實在情形也敬懇先生酌擬藥方擲下俾便配服治療不勝感激盼禱之至鵠候回示復函此肝陽有餘腎陰不足也平素勞心思慮不毋太過治法當分標本兩圖治標從肝膽治本從肝腎今先治標以不眠故宋半夏三錢竹二青三錢石決明八錢焦枳實一錢生甘草四分活磁石八錢陳皮一錢左牡蠣八錢紫石英八錢朱茯苓三錢蒼龍骨八錢炙龜板八錢加白滁菊三錢制女貞三錢四張君函士諤先生道鑒久慕仁譽欽佩彌深敬啟者小兒三歲體質尚健惟彌月內水誤入耳去年春間耳內淌膿發臭經用虎耳草及螃蟹水滴治無效嗣已自然而愈今春又復思發膿多而是據人傳方用核桃油成蛋鹵滴治又據醫云用紅棉散搽敷均屬無效惟恐久患成聾素仰先生大名敬懇賜以良方則受惠匪淺並乞於尊輯醫林示答是所至禱此頌道安張復函枯竹蛀屑生蒲黃各等分加冰片少許時時摻之效五馬函敬啟者家叔馬潤生於民十九年春間染有奇疾遍身干黃兩目尤甚脅下結痞塊以致飲食頓減積一年餘始治癒不意去年秋季舊病復發症候較前煩重治療更覺棘手中西醫藥分投迭治有時雖奏膚功究竟並無大效素仰大醫師學問淵博義理精深醫國濟世早已蜚聲中外徒以山水阻隔就醫既感不便聘請力尤不逮望洋興嘆徒喚奈何近讀鴻著敬悉已為遠道病家開通函問證之例則荒僻區域問之病而不能治治而不得當以致纏綿不起者從此均得起死回生而免向隅誠善舉也爰將症狀脈象另紙呈覽懇即酌賜方劑以便早復健康為感附奉國幣四元至希詧納馬馬山東即墨人年歲身體素健壯在青島經理紙張印刷事業性亢直寡言笑然好代人抱不平民國十九年春因事觸怒鬱結於中而病作當時腹泄旋覆因氣而至脅痛腹滿甚或嘔吐不時下午五時以後則寒熱交作漸致身體瘦弱面色憔悴黧黑而透黃色目光黃無神小便黃赤有時或清大便色白而溏次數較平日為多日久則右脅下結硬塊按之微痛脈象左關倍硬余稍數右關虛數中西醫治者或以為黃疸或以為痞塊或以為積聚某西醫謂為肝臟腫大膽汁輸送不便故皮膚焦黃然投以藥餌則不見功效最後斷以怒氣傷肝脾因以虛用歸脾湯加醋炙白芍鱉甲石斛木瓜當歸雞內金丹皮青蒿柴胡桑枝等藥出入為劑十餘服始能脅塊漸消氣力漸強病已全愈此民二十年秋季也十四年九月偶因傷氣前病復發惟此次不寒熱不疼痛夜間稍覺熱燥為可異不思飲食身體贏弱為可懼面目之顏色大小便之形狀均與上次相同但小便赤黃無時或清胸口緣右脅硬塊漸向下伸長探手能掀起非重按不痛脈象右寸尺細弱無力左寸遲亦細弱一惟沉分稍強左關弦硬但限於浮取中取則稍弱沉取不算有力右關虛弱沉分無力已極六部總斷細數虛之象左關獨有弦硬之象最近西醫診為肝臟癌方在服藥不知效能復函年近六旬脅痛腹滿痞塊又作入夜熱燥飲食不思病雖在肝脾胃已漸遭延及扼要圖治注意肝睥肝之病實睥之病虛脈弦在左即其證也實宜攻虛宜補法當兩顧仲景鱉甲煎丸錢半吞別直參一錢煎湯下連服七日又函敬啟者家叔潤生得服大醫師妙方病日漸輕矣惟症大纏綿不能病魔即退將脈病症另紙附國幣四元祈再賜方指示明途此請陸士諤大醫師偉鑒馬今病狀身體瘦弱右脅下盡處及心窩下有一大硬塊比前稍見小症狀面黧黑而透黃色目黃若前惟小便黃赤較前略淡脈象左寸尺弦虛左關中取弦硬浮沉虛象比前稍柔右寸尺細弱右關弱沉取稍振比前略好飲食較前加三分之一強精神稍振行路微有力量服藥每日三次已照方服七日矣發信之日猶照方服食原方照復復函體虛邪實以鱉甲煎丸攻邪人參補正既獲見效病情已難遁形第年近六旬病非一日據述脈見虛弦細弱斷難浪投霸藥圖快一時仍主前法服滿一月再商仲景鱉甲煎丸錢半分三次吞別直參一錢白茯苓錢半粳米三十粒煎湯下丸六左君函士諤先生大鑒鄙人年近四十身體外表尚不瘦弱而其實內虧頗甚所幸飲食日日如恒夜眠亦好間有睡至夜半若千愁萬緒奔至胸中遂不能寐直待旭日東昇起而後已此為病否抑心血虧耗否應醫治否此外兩腿自膝以下異常酸痛且牽引痛於腰或一二日酸一次或三五日一次如遇天將下雨其酸更重而酸時全部無力雖行百步亦覺為難此患約五六年服中藥頗多獲益甚鮮前見金鋼鑽醫林欄載醫藥問答因悉先生為當代醫學中堅不勝羡慕故將鄙人病狀述請先生賜方診治侔起沉屙而還健步則不勝感禱之至想先生濟世婆心慈云普照決不肯拒之而弗教也嵩肅祗請道安左復函夜難眠屬胃不和足難步屬濕流筋奉上一方試服五劑北秫米包三錢宣木瓜一錢生苡仁三錢水煎服日二次左又函士諤先生大鑒前承賜方已服五劑現擬續服一二劑近日來未見若何效驗恐藥力太薄難以達到病處腰膝相連應與腎並治否再懇求先生酌奪一方於金鋼鑽披露倘能服愈定當重酬盛德決不以事過情遷而不報答也匆此即請道安並希早日披露為盼左復函前方兩顧既未見效法當分治先治其不眠製半夏三錢北秫米包四錢朱獲神四錢夜交藤四錢川連三分炒阿膠三錢此方連服七日七張君函士翁道鑒元宦自去歲夏季偶得癢疹病遍延中西醫士百藥雜投迄無效果痛苦萬狀近因閱先生所著劍俠小說欣悉先生不獨文學淵博而且精於漢醫堪稱國手歡忭莫名擬仰懇先生本慈航普渡之旨為宦酌立一方或尊處有現成藥品賜函示知價目定當匯款購買如無成藥則立方之費亦懇示及必當照寄不誤總之元宦志在立起沉屙並不敢吝惜費用務乞先生博展鴻慈莫名頂感順頌福安張又函士諤先生道鑒昨接惠寄診例二紙敬悉一切今遵章由郵局匯上大洋四元希即兌收並懇立賜仙方從速寄下以便照服而起沉屙至於鄙人病原病狀前函業經詳陳茲不贅述語云信而後醫今鄙人於先生千里求醫可謂信矣精誠所結金石為開將來服藥之後定獲奇效可預卜也敬乞大國手逾格費神莫名頂感順頌壺安張張附言附啟者請先生臨開方時務將病原及治法詳論見告以祛煩惑鄙人近來飲食日減困倦日甚大便仍舊秘結疙瘩已集中於兩腿部形如朱砂其色鮮紅刺癢不堪入夜益甚如徒步行走數百步則頓覺周身火熱所有疙瘩立時刺癢加倍中醫有謂脾濕者有謂血熱者有謂內蘊風邪者但試服其藥成如石沉大海西醫有謂係皮膚病者有謂係花柳病者然試注射皮膚藥針花柳藥針均無寸效鄙近二年來因患斯病日吸芙蓉三次特此附告謹將病原及病狀列下敬請亮察宦素患胃病遺精病荏苒十年忽愈忽劇迄未根治嗣因練習靜坐病熱稍減因政海浮沉靜坐久輟但病尚未劇烈不過身體精神俱甚衰弱此次癢疹初起在年五六月之間舊曆先由腿部繼及胸背十餘日後即遍周身矣其癢難堪不能忍受其疙瘩如豆粒或米粒其色紅始服中藥繼到醫院注射均不見效延至冬初始見平復今年五六月間疙瘩又起其形狀與刺癢與去年相同及服中醫湯藥則疙瘩由大變小由一變百全身幾無完膚宛如疥癩令人不忍卒視其刺癢增加萬倍嗣經友人告一偏方用爆竹中之藥用豬油包上擦在患部用炭火烤之頓見效益但此愈彼起僅能收效一時不能根本除治旋又在醫院注射藥針亦不見效又注射治皮膚病藥針亦不見效現在飲食減少精神不振每日疲困不堪頭一著枕即昏昏睡去無論晝夜清晨九點上斑非經家人數度呼喚不醒至於房事每一月或兩月始行一次然至多不過五分鐘而已可見精衰氣竭如有所述不詳不盡先生有應垂訊之處即請賜函示之必當奉告台前也至於郵資統由元宦擔負決不累及先生分毫也諸希朗照不宣張又函本年六七月間曾延崔先生服肉桂附子桂枝半夏麻黃升麻等等藥品病勢驟然劇烈甚至周身如疥如癩潰爛流水嗣用爆竹藥炭火烤患處始見略愈此醫歷任稅捐局長等差素有大名醫之稱不意經其一治幾不可收拾又在京中延聘著名漢醫投以五爪紅白蘚皮油貢朴杏仁桃仁等等藥品無過無功平平無奇據稱此病係屬濕氣胃中有病西醫則謂係屬花柳但注射花柳藥針多至一二十次亦不見效且元宦已十餘年未履曲巷即從前亦不過逢場作戲年中僅幾次而已宿妓至多不過十次何至有如此之大毒即有毒而藥針何以不效實屬疑問此病一發即患大便秘結排泄一次甚至力竭聲嘶須三四個鐘點且有時非用油藥由肛門注入否則不下以此觀之似此病與腸胃有關亦未可知疙瘩起時如用爆竹中藥合豬油擦上用炭火烤之則立即止癢晚間擦烤能延至次日清晨清晨擦烤則能延至晚間此理殊不可解疙瘩起處多在血管之上或在血管近處亦不知何故上至頭部下至手足無一處不起甚至指尖處亦起此種疙瘩茲啟者元宦現年三十九歲奉天人幼年讀書常有勞力過度處中年境遇坎坷憂傷亦有過度之處十年以來漸入佳境然積弱之軀不易遽復健康也復函據述身發紅疹其形大者如豆小者如米奇癢難忍病歷三載此乃胃家血熱與脾家濕熱連橫為患脾胃皆主肌肉故肌肉奇癢腸胃內氣陽明故大便閉結陽明為多氣多血之經故血管近處最多爆竹中藥能燥濕不能清熱能燥濕故能暫時見效不能清熱故隨愈隨發此病既非花柳亦與皮膚無涉西醫所斷殊難可信病既血熱濕熱連橫為患再投附桂熱藥抱薪救火適增其焰矣奉上兩方一內服一外敷黃連一錢黃柏一錢黃芩三錢連翹三錢銀花四錢綠豆衣四錢生甘草七分飛滑石四錢冬瓜皮六錢霜桑葉三錢鮮竹葉三錢清水兩碗浸透煎成藥汁一碗去渣頓服處敷方生茅朮五錢丹皮五錢生大黃一兩黃連五錢橘紅五錢薄荷一兩上藥共細末和以豬胰脂油敷患處可用白蘚皮地膚子淨蟬衣薄荷白僵蠶晚蠶沙同煎湯洗擦亦效八鎮江洪某某君函士諤先生尊鑒敬陳者僕年幼無知誤交劣友又中淫書之迷終日神思恍惚回想書中情景若有餘味致造意淫時或撫弄陽物日久成習至十七歲始戒除意淫仍舊但未越一年欲念時起終弗能堅持乃變本加厲非法出精約月二三次其時身體衰弱面黃肌瘦不思飲食小便特多清夜捫心自覺愧對遂發狠根本戒除然悔之已晚今年十九歲發育不全咽喉未突起腋下無毛陰毛稀少陽物短小少年無知一至如此且僕係獨生子堂上雙親抱孫心切每提及婚事僕輒以年幼為詞長此以往終非良策久仰先生醫道精微神未絕倫對於此症諒有奇術妙方特此上函敬懇乞在醫林示復以救殘生恩同再造肅此敬頌德安洪復函此腎氣衰也宜吞服金匱腎氣丸每日三錢淡鹽湯下此丸國藥店皆有售九周函士諤先生尊鑒敬啟者茲有疑症一件因久聞先生學術精深故特不揣冒昧專函叩教祈在鑽報醫林內示下治法不獨晚生感激敝成闔家尤當永銘五中也敝戚居京其長女今年歲自去歲舊曆六月起天癸忽止半月後又覺身熱昏悶見食嘔吐喜睡初疑有孕後延醫診治云係肝血胃結之症連診三次連服歸芍枳梔等藥十餘劑各痛盡失飲食加增大致與平常無異即停止服藥然其經仍未行至八月底食蟹數隻不多日腹部膨脹胃納如常故又診治並服理氣消脹等藥十餘劑經仍未行至十月去蘇州診治藥亦不下十餘味不外調經理氣等等服藥至今未斷其現狀腹大如四五月孕上月起睡後有塊如小掌大在臍上撐動小腹仍軟如常腹饑時亦軟食後脹硬氣悶早晨又寬軟胃口如常未悉此症是否氣結血閉成痞其經已停將八月究若何故本當至申上海造府面叩診察實因京南京申往返非二日不可於未熟悉申地者究若不便茲囑晚生函奉一俟有便友出申當偕至候先生面治也臨書匆匆敬候仁示專此敬請時祉周復函內經云男子內結七疝婦子帶下瘕聚令親之病不礙飲食則與腸胃無涉凡氣之結無不關乎血氣凝滯當是瘕聚無疑可向著名國藥店購鱉甲煎丸每日空腹吞服一錢連服七日再談十韓君函士諤先生偉鑒敬啟者敝友張君年三十八歲於七年前正二月間患耳聾症即二耳如蟬鳴頭目暈眩神志不清頭響如潮聲此乃係心火肝火上升故頭部有聲兩耳被蒙以致失聰投以滋水降火及引火歸元法漸愈不料於是年十一月天氣寒冷時復發由其鄉間醫生診治方用鱉血柴胡砂仁拌熟地細辛杭菊花懷牛膝生枳殼僵蠶川通草蓮子心小青皮炒杞子白蒺藜等連服數帖即愈而翌年十二月又發以後年發一次必在十二月正月間在天氣寒冷時偶患傷風其症即發直至五六月天熱方愈天寒則發天熱則愈年年如此困苦情形莫可言狀邇今天氣寒冷為感冒風寒二耳又告失聰脈濡細苔膩須待至天熱方可全愈先生為國醫泰斗善濟人急懇求速賜妙方登於金鋼鑽報倘能藥到病除則恩同再造矣順請新年如意韓復函貴友耳聾天寒則病天熱自瘥此乃陽郁陰中欲升不得升降失其常度春升秋降冬夏為甚冬至陽升夏至陰生此不過升降之徵兆究其實際夏則生之至冬則降之至姑擬小方請一試之活磁石二兩細辛七分以上二味文火熬清水三大杯熬成藥汁一杯臨臥頓服服藥後即以絲綿裹鐵落碎粒少許塞兩耳中連服三劑十一蔡君函士諤老先生尊鑒久未奉教鄙吝之念復萌近維新春大吉諸事如意為頌為賀茲啟者有醫藥一項念晚生年輕學淺不能解決故特專函請教祈為指導是幸事緣敝戚郭君去年回粵得識粵醫譚孟勤今春譚醫寄來一方與郭君云為家庭太平藥劑無論其人身體寒熱虛實皆可服用寒者自愈即熱者食之亦能瀉熱但觀其方辛熱異常且其份量亦比尋常藥方重十餘倍郭君食之精神增加其家人食之亦俱見佳尚有敝成陳君家人潘君家人等食之亦無不精神爽利其中雖有寒體然亦不無熱體如有常流鼻血及牙出血者亦有肝火上升者又有平日便結者又有失眠者但食之均能自愈且大便暢順試研究其藥味則不莫名其妙茲將該藥方開列如下胡椒八兩川椒八兩細辛八兩陳皮二兩北五味四兩如有喘加半夏六兩用二十四碗水煎成一碗頓服以上五味均辛熱之藥寒熱之體俱能醫治豈非神乎其中奧妙還祈老先生研究指教是幸嵩此順請春安蔡復函此劫劑也以二椒之散細辛之升陳皮之行而有五味之酸澀監制之則椒辛橘為所牽制縛英雄之手檻虎豹於阱只能鼓動氣血不能為禍腸胃猶之吸鴉片煙者之精神得振江湖劫劑不可為訓煩寄語諸親友幸毋以劫劑自戕也十二郭君函士諤大醫士偉鑒敬啟者久慕大名未能前來請教為憾先生對於醫理至精病者受惠實多近更為遠處通譏請教之病者在金鋼鑽報示明病理及處方則授惠遠道病者更不勝其數矣茲將鄙人之病況奉告於後煩請先生將病理及服何藥披露於金鋼鑽報則感謝不盡矣病狀左耳常鳴及至最近厲害聽時屆須雙目一閉夜間睡眠不安如睡非睡熟之狀惡夢連綿不斷在睡第一覺比較安靜些到午夜二時左右醒後則頗難入睡既入睡不到二十分鐘左右即被惡夢驚醒如此直至天明早晚有咳嗽早晨較劇痰灰白不多口沫甚膩白色喝開水咽口水時頗易誤入氣管而致咳嗽頭部常覺發熱不舒服尤其是晨八時至十時及飯後喉問覺干哮雖無痰亦欲咳嗽一下才舒服作任何事心終甚為著急一運動或一著急則呼吸即甚急促前幾個月每隔五六天遺精一次後服中藥現已二十天沒有遺精而以上七種病症迄無稍愈用敢煩勞敬頌大安郭復函此肝膽有餘火肺胃有餘飲也奉上小方宜連服五劑製半夏三錢川貝母三錢竹二青三錢不知是何藥枇杷葉去毛三錢青陳皮各八分朱茯神四錢夜交藤三錢川連三分生甘草三分十三顧君函士諤大醫士有道久仰盛名無緣拜識每讀鑽報至醫藥欄論欽佩無任僕腸胃消化素強惟有蛀牙致右面齶齒失職只能一面咀嚼十載以來致腸胃中時覺脹滿劇作時臍部小腹間續痛不已約三四天始止其時頻欲下便而所下僅黑灰芕溏汁少許此種作痛每年約二三次平時胃欲雖大腸中消化不任無多進食則脹未知應常服何種藥品為宜敢請先生擬方載於鑽報是荷如丸藥更妙因僕作客滬上煮煎不便耑此祗頌爐安顧復函貴恙乃睥運失健也奉上小方宜制丸服生白朮五錢焦枳實一兩雞內金一兩焦穀麥芽各一兩神麯一兩清炙甘草五錢焦山餷一兩共研細末飯湯泛丸梧子大每食前吞服十五丸開水下一日三次十四徐君函陸士諤先生道鑒小兒現年四歲半在二年半前的春天陡然發燒驚惶啼哭腰以下癱軟如綿不能坐立當求醫服藥燒退左腿即行復原惟右腿自膝以下不紅不腫熱天時有汗如滲冷天時觸手如冰不知伸曲肌肉消瘦迭經中西醫診治或謂係風濕內侵宜服熱燥之藥或謂係神經麻痹宜用電療二年以來稍能站立而不能自由伸曲如故西醫並謂須自然恢復無特效藥殊為絕望僕夙仰先生為醫界泰斗濟世為懷因不揣冒昧專函干瀆伏乞惠示醫治方法則感荷無慨矣即頌壺安徐復函此痹證也古稱難治姑擬小方試之黨參三錢川桂枝一錢白芍一錢懷牛膝一錢鹿角膠七分另烊化入藥十五鄭君函士諤先生大鑒讀鑽報時聆偉說欣慰莫名僕少嗜醫奈乏師承等於盲人暗中摸索今得一睹曙光未始非三生有幸也茲有請者內人向有帶疾乃月初自止而腦後之發腳髮際處突起小瘡大便秘結喉干口苦脈頗洪實本人自服瀉丸大瀉三次竟小便不通刺痛欲死僕以蓮梗二兩陳皮五錢甘草梢三錢木通三錢水煎服始略通乃翌日復閉且遍體出小疹如米其癢異常脈轉弦數再以龍膽瀉肝湯及當歸蘆薈丸亦時通時閉如是十日精神漸疲脈亦弦軟且午後至夜半更重喉干欲焦試以四物湯加黑山梔丹皮元參麥冬肉桂等服之尿始出顧數而短陰癢難耐不得已仿國醫新話法用桃仁研碎綿裹納陰中癢竟止溺亦不甚數但一去桃仁又復作殊深悶損此症似屬濕熱惟舌苔淡而不渴尚能食未蔔將何以善其後耳願先生有以教之專此並頌診安鄭復函尊言濕熱足見卓識第病機似在氣機姑以輕藥重用法治之銀花綠豆衣梗通草各一兩煎湯代茶或有效也此方從舌苔淡而化出也十六張君函士諤先生大鑒讀鑽報見先生為人解答疑難疾病造惠病家深感欽佩茲鄙人亦有二病煩勞先生左眼有花點甚多花點在看書時方有眼內決無與常眼同前首起只二點亦未注意現竟加至六七點看物時隨視線而轉移心甚厭惡前年夏日著短褲坐於凳上被友某誤將銅元擲於右睾九上當時睾丸在內反復轉動痛甚有頃即下墜睡時復縮上如此念數日方不再下墜隔一年又復發痛更甚肛門亦抽動伸縮睡二小時方止現在睾丸右略大因恐其復發有何藥醫治以上二病獲請先生解答於金鋼鑽報則感德無涯專此上達即請德安張注睾丸下墜仍勞作未休息花點形看遠處花點亦遠看近則近看近則小看遠則大而長復函左眼有花點宜以穭豆衣五錢煎湯服連服一個月銅元擲傷病屬不內外因余是內科愧難代謀左眼有花點今之遠視也應配鏡以矯正之陸公用穭豆衣者欲以清熱而明目也校者注十七陳君函敬啟者久仰大名時深響往近更特辟醫林拔人痛苦欽佩尤深茲有懇者室人素體衰弱年事已在五十以上平素血熱大腸秘結向來五六天始通一次通時又須坐桶七八回方下乾燥非常困苦委實難堪常服平肝涼血補血等藥均不見效即服瀉腸藥品如瀉葉瀉鹽等亦等於零此等怪症殊屬可惡務請先生對症批答並賜良方藉資治理以祛病源實為幸甚附上信封一扣並信紙兩張伏祈詳細批答並擬一方加封擲下為禱專此奉懇順請大安陳復函尊夫人既病熱體弱則攻劑斷不可服奉上小方試服十劑淡蓯蓉八錢大生地八錢全當歸四錢生白芍四錢核桃肉五個打碎郁李仁五錢大麻仁四錢十八譚君函士諤先生大鑒敬啟者近閱大著得知先生學術精深存心濟世為國醫放大光明為人生健康造福弟恨遠處南方未獲親叩鴻儀飫黔大教唯見尊著醫學南針卷末附先生有診例通函論症一條不勝欣幸之至蓋弟身有宿疾二十餘年來中西醫尊均經嘗試雖不無小效然終未斷根今見先生之高明實恨相知之晚用敢不揣冒昧將弟之症情詳細函陳並將例金四元奉上以萬分至誠至敬之意請先生賜我良方及指示攝生床第之法俾得舊疾消除恢復人生樂趣則不啻恩同再造矣謹此敬請大安譚體格及生活情況年齡現年歲體格筋肉頗堅實身高約四尺四寸體重約余斤脈搏平時每分鐘跳生活經歷自少讀書自歲以後在實業界做事嗜好不飲酒不吸煙不賭博不狎邪喜遊玩好音樂美術惟讀書則精神不甚貫注病歷及症情遺精歲時同居中有患麻風病者不知因何而受其傳染非有肉體之接觸中年之後方醫全可但夢遺繼之由十餘歲而至三十餘歲後仍有夢遺之病未斷惟近數年來屢經中西醫藥療治此疾患已少有時月中不過一二次比之從前好得多矣頭暈頭痛自十餘歲已常有之在二十餘歲時凡至眾人集會空氣穢濁之處或行遠路則必頭暈其暈必在額初則暈暈極則痛痛極則欲嘔而不嘔必熟睡數小時後方復原近來此病已較好其暈痛已不似前十數年之頻且劇矣惟有時似覺有虛火上衝如口燥鼻中有血而且心胸脹悶及心跳時則勢必時連頭暈頭痛其暈仍是在額也心跳怔忡平常多覺心跳以致心胸脹悶不舒有心跳之現象時必隨覺頭暈又平時縱寧靜而當與異性接觸性欲勃發之際心臟必大跳特跳以至全身不克鎮靜精神不能自主早洩精稀平生少與異性交接一有交接則因一時性欲衝動即極度心跳不能自製因此甫交即泄甚至未交而泄者亦有之有時與老妻敦倫必要毫無介意情欲絕不舉奮而後方能持久如是則又舉而不堅痿而沒趣至於精液則素來均甚稀薄而無結晶龜頭則平時凍而不暖中氣不足平生少言語一多言語或激昂言語高聲言語時則覺中氣不接而致頭痛大小便大便常通順小便亦不頻不數且素無夜尿惟平時多黃赤起居飲食平時嗜睡夜間必須在十點鐘以前就寢睡足八九小時方可不然若深夜坐過十二點鐘以後則次日必精神不足而頭暈頭痛見矣食量每餐兩碗算是平常茶水平生不甚多飲有時眼見火星飛有時手足各處及陰囊後陰莖之根皮肉跳動譚復函譚君肝陽有餘腎陰不足肝主升腎主泄頭暈頭痛怔忡脹悶不舒凡此或為直接或為間接皆屬肝之為病皆病肝陽有餘性動心悸甫交即泄此屬腎之為病病在腎陰不足所幸眠食如常根本猶未動搖對證發藥惟有斂肝益腎庶幾利多弊少萬里擬方是否悉中病情尚祈貴地道中一酌之別直參五錢鹽川柏五錢生甘草五錢天冬五錢川連五錢五味子五錢大熟地兩生白芍五錢春砂仁三錢青龍骨一兩左牡蠣一兩炙桑椹一兩上藥十二味共研細末飯湯泛為丸朱砂為衣丸如綠豆大每食前吞服一錢開水下日三服十九張君函士諤醫師賜鑒久耳大名素佩仁術惠護病家無微不臻迥非一般時醫好利者所可比擬也謹陳者鄙人向操船業體格素健往時從未纏病詎於舊曆七月間患時寒時熱類似瘧病仿佛初則日必一次嗣以職屬受雇勞工未便久延又無力辭養故曾求醫診治乃服藥後雖不再日必一次須隔二三日仍復如是奈何每發之日則不僅一次矣冷時較熱時為多至飲食胃口及大小便暨睡眠等均與未病時無異惟兩腿乏力行路氣喘口味苦生平好酒而今已戒除二月未知何病因知神術高明慈腸古道務乞鑒核賜方以解二豎困纏且賴不致失業不勝感盼之至專上順請台安根林拜手復函貴恙乃是伏邪症邪伏在腠理與臟腑無涉所以飲食起居如常宜就近延名中醫診治脈證不詳礙難擬方諒之二十肇嘉路號範信愚君函士諤先生大鑒久讀鑽報見先生之為讀者答復醫藥上之疑難而設醫藥問答一欄以與讀者之方便而更得解惑之惠實所欽佩之至茲者鄰居祝姓有一女年歲幼年因性地窄狹稍有逆意即積氣成郁於歲時突因與丈夫爭突一時鬱氣上升遂成癡癲之症終日引歌高唱時或漫駡若見鬼狀而更日以繼夜煩擾不堪當時困惑西醫神經病之說雜亂投藥俱無少效後更延請中醫仍不見愈至今終日高歌引唱二日呆而直視頭眩胸滿眠食無定饑而不欲食食則不多口渴而舌黃面發白而瘦大小便則仍通惟經水須四五十天而一來色亦鮮紅惟早歲因氣鬱而吸鴉片煙至今仍欲吸此然因環境而已少吸雖欲為之戒除而不可能也惟有時亦能清醒與人談話然不一刻則又漫駡高歌而唱矣六年以來其家為此女之病雖百計求方因之而傾家蕩產然於此病仍無一效也今復遭其走之遺棄退居母家以致貧病更加奈何無余力診治然其癡癲之狀至為痛苦敝人忝居其鄉目睹其狀因感其可憐而請之於先生尚望為之一發慈悲義務答復有否經濟治法尚祈惠賜以除宿疾自當感銘五中永垂不忘實為切禱之至耑此敬請診安範復函鬱怒傷肝已成狂疾病歷六年實難治療姑擬小方以試之鮮石菖蒲生山梔各三錢蒼龍骨左牡蠣各八錢水煎服連服三日二十一李君函士諤先生道鑒敬啟者常於金鋼鑽報得見大作著述宏深欽佩之至鄙人患鼻病多年迄未治癒素仰高明謹列病狀請先生指示鼻塞惟兩孔每輪流塞鼻內時個個作聲多濃涕而兩耳內多黃色薄垢神經衰弱嗅覺減退而精神不能集中痛苦萬分特冒昧來函不知有何治法以何法為有神效謹請於金鋼鑽報端答示是所至禱肅此敬頌撰安李復函此鼻淵之初也不治必成鼻淵可向國藥店購通關散時時嗅之二十二劉君函士諤先生大鑒地角天涯緣慳一面遙企泰斗不覺憮然先生學通靈素朮賽岐黃指岐伯黃帝普天之下莫不同仰北辰故雖荊州未識而神登堂上者非伊朝夕矣敢布積悃以表葵傾茲有肅者家父為二堅所困所茲二月尚未喜占勿藥深為抱慮久仰先生道高德重朮可回生法能再造奈何以迢迢長路不可梯航言與及此涕淚交並前日檢閱方書之餘在尊著醫學南針卷末見有通函論證一例不禁蹲蹲起舞雀躍三千用特條陳病狀以瀆清鑒懇為擬方擲下俾病入膏肓者得以著手回春則感恩戴德於靡既矣耑此敬請醫安惟照不宣劉茲將病狀條列於下病之起源兩足有一種無形之串痛起於今年三月間下旬此種足痛數年來時發時止或係酒患亦未可知嗣服涼血清火之藥已愈醫治經過家父今年歲體質素來贏弱故受滋補因足愈後曾服花旗參湯及川芎蒸雞蛋二物以圖健壯詎知忽生寒熱之病延醫診治連喂桂枝湯加減二劑無效再延一醫云是感暑用香薷飲加葛根桑菊飲加歸身萸肉等藥不期逼血上吐其色鮮紅乃另延一醫施治云是陰損服鱉甲牡蠣等藥無效又延一醫云是痰火暇以清涼之品誤雜法夏七八錢又無效又延一醫云是虛癆火熾施以建中湯加冬蟲草又無效且動則氣高而喘又延一醫服以厚朴枳實等藥又無效現醫以肅肺和肝疏土滋水之法暇四日略見微效嗣因病者苦於糞逼乃以元明粉三錢瀉一次肢體反覺倦怠即用生黨參五錢以顧元氣同時又因食豬肉粥其病復篤而病者仍有糞逼之苦醫者前因元明粉之峻有傷腸胃不敢復用乃改用郁李仁以滑之尖檳榔直抵肛門者仍希一瀉豈知不但不瀉其舌之上半截挨左處現有如山楂色之苔刻即回用肅肺和肝之藥其苔又轉回淡黃之色其苔未變山楂色之前本屬淡黃色其脈右手寸關浮數然浮取則帶小象中取則略大左手之脈亦一如右手惟比較小些兩目青龍略達四白雙足不能步履兩手接舉物件有些振動腹不見饑口不欲食且不欲言言則低微凡飲食入腹其腹部即格外發熱其氣炙手兼見臍上跳動等證茲問數則統希答復復函氣機窒滯運化無權議補議攻皆非計也補則氣機愈滯攻則正氣益傷當以輕清流動之品先展其氣機北沙參四錢生白芍三錢長須穀芽四錢枇杷葉去毛三錢鮮竹茹三錢鮮菖蒲三錢白茯苓三錢梗通草八分越一月劉君來信道謝言此方服二十三劑而病如失輕方愈重病實出意外並乞再與補方余回信勸乃翁薄滋味以養胃遊山水以養性精神之補較之藥方功效相等也二十三李君函士諤大醫師偉鑒敬啟者昨閱醫學南針藉悉先生並可通函治病茲特懇請代為擬方謹將病狀開錄如下敝人自民二十二年即患大便帶血夾膿似痢非痢雞鳴起瀉日五六次或八九次時覺腹疼所幸一顯就過千方百藥莫能奏效時輕時重實難除根所便膿血或在便前或在便後更有時統便全係膿血大便絕少惟在雞鳴瀉時大便較多而膿血較少或無早飯後則膿血多焉時覺腸鳴該症現已二年有餘漸漸肌肉削瘦四肢無力精神頹萎惟因飲食未減故略能支持順祝台綏車復函便膿血兼五更瀉已曆二載形體瘦削中虛可知法與補中潞黨參三錢生綿耆三錢黑薑一錢土炒白朮三錢炙甘草八分雞血藤膠三錢參三七二錢炒阿膠二錢扁豆衣三錢加升麻七分柴胡八分此腸紅腎瀉也方中雞血藤膠乃治血症虛損要藥二十四諶君函士諤先生鄙人現年歲十年前不斷涉足花柳場所現在則僅有吸紙煙嗜好民十八年在上海時頭部忽發昏眩睜眼閉眼什物旋轉如走馬燈幾欲倒地繼即汗出如滲為時約十分鐘始已繼即作嘔欲吐以後每年約照樣發二三次至二十三年幾每月必發一次時間約三四分鐘惟已無汗眩暈後仍欲嘔吐投以豆蔻始已繼求友人處檢驗血液認為含有梅毒經注射並服藥粉共六次至今約一年眩症未發此一年中並練習太極拳每天一次每日兩餐每餐飯二碗半早吃點心一次每晨七時起每晚至遲十一時以前入睡每早必大便一次至全部身體現狀自腰以上頗為發達頭部尤甚腰以下則甚瘦今煩先生者即頭部特別發達頭部皮膚太緊稍一用力頸部筋即脹起露出同時面部及眼球亦紅脹如低頭拾物或作事亦有同樣情狀敢問服何藥方能免去以上病態敬函詢高明於金鋼鑽報上賜示為感諶復函此肝升太過肺降無權也宜服降氣平肝之劑希就楚地名中醫診治安心服藥自能全愈二十五胡君函士諤先生惠鑒久欽道範彌切馳思識荊無緣徒懷慕藺茲懇者敝友朱君每屆冬令遍身乾燥發癢難過無比偶一搔抓非至皮破血出不能甘休因此務乞賜一良方不勝感激嵩此即請壺安胡復函此風燥也病雖不重極難治桑葉杭菊各三錢薄荷一錢三味泡湯代茶服此由血虛風燥可加竹二青生白芍丹皮生地二十六王君函陸士諤先生大鑒徑啟者不佞內子素患經帶疾於茲有年初遍服市上調經藥劑以其無見功效乃延醫診視亦無甚差異久仰先生乃醫界泰斗婦科聖手謹將詳細情狀錄呈奉教即遵論症例匯上四元敬懇賜示有效良方俾得早脫苦海不勝銘感翹首切望之至專此並請大安王經過內子身體素弱蓋產於母之病後先天不無影響成年後月信僅最初數月准期以後則常後行帶盛然於身體尚不覺有甚關係也婚後初無異於前適後漸久每於經前即腰酸經行腹痛經色時而紅黑時而淡黃自服烏雞白鳳丸丸燒豬肉月服一次後經即前行本年六月間曾因血熱妄行據當時醫生所斷經血由鼻管流出臥病多日服藥後鼻血即止月信僅病後翌月對行一次以後即月或行一次或二次病象無殊於前也現在月信仍不調月行一二次無定上月舊曆二十二日行而本月初九日復來經量少色淡面色枯黃經血來時腹部悶脹時作陣痛帶甚盛色白多時猶經血之來潮也心悸頭時眩掌心熱小便不清呈紅黑色大便數日一通胃不健食量不多腹時作雷鳴右足麻木醫言敝醫生多斷為肝鬱症謂即不宜補復不能猛攻惟和解一途服過藥品天壽堂姑嫂丸天喜堂調經丸三友實業社婦女救苦丸僅用一粒取藥時白帶甚多及日本中將湯烏雞白鳳丸逍遙散醫生處方一二十荊處方多失散無從檢呈等附錄年歲歲性情沉默寡言笑嗜好無復函王夫人經前腰酸經行腹痛心悸頭眩大便數日一行此奇經八脈為病也醫言肝鬱只識其半全當歸二錢川芎一錢生地砂仁拌四錢川斷三錢川廣鬱金各三錢大白芍二錢生香附二錢橘葉三錢夜交藤三錢加紅雞冠花三錢二十七魏君函士諤先生有道屢讀大著關於國藥之發明闡精闢微至佩宏論復於病家不惜指示迷津援登彼岸益見悲天憫人之懷茲者僕以先天弱軀後天失調百病叢生西醫既立霸道復以貴族化不敢問津而國醫真正學識經驗宏富如先生者亦不可多得用敢不憚煩碎冒讀欲一求指示先生其許我乎僕之病原不外體弱然亦因環境不良伊鬱多時亦不無關係去歲腰上寸許背肋骨下之軟肉為腳車柄所沖當時並不覺如何曾服三七外敷等翌日即覺氣喘後亦不覺怎樣曾照愛克斯光謂無傷迄已有年餘近時常痛據云恐內部傷氣而皮外固無一些痕跡也僕年歲素來本患腰痛早起最甚既起即不覺而目光銳減視物如霧晚間燈光下尤甚早起眼汙黃厚非細用巾拭不盡而久視或就睡時試一閉目則眼酸不耐而淚出始快今秋則頭髮銳脫稍一梳洗發即紛飛集之得一指粗聽其長此將不日成為牛山濯濯矣凡此皆屬虛弱情形自不待言而左脅新一病似為氣痛上而牽連左乳作痛下而及背部腰上之板車沖處亦隱隱作痛日前因鬱悶大發三數日不止彎腰上下如有一物懸吊於左脅內試向下彎物即上攻痛苦非常後服五靈脂末藥稍愈不知究是肝氣抑為舊創內傷再飲食如常每飯總不離三碗而面容黃瘦且面上如粉之刺粒干硬尤多以上情形似身體組織非常混亂宜服何種藥劑及補劑為當又病之總因究為何種有否內傷及氣及發脫落之救濟渚如上述僕因之心緒惡劣而又窘於資久仰先生苦海明燈敢乞耗寶貴光陰不吝珠玉指示迷津俾脫苦海而登彼岸功德無量矣嵩此敬頌道安魏復函貴恙乃氣滯作痛升降失其常度法當舒其氣機奉方如下旋覆花包三錢川廣鬱金各二錢生香附三錢逍遙丸包三錢三劑水煎服日服一次候痛愈再治他症緣脫髮乃另一症不能一方並治也二十八黃君函士諤大醫士道鑒敬啟者久仰中醫精造著手回春拯民疾苦起沉屙於億萬治及奇難披恩澤於遐邇龍以多病之軀耳聞大名夙擬趁輪叩謁求治奈公務纏身無暇就醫既閱報載先生有通函論證之例謹將龍病狀經過及前後醫士方案膏丸詳細書陳請先生俯予裁奪從郵賜方寄下蓋龍早時操勞過度腎脾兩虧驚悸怔忡失眠遺精耳鳴之症於二十三年五月間患病不起當繹九江名醫診治類多歸脾湯天王補心丹之品食洋參石柱參人參膏頗多經數月調養吃醫士方膏暨腎腦再造丸雖覺精神略爽能眠五六小時然寐後盜汗終覺恍惚繼請他醫有謂吃黃蛋魚肚者吃後食量頓減口淡無味龍現每多隻飯一碗心常鬱抑背心兩脅惡寒天明對臍腹痛按之暫止神思不寧筋惕肉目閏手足不暖夢中驚醒頭暈目不能久視口不能多言間或腦痛或謂肝旺蓋龍現年只三十歲所吃之藥如用參附破故紙輩惡寒去而盜汗來用牡蠣龍骨芍藥輩盜汗止而精神差龍現猶氣少四肢無力僉謂腎陽虛藥偏於陽則盜汗心火上衝偏陰則減食無神謹郵呈診金並附呈各原方請求先生即日擲賜佳方為禱肅此敬請道安黃復函人身陰陽不能有偏偏則成病所謂陰者即是液陽者即是氣各有界限不能籠統言之也總之一切補藥入腹不能即成氣血亦必藉胃力以運行諸經各脈所以補品之先決要點必以不礙胃運為前提擬方如下試服可也宋半夏三錢青陳皮各八分吉林參須二錢大白芍三錢於朮一錢白茯苓二錢炙甘草四分夜交藤三錢生穀芽三錢此乃和中以開胃之法也二十九祝君函士諤先生大鑒鄙人愛讀鑽報五年於茲對醫林一欄更為欽佩幾至一日不可無此君之慨宗仰先生何似醫中之聖所以每有患恙較深者莫不介之先生以期著手回春耳然所介者十九見愈鄙人亦以杏林生色為榮問閱先生解答函問諸案異乎尋常益為心仰茲因敝親患有疑症針藥毫無見減以至束手無策且遠在外鄉不能舉踵益為憾故此函達仰祈付之報端或能賜函以告更為感激也按敝親係女性年已歲尚屬處女十年前右乳上寸許生一核狀物皮色不紅按之活動初以為痰核服藥與丹方均無效果二三年後漸大惟仍活動按之微痛如操勞較重即覺肝下脅痛迨至今日已十一年尚無異象不過時有乏力面黃而已至本年四五月較甚經來黃淡夏季患痢瀉旋愈至七月又操勞過度覺腰下腿部至足脛筋攣酸麻尚可步履勉力支持迨至申造黃鴻舫針治數次毫無鬆動服藥亦不效針兩次後反覺終日終夜酸麻肉跳不能安眠痛時淫汗不止恐不克久持送返鄉下迄有一月餘矣再有針過十次服過大活絡丹六粒湯藥亦用歸身潞黨黃耆均歸無效間有好過一天不酸不麻然夜間又腳凹起脹而漸麻而酸矣情狀可慘初起摸之覺松後來撫摸覺木故亦不按然而大腿尻骨以下較不波及今已移至小腹及腳部舌苔白膩而糙未知究屬何症更乞擬方試服為感杭州陸清潔先生之地址乞亟指明乃感並希示明就何醫為最妥事在燃眉乞即賜示為至感也此致即頌道安祝復函此病屬於肝不屬於風乳為肝之部諸筋皆屬於肝肝為剛臟在志為怒投以風藥猶之抱薪救火非徒無益也風者善行而數變安有病風十有一載未見絕大變動女子善懷病肝居多此症宜請內科診治當從解鬱舒肝入手如逍遙散加川貝母鬱金廣陳皮之屬又函敬答祝君十年夙恙積因甚多塊壘從乳至腰計五六處筋跳肢麻二便皆閉病由肝鬱療治極難今以十年之積恙憑片時之口述三劑湯藥悉與消除期望未免太殷矣女子善懷多鬱確是此病病源倘服舒郁宣氣之藥而病者情志不怡日增煩惱猶之馬路既已擁塞復以大量之車輛努力向此路進發欲求其通何可得也更方遵命照門診例惟第一須病者自尋快活倘迫於環境不能自樂日坐愁城中則服藥定然無效不必勞駕枉顧也鄙人心熱如火分痛有心分身乏術竊意貴地同道不少高明之士望以鄙意轉述倘能采及芻蕘撰方從肝鬱著手不啻鄙人親診矣三十李函士諤醫師台鑒接奉診例欣悉懸壺海上盛名彰著鄙人多年肝傷迄未治癒一因公務忙碌未能靜養二因藥不對症服而無效以致遷延日久幸鄙人心胸豁達故病未加重動作照常茲將病原病狀另紙錄奉祈作參考惟肝病之症頗為頑固尚乞費心酌擬藥方專懇敬頌台安李上附病情病原本人現年歲江蘇武進人體格壯實於歲時由蘇州北上旅居故都因受家庭口角之氣彼時年輕心胸不寬憤悶鬱結以致肝氣上衝升入左脅上部絡管破裂吐血一口幸蒙姑丈贈以上等厚朴二錢分二次服用逆氣平愈旋於歲時因入學無力在津謀得小事不免受人輕侮鬱鬱心中日久舊病復發逆氣上衝吐血約六七口即止惟瘀血雖然吐出而逆氣不降仍然上脹雖迭服平肝舒氣如厚朴鬱金等藥終不見降後因本人少年誤犯手淫時患遺精醫者以為腎虧肝旺迭復補虧平肝如熟地白芍等亦不見效此症迄已十多年時輕時重脹而不痛是肝傷太重非經長期靜養不能下降再前二次吐血血係紫色瘀血吐後本人仍照常動作並不臥床惟心中略有疑慮耳現在病狀肝氣上衝升入左脅上部脹悶為苦口中津液凝結大便不燥每日一次小便清淡頻數大有上熱下寒之勢夜眠有時手心發熱類似微蒸手指甲在秋燥時有時脆裂是否血燥兩足趾有時發隱痛是否血虛兩腿皮膚上有時發現大塊紅斑時隱時現是否血氣不暢兩足久立無力如日間動作過度夜必遺精所幸飲食安眠動作一如常人故可求治耳兩脈無力而遲舌苔略紫補述肝病氣衝係歲所得腎虧係三十七八歲覺得口中津液凝結係最近一二年所得此症以肝氣逆沖最苦口中津液凝結則次之至腎虧一症緣本人已一年以上保養遺精已愈嗣後格外小心或可漸愈故只將逆氣下降口中津液使潤則病去大半矣敬祈擬方賜治俾去病根感恩無盡復函李君肝為藏血之臟怒則傷肝肝傷則氣滯血溢氣滯則脹滿血溢則吐血此病原也厚朴雖消脹性偏剛燥肝為剛臟在志為怒兩剛相合頗非所宜氣衝左脅上部氣傷已兼及乎絡口中津液凝結顯然絡氣被阻升降已失常度法當柔肝舒絡看似平淡久服可許全愈若急欲見功難免流弊矣余立擬方快郵遞去囑連服一個月當見效驗處方如下旋覆花三錢青陳皮各一錢川廣鬱金各二錢猩絳紗錢半麩炒枳殼八分代赭石四錢連須蔥白三根生香附二錢宋半夏三錢加枇杷葉去毛包二錢竹二青三錢李君又函士諤大夫台鑒前接寄下治肝病藥方當即照服十帖胸脹已輕惟口中津液仍然凝結虧短查方單內囑連服一個月鄙人係將每帖藥分二日服用第一日服頭煎第二日服二煎如是連服一個月未知相同否又方單內有宋製半夏一味鄙人現兼有腎虧滑精症小便後每有薄精帶出脈沉細口中津液虧竭未知相宜否可否易以生津之藥茲將原方照抄附上並附回信郵資祈費神酌擬示復以便安心服用迄服用滿一個月後如何情形再行奉告敬求醫治為荷此請台安李上余回函告以宋製半夏性極平和與腎虧絕無關礙一劑藥須一日服完不能分兩日三十一趙君函余對於素問熱論仲景傷寒論及溫熱諸家之學說未免有所懷疑祈請函復復函素問熱論皆傷寒之類黃帝所問岐伯所對列舉六經證據都是統論外感仲景傷寒論分經論治分出傷寒中風溫病喝病濕病五種病證岐伯粗論大體仲景細辨其各證也學問之道其始也簡其繼也繁各種學問都是如是吾醫學當亦不能逃此公例尊問素問傳經之病究為熱病抑或傷寒實緣未悉岐伯是統論外感之故溫熱諸家不外補充仲景之學說並不是在仲景之外別樹一幟別立一說拙著醫學南針世界書局出版國醫新話校經山房出版早已詳論其所以其學說絕不抵觸總之吾人為學倘能注重證據見某證知病在何經某證知病在何腑則一切高遠之理論無謂之爭執皆可掃去而論症必以證據為依歸則古今學說皆可一以貫之矣三十二黃君函士諤先生惠鑒久耳鴻名恨未瞻韓敬佩之深難宣尺素屢見先生在新聞報國醫專刊答復病家質疑既詳且盡益歎先生之仁心仁術矣求之世風澆漓惟個人福利是圖之今日實屬罕有敬有懇者鄙人患有多年未愈之腦漏痼疾謹以十二萬分誠意敬求先生費數分鐘之寶貴光陰指示靈驗之方附奉病況經過藉供參考想先生慈善為懷當能不棄也千里仰教情出至真啣草含環終當圖報臨楮不勝拜禱之至專叩暑安翹企福音望切云霓黃鳴皋拜啟病名中醫謂鼻淵又名腦漏西醫謂慢性鼻膜炎此病之由來十年前每屆夏季兩頰紅腫服藥數方旋告全愈惟口鼻間發生一種臭味因經濟困難復不知此病之重要因循自誤至八年之久未嘗延醫診治此有礙身體健康及社會交際生平引為憾事診治經過天虛我生主編之家庭醫藥常識載有腦漏藥方係用斑螯一枚以薄棉裹之塞鼻孔立止曾依法塞鼻數次依然未止又承此間名醫指用廣霍香連枝葉一兩加雞肝搗丸連服三劑亦未見止中法藥房之腦漏立止藥亦曾購服數瓶又未見效此前後兩年之經過目前病況精神萎靡不振辦事略久即覺頭暈目眩不時有黃色水自腦中下香臭不聞現用硼酸水洗滌鼻部已有兩月亦無效復函貴恙受病之原由於腦戶受風此症本非易治所列藥品或補陰或益腦或清熱或化濕皆是好方皆是良法就可惜未曾中病此症主要療治當從風邪著手敬贈小方望請照服細辛一錢羌活二錢薄荷一錢蒼耳子三錢清水煎透去滓飯後服三十三黃君函敝人向有遺精之患不過每月只有三四次而已因恃著賤軀健強就沒有理會它那知在兩個多月前的早晨遺過一次後忽覺小腹隱痛同時睾丸也隨之病了起來並且大作寒熱家父當著敝人是小腸氣就請一位內科孫某診治診後也斷為疝氣就開了一張藥方服了一帖藥仍是罔效不過把寒熱除掉睾丸疼痛依然最後的第四次孫內科看敝人沒有退動就對家父說這樣病恐怕已變成囊癰頂好請一位外科看看於是家父又請了位外科劉某看過後據說確是囊癰並且是雙囊癰便在鄙人睾丸上每邊針了一下貼上兩張膏藥又開了一張什麼敗毒去濕的方子第一天沒有見得大效第二天又給劉某針了一下換了兩張膏藥後當夜便漸漸的止痛了消腫了第三天又針了一次又換了兩張膏藥就一點不痛的恢復原狀了誰料止痛的後二日鄙人小便忽現白色好象豆腐漿一般當時很驚奇的把白尿告知劉外科他道這是藥性把濕毒驅逐得無從容身便由小便中出來過了十幾天小便仍是白色方才疑心道怎麼濕毒這樣多十幾天都去不盡於是復將情形去問孫內科他說這恐怕是糖尿病第威德補腎丸是清尿毒的買些服服看敝人現已服了兩瓶仍無效驗方悟為兩位沒有經驗的醫生所誤追悔不及昨天友人告訴我先生是一位救苦救難的醫生常在新聞夜報國醫週刊上給病者答復都是把仁醫仁術來為病者謀幸福再造生趣所以敝人把白尿的起因和現在的病狀寫給先生請賜我一個詳細的復函感激得很黃敬上復函貴恙寒熱經內科治癒囊癰經外科治癒平心而論此兩醫不可謂無功第小便色白不曾愈耳糖尿病是西醫病名中醫書所不載愧不敢對小便如米泔水原因極多有因於熱者有因於濕者亦有濕熱兩盛者亦有因中虛氣化無權者尊函證據不備恕不敢妄對淩波按極有可能傷及精管引起精液外漏多半需行手術修補三十四戴君函士諤先生道鑒久仰德暉神情時注敬啟者因閱金鋼鑽月刊所載大作診余隨筆內有補品粥油一味勝西藥麥精魚肝油萬倍云但鄙人素性愚鈍不解粥油意義是否粳米粥之汁抑或糙米粥之汁其修治法是否煮粥候冷上面結就之厚皮乎甚為著疑敢乞示教為感事緣僕亦好學醫前年曾得陳靜遠道士授針灸之術商余研習已有數年診治本廠病者之外鄉間來求診者亦不絕於門惟屢逢陰虛氣弱之貧窮病家已不堪用針因氣血虛衰有暈針之患況針只能疏氣通筋活血利滯去風補虛實不能也又無力服藥且僕又係個人施診依人度日無余力接濟甚可歎也忽見先生所發明之粥油補品既價廉而味美可食何幸如之不惟鄙人之幸而我國民眾得之能遵依長服則卻病強身無東亞病夫之譏矣如蒙不棄祈指示一切則感德無涯也戴啟復函粥油即粳米粥面上之稠汁不必候冷結衣隨便舀隨便服不必定要糯米惟粳糯均可此物滋陰專滋陰液兼能補精也三十五太原明星文藝日報社函敬啟者頃閱貴報醫林欄內載有醫藥問答對於病因治療方法解答甚詳茲有山西某君在教育界服務右臂操勞過度於三年前得關節炎經太原某大醫院北平某著名醫院先後用石膏繃帶療治六月迨石膏繃帶取後病處開口七八處流黃稠膿水久不見愈最近經某醫院檢查結果肺胃腸各部均無病右臂關節處爛骨甚多惟除關節部分開口發青色外右手動作自如飲食睡眠亦均如常醫院主張鋸臂某君及其友好皆不願聞上海寶隆醫院骨科甚負盛名惟不悉該醫院在何街巷診療費如何計算以及對此清苦人士能否優待均請貴編輯費神代為查詢示知為荷此致金鋼鑽報醫林編輯部復函此症即為石膏繃帶久繃之故因氣血凝滯而成此死肌症耳一誤不可再誤及早回頭改延中醫診治尚有希望倘再請教西醫定成廢人內科之桂枝加附子湯外科之陽和湯似皆可服希就近延請著名中醫診治勿再打聽西醫也三十六梁君函士諤先生大鑒敬啟者僕患性病甚久殊感痛苦前因就事於窮鄉僻壤既無良醫返滬後見懸牌專治性病之醫生頗多誠恐掛羊頭而賣狗肉者則不特無益反受其損故始終未敢冒然就醫先生醫術高深素所敬佩復於報端長見為病家解答疑問具見熱心人群幸福也今僕將病狀及經過詳列於下上瀆清神尚乞賜予指示俾復康健之軀則感戴無既矣敬頌道安梁病狀經過列下僕今年歲從少多病歲時出外就事偶涉足花間即患白濁治癒後不敢復遊花下乃以手淫解決性欲一年後體覺不支遺精病作繼而小便頻數遂乃戒除手淫惡習而覓醫調治並由服藥無數醫生開一方配丸於秋冬時服用但終未覺愈今年結婚遺精之症已止而早洩之症又生甫交即泄快感毫無且小便頻數之症令人甚苦每一刻鐘即須小便一次且小便時無力而射不遠尿後返滴性具縮小龜頭皮皺縐手足冰冷面黃肌瘦以上各症不知先生可為醫治否並請先生賜一補養方法復函貴恙乃是腎虧精關不固可向國藥店購金鎖固精丸吞服每日空腹吞服三錢連服至一個月可見小效三十七趙君函陸士諤先生台鑒仰慕大名響往已久每於鑽報上得睹先生論醫宏文淵博深邃尤勝欽佩更特辟醫林摛發國華拔人痛苦是誠吾人之幸運也茲懇者鄙人現廿一歲患遺精之症緣以歲時誤犯手淫歲結婚後數月即遠客異地潔身自愛詎意遺精之症即於是時起矣二三年來月必三四次常十餘日或六七日一次不等且遺輒在午夜熟睡之際不知不夢醒來則淋漓滿身心殊怨恨所異者鄙人孤食獨宿未嘗有所胡思亂想且上床依枕便酣然入夢從無失眠之症自覺身體尚健食胃亦佳惟遺精之症終不見愈若此延綿日久有傷精神心中私念悒悒奚如先生大才諒不吝良方見賜載答醫林以蠲我不良之疾盛情厚德銘感心頭矣嵩此敬頌日祉趙復函貴恙宜向國藥店購三才封髓丹每日臨臥吞服三錢淡鹽湯送下服一個月當見微效王道無近功切勿性急三十八胡君函士諤大夫台鑒近閱報載藉悉臺端編輯方書精心考訂辨論詳明誠我國醫界之寶筏病軀之金丹至為欽仰茲懇者鄙人以醫理精微生命所係自惴愚陋不敢翻閱近以報載第威德補腎丸功效奇大購服三年不覺小便渾濁後即停服小便漸漸較難必用力下蹲始得一次夜則自遺不禁近用手揉擠肛門前及腎囊等處愈擠緊則溺易出溺色帶赤時多清白色時少內多涕液形物將澄底涕液質用白紙盛攤沾於紙上用手擦之覺是多數白色細砂集成亦有時現出黑砂亦有時純係細液質並無黑白砂醫認此症為膏淋之一種將成砂淋之候脈象沉細亦不遲不數大便約二三日一次常覺秘結此外別無所苦今已四年醫士以溺赤為膀胱結熱重加知柏而色愈赤因服西瓜而色略清遂謂熱在氣分而涕液之汁終不能清醫謂係濕痰流入小腸膀胱服二陳湯除痰亦不見效改用冬葵滑石琥珀海金砂沉香瞿麥等滑利之藥而溺愈多日夜無次點滴不止醫又以為氣虛用野參二錢不見妨礙即改用補中益氣湯六味丸料服數日亦不見效醫又謂肝主疏泄腎主閉藏用調補肝腎藥亦不見效更醫以為內風所致用蠍桂而溺轉渾赤似覺加劇停止不服又一醫始終認定此症係腎與膀胱氣虛不化謂予年逾四旬係腎水將虛之候脈覺細亦陰虛之象體肥色白又氣虛之徵必用手於肛門前及近小便左右等處揉按是腎與膀胱之氣不按摩則不化一得按摩之助力而氣乃化必將腎囊擠緊而溺易出腎囊本係虛空擠緊則氣從前陰之虛竅而出溺即隨之而出一切如涕如膏之濁物亦即隨之而出其為氣虛不化於此可見況前服野參桂圓若非氣虛必有飽脹又可為氣虛之證不然向不飲酒濕熱當然不多又不好色梅毒當然不染何以此症服藥終不一效但余對於此說不無疑點每見體虛之人必精神不振起居疲倦飲食不多從未有虛而不倦怠之人余雖患此病四年身體上精神上均不輕弱醫謂腎與膀胱之氣專司下焦不生化則滯積不通只溺溲變為癃秘淋濁而已非此正氣虛精血應則現萎弱形狀立方仍係補中益氣加化氣藥六味丸加化氣藥並囑多服久服方可見效並宜禁葷膩煎炙之味久坐久勞均不合宜余以補中六味前已服過無效因不見信茲閱臺端醫會集現代名醫研究定有特見用將賤恙經過情形及醫士辯論是否有當詳細敍述懇請卓鑒遙指迷津賜一妙劑見示稍得寸效定即赴叩感謝再生至為盼禱敬候診安胡謹啟復函此乃中氣不足溲便為之變也補中益氣可謂對症發藥不必多疑病之來既非一朝一夕病之去亦當不能心急病歷四年屬虛可知不能以精神無礙而自稱不虛請信任始終認定腎與膀胱氣虛不化之醫任賢勿貳必有良效倘日易一醫紛紛聚訟恐與貴恙未必有益三十九黃君函士諤先生大鑒久欽儀範無緣識荊屢從鑽報得讀大著藉悉吾國醫界當此四面楚歌之際乃有先生其人者出而大聲疾呼誠足掃雲霧而辟易千人真所謂醫界之韓柳喻韓愈柳宗元余子何足道哉華有慨醫道之不振西醫進挾其最新發明之器械與夫科學化之診療蒞茲於中土高視闊步旁若無人究其術則頭痛醫頭腳痛醫腳以人之四肢百骸著豆剖而瓜分雖法似精細實乃大謬且講病菌之說無病非菌治菌而病仍不瘥我國醫則不然審陰陽虛實辨寒熱六氣窮源竟委提綱挈領固未嘗言菌而病無不治足見病菌之說不可恃也如此今將敝戚林無竟君患痢之經中西醫診治情形及現狀另紙附奉台癶言究竟有否病菌為祟益徵西法之呆拙與我國醫較確有天淵之隔矣敝戚因鑒西法之未足盡信病未愈債台已高築數口之家賴其維持近且不能舉爨遑論醫藥華不忍坐視為特肅函清聽以先生之醫術誠無異仲景復生斯世豈有病而不能治者乎有嫌冒昧尚希鑒諒幸甚幸甚專肅柢頌台綬黃拜啟附林君患痢現狀敝友林年歲男無惡好惟曾患神經衰弱遺精小便頻數之病身瘦近年來體稍健康自去年八月杪患痢日夜數十行膿血後重先服大黃巴豆等單方無效口味無不思飲食數日後目眶陷音啞仰臥則臍左旁寸半許稍高脹痛甚須轉向右側臥方可遂入中醫院調治謂為濕痢用化濕法當進院旬日病無進退曾將大便送衛生所檢驗無阿米巴蟲菌亦曾同時服用西藥治痢特效藥百餘粒住院三十餘日病依次退距出院時日僅便一次矣是時胃口已照常每頓可吃二碗半至三碗但膿血仍夾少量臍左旁仍隱隱作痛雖再服中藥不除根西醫則謂由急性變為慢性痢疾直至本年七月間其痛仍未斷大便帶少量膿血不盡若多勞動則痛加劇連及小腹大便亦時通時塞膿血亦時多時少渠以生計艱難既無力再醫又不能長此受苦於是由友人之助赴某西醫院住院治療復經西醫檢查數次謂是慢性直腸炎逐日灌腸一次連續十三天最後四天中膿血絕跡醫謂已愈可出院既出院第二日大便即不通翌日復然第三日乃用潤腸丸得便而膿血依然矣令人喪氣有友告以服苦參子可以斷根於是破殼取仁研細包膠囊中日三次每一日每次用四粒依日遞加加至十粒為止大便每日暢通一次或二次越二星期余而大便膿血及臍左側痛均不除若苦參子雖有微功終不能斷根復函黃君雖非醫士認林君之恙係腸部受創日久失其傳化之權則一語中的勝中西醫諸公數倍矣佩服之至敬奉小方連服三日或有效乎黃條芩錢半生白芍錢半炙甘草錢半紅棗六枚清水四大杯文火煎熬成汁一大杯去渣頓服四十吳函士諤先生大鑒僕有一弟年歲三年前初由鄉間來申學業因事務繁忙連大小便亦竟無睱更兼其素性膽小不敢有疏業務故每逢欲解小便時即強行忍住不溺久而久之遂成小便不利之症以後則欲小便時則非用力久脹之不能溺出但脹出後即能直瀉如常人故此深感不便遂於去歲至某國醫處診治亦斷為強忍小便所致先後用滲濕利水清熱通氣之方數劑而末後用金匱腎氣丸方加減為治服之稍覺便利但尚不能如常人之一溺即出其後因迫於家況遂即中止診治故至今日溺時仍覺不順然無其他變象眠食如常大便亦通惟舌苔時覺滑膩且吐沫涎惟最奇者厥為直立而溺時則必久脹之始出倘若坐於便桶上溺時則通順與常人無異去歲於某國醫處診治時亦曾明言及此但此醫亦未具道始末只云肺氣輸膀胱之故今敢請先生不嫌其繁而研究之病源究屬於何處及如何用藥不勝感激至盼至禱專此敬肅順頌撰安吳謹上復函病來如箭病去如線病之暴者去之既如是之難況此病之來不是一朝一夕當然去之之難更十倍於普通一切病症前醫既已有效不必心活他謀望繼續請前醫診治至於立則閉坐則通此理極易知曉人生氣機升降立起則易升坐下則易降升閉降則通也請一讀國醫新話對於此種知識所得必不少四十一強君函士諤先生大鑒鄙人男性幼以先天不足體質素弱及壯又操筆墨生涯不免用腦過度迄今歲鰥居才五年常患頭痛左肩背三叉筋不時酸疼喜靠椅背每晨必嘔痰一次食稍粗硬即覺胸脘脹痛食稀飯麵包則覺舒服身有陰癬腳癬晨必大便一次小便亦能暢行晚欲混湯浴一次睡眠尚安惟頭痛嘔痰以及胸腕脹痛據內地醫士謂肝旺脾虛腦元不足積勞所致乃服藥以來均不見效近則酸痛如故脈左細右大舌苔白膩敢請先生指示俾知醫療酸疼是否血虛頭痛是否腦元不足風陽旋擾治標宜用何藥治本宜用何藥胸腕脹痛是否胃病每日混湯浴有無妨礙懇請道安強謹上復函貴恙宜標本分治本虛是一問題標病又是一問題治病從標著手猶之貴業律師辦案只究理之曲直不問家之貧富勢之強弱也尊問六點答復如下酸疼乃經絡為病血不養筋亦是酸疼病之一種然必有其他見證證明確係血虛方能斷定證據不足殊難懸斷頭痛不由外感必是內傷風陽擾動亦是內傷證之一腦元兩字中醫書所不載余亦不敢妄對治標應對症發藥症見胸脘脹痛嘔痰宜投胃脘藥治本緩議胸脘脹痛是胃脘病每日混湯浴無妨礙胃主納脾主化中州失健運化無權胸脘所以脹痛晨必嘔痰此其鐵證肩背酸痛時作時休此是經絡病或者胃家運化有權氣機升降得宜則經絡之病可以不治自愈製半夏三錢廣陳皮一錢焦枳殼一錢白茯苓三錢川貝母二錢薑竹茹三錢川廣鬱金各二錢生香附二錢穀麥芽各三錢加鮮佛手一錢服後有效示知為要四十二尹君函編輯先生台鑒閱號醫林欄內原有步溪君之驗方大全云怔忡病狀由誤犯手淫或房事過度所致者心虛腎虛可服構杞地黃丸及加減六味地黃丸又天王補心丹等能治癒但不知此加減二字是何解釋是否亦係藥丸名稱抑係取分量加減請指示為感因鄙人在少年時曾犯過手淫於近年中覺心胸築築振動由友人指示日服杞菊地黃丸三錢用淡鹽湯送下不知杞菊同枸杞者是否同樣功效杞菊者六味地黃丸料加構杞菊花也取其補腎明目枸杞者六味地黃丸料加枸杞一味也再鄙人於近三四年以來忽發生似病非病之醜態不知是否亦由腎虛心虛所致今將此醜態詳述於下最近三四年來與人說話之間倏忽覺面紅頸赤繼而極汗淫淫同時心跳不停雖欲強自鎮定奈不能自主之苦設若被人覺察目光射注則更汗流不止形同雨淋之醜當時慚愧恨無地洞可入初患時如在大庭廣眾同陌生女性交談即發生繼則同男性亦欲發生近則更甚雖日常晤面之親友不論男女亦現此醜狀因此只可做金人之口思之再三實不明其淵源或係身體虛弱心臟虧損均未可知敬請先生在醫林欄示復為感特此順頌撰安尹謹上復函第一問加減兩個字不是丸藥名稱乃是朗中先生就病症情狀將六味地黃丸方或加或減也第二問無端怕羞病在肝膽宜服千金溫膽湯加味薑半夏三錢淡竹茹三錢焦枳實錢半白茯苓三錢陳皮錢半生甘草八分鮮菖蒲三錢廣鬱金三錢生薑三片紅棗三枚水煎服日一劑連服五日四十三王君函士諤大醫生偉鑒鄙人今年歲於成年時精神殊為充足遇事勇進不知困難賴充足之精力成立事業步進社會惟不免尋花問柳過度耗神但不覺萎疲於歲時劣友引染黑籍然志向與辦事勇氣未覺退步自幼愛惜精神少近房事惟於歲起精神萎疲不舒作事怕煩懶怠由此之後不知不覺暫患陽萎於去歲欲振作事業起見求醫調治又戒除黑籍兼打藥針並服重貴補劑而精神更疲乏終日不思動作不得已而中止近頭腦微痛心神煩躁而不思做事執筆鄙人自覺精神萎疲與身心不舒乃起源陽萎因近年來工作不多飲食不大減如何精神奇萎自己不解但限於經濟亦不得合宜醫治方藥乞賜教如何調治王謹啟復函貴恙乃是腎虧症腎為作強之官損及腎陽則精神不振損及腎陰則精衰陽萎症屬內損治非容易請每日清晨服秫米粥油一碗少加鹽精以補腎陰臨臥吞服金匱腎氣味丸三錢以扶腎陽服至一個月再談四十四周君函士諤先生有道座右星五耳先生之名久矣苦乏機會得瞻尊範徒令欽遲仰慕靡已茲因舍妹忽發一症不知何病初起時覺背脊縫突出冷氣漸至心內縮緊十分難受繼覺周身遊串頭暈眼黑臥床業已月餘現服中藥十餘帖形勢稍緩疾則依然惟舍妹幼年曾患黃病迄今稍愈猶未脫體不卜是由黃病之根而致變化否星五景況寒苦無力代醫而病者又居北方原籍更乏良醫診治倘久久稽延恐於生命發生危險迫不得已具函懇求先生代擬一藥方立盼玉音專肅祗頌尊安周頓首復函令妹之恙雖脈象舌苔飲食溲便皆不見告以所列各症歸納之是奇經八脈為病也婦女最多奇經病此症亦其一也惟普通婦女病病在奇經衝脈帶脈為多令妹之病偏不在衝脈帶脈而在督脈任脈為可異耳督脈行身之背而根乎腎任脈行身之前而主乎心心腎同氣同稱少陰所以冷氣突出背脊漸至心內緊縮也繼覺周身遊串頭暈眼黑者督脈行乎背太陽脈亦行乎背太陽主一身之表而其脈上乎頭入於目也久患黃病陽虛可知擬方如下川桂枝一錢生白芍一錢制附片一錢潞黨參一錢生綿耆一錢炙甘草五分生薑三片大棗三枚水煎服五劑戒煙驗方自戒煙政令施行後西醫大做其投機生意其實中醫戒煙之方驗者極多且費錢不多何必大花冤錢挑人來發財余在醫林宣佈過紅茶葉食鹽煙膏之方極靈極驗今又得一驗方還要便當還要便宜其法採取紫花萁不拘多少切細曬乾代做茶葉泡湯代茶隨便渴飲儘管抽鴉片不必禁忌自會丟槍戒絕紫花萁即是紫色棉花之梗種棉區域所在多有價極便宜此方得自中華國醫學會張杏孫君余意以紫花萁濃煎熬膏開水沖服更妙診病記濕溫化火重症古人治病用藥或涼或熱或補或攻絕無絲毫成見一以病為物件病之環境異藥亦應之而異盡有昨日進熱藥今日易進涼藥者亦有晨投攻藥而夕易投補藥者觀仲景傷寒論昨進桂枝湯今進白虎湯者有之晨進承氣湯夕與四逆湯者有之不象今人死守一方不敢稍有變易恐人之議其後也此其故半由於醫藥之退化半由於風俗之澆薄不負責之旁人好為不相干之議論大風吹倒梧桐樹自有旁人說短長信口雌黃議藥不議證足令名醫短氣賢者袖手此種事在富貴之家為尤甚余近治一極重之濕溫證病情變幻雖幸焦頭爛額經余一手治癒患者何蓮根一尋常百姓家子弟設此人為富家之子斯人斯疾必死無疑何氏年歲住南市高昌廟炮石後街司慶裏王宅號門牌為一工人子病者亦在船廠為工人王家宅小學校曾君之子春初病溫中西醫俱束手經余治癒由此相知時時為余紹介患病之人盛情可感二十五年三月二十六日曾君介紹蓮根來診室求治余見其脈澀唇焦目黃苔厚尖紅知病來不善謂之曰此濕溫症也勢將化火為之立案曰濕遏熱伏身熱胸悶頭痛肢痛唇焦目黃舌苔厚膩尖邊紅有汗濟頸而還脈澀與清熱化濕桑葉三錢川浙貝各三錢連翹三錢鮮竹葉三錢全瓜蔞四錢打黃連四分宋半夏二錢地枯萎四錢黃芩錢半加枇杷葉去毛包四錢鮮蘆根去節一尺此藥服下唇焦雖減陡變譫語不眠倘在富貴之家眼見服藥病增定然歸咎醫者藥誤即不歸咎亦必謂病重藥輕有誤病機勢必改弦易轍親友紛紛薦醫中西並進雜藥亂投西法之打針冰帽無不應有盡有矣乃何姓以尋常百姓實無閒錢仍來相請余診之脈澀如故病邪深伏欲出不得也危險之極為之立案定方此三月二十七日也案曰濕遏熱伏投清熱化濕唇焦雖減譫語不眠胸悶如故身熱不揚脈澀伏邪欲出不得出危險之至防厥宋半夏三錢鮮竹葉三錢焦枳殼一錢鮮菖蒲三錢連翹三錢焦山梔三錢廣鬱金四錢川浙貝各三錢淡豆豉三錢干荷梗三錢梗通草八分白蔻仁八分打後下此方煎服後病勢又大變竟然神昏不語右脈竟隱伏不見愈治癒重病象如上即非富貴之家照理亦必另訪賢哲用何姓以信曾君者信余以為曾君所薦決無錯誤三月二十八日仍來延余余百計籌思此證舍開泄外別無治法乃為之立案曰熱邪逆傳心包先由譫語後竟神昏脈澀右脈伏急與開泄以期挽回於萬一至寶丹化服一粒紫雪丹調服一錢半鮮菖蒲四錢廣鬱金五錢二味煎服此藥服下開口能自言語惟煩熱語不休脈已易澀為弦余即於原方去至寶丹紫雪丹則減為一錢另加鉤藤勾三錢鮮竹葉四錢三月二十九日又來相延至則病者已發狂欲起三四人不能制目直視不識人余曰病者發狂如是邪熱欲出也乃以壯漢三四人制之病者既受病邪之煎熬而成狂已覺萬分困苦今於抵抗病邪之外又須抵抗三四壯漢之強制倍增痛苦大非所宜其母曰三四人猶不能制倘一離去彼即離床出走矣余曰余自有妙藥制之乃令購犀角尖羚羊角尖各一錢磨粉調服而其家清寒此兩藥價奇昂二錢藥粉須五六十元法幣財力不能勝任懇余易低價之藥余於是大為躊躇即使犀羚並進有無把握尚成問題今既如此只好盡我之力以圖維是否有效不敢必也乃立案曰熱邪逆傳心包發狂脈弦不識人急與清營以期萬一之挽救鮮生地一兩蓮子芯八分左牡蠣一兩先煎蒼龍齒一兩先煎川連八分鉤藤勾四錢珍珠母一兩先煎紫雪丹二錢調服此方服後狂勢較減乃去紫雪丹令再服一劑三月三十一日延診狂已盡止惟舌黑唇焦脈見浮洪餘日陰液傷矣立案曰熱邪透而未清陰液大傷舌黑唇焦脈浮洪急與救陰鮮生地一兩天麥冬各五錢珍珠母一兩先煎鮮竹葉五錢北沙參八錢蒼龍齒一兩先煎鮮梨汁沖一枚黃芩三錢生白芍三錢鉤藤勾三錢炙鱉甲八錢四月二日復診見舌苔糙膩唇焦猶時欲起作狂案曰投救陰陰液猶未盡復舌苔糙膩唇猶焦時欲發狂脈微弦仍主前法知母五錢鮮生地二兩青龍齒一兩先煎黃芩三錢生白芍三兩石決明一兩先煎川連一兩先煎炙鱉甲一兩先煎珠珍母一兩先煎生山梔三錢左牡蠣二兩先煎天麥冬各五錢鮮竹葉五錢蓮子芯一錢赤茯苓五錢連服兩劑大膽之極方中黃連極切分量亦重四月四日復診案曰病去陰液大虧二溲皆少舌苔黑脈弱法與救陰北沙參四錢生白芍三錢黃芩錢半小生地六錢赤茯苓四錢竹二青三錢玄參四錢全瓜蔞打五錢絲瓜絡四錢知母四錢天麥冬各三錢蓮子芯八分鮮蘆根一尺去節生穀芽四錢豬苓三錢此藥服後大便暢行口猶渴身猶熱乃於原方去瓜蔞竹二青絲瓜絡加玉竹三錢連翹三錢綠豆衣四錢杭菊花三錢連服三劑此病生機在大便暢行也四月九日復診案曰病後陰液未復二溲皆少脈弱法與養陰大生地八錢玉竹三錢天麥冬各三錢生白芍三錢白茯苓四錢生穀芽四錢天花粉三錢炙龜板五錢生首烏四錢加鮮蔗汁沖一小盅五服後日民不甚安口渴已減大便未行頭時痛乃去玉竹加宋半夏秫米滁菊枸杞生甘草等善後而瘥此症治癒余不敢居功乃病家信任之效也設何蓮根為富家之子則不死於病必死於中西之雜治富家之子病病而亦延余治其病即輕於何蓮根亦必無如此之成績何以故以決不會有何蓮根家信任之專也余嘗治富家子病多矣受任於敗軍之際奉命於危難之間竭盡心力幸得轉機乃富家以轉機之太快反生疑問者有之轉機之後或有小變電話頻問雖力告以無妨仍掉頭而他去者有之余於何蓮根證不敢居功者竟蓋在此綜觀此證前後共服藥十六劑士諤非深入孟英之堂奧者決無如此大刀闊斧之手段也認病與治病每有人齗齗音讀齦同齦齗齗爭辨的樣子爭辨病名所病的究竟是傷寒證還是濕溫證還是濕熱證在爭辨者的意思總以謂醫家治病對於傷寒證自有傷寒證的治法傷寒證的方藥對於濕溫證必有濕溫證的治法濕溫證的方藥對於濕熱證另有濕熱證的治法濕熱證的方藥濕熱證的方藥決不能移治濕溫證濕溫證的治法決不能移治傷寒證倘然弄錯定致貽誤病機有關大局那裏知道傷寒不過是外感病的總稱濕溫乃是傷寒之一種濕熱乃是濕溫之互名稱傷寒猶之稱中國人濕溫猶之稱浙江人濕熱猶之稱杭州人絕無是非可言很不必齗齗爭辨再者中醫診病最要在於認證一須認清是表證還是裏證二須認清是寒證還是熱證三須認清是虛證還是實證認清了表證還須辨出是經是絡認清了裏證還須辨出是臟是腑各證有各證的憑據各各顯露出來除是外行誰也隱瞞不過再也不會弄錯所以甲乙兩醫或是甲乙丙三醫說出的病名雖或不同而認出的病證再無有不同的至於治法或先治表或先救裏或表裏雙解或上下分消看法似不齊一其實如古名將之用兵器如呂布用戟關羽用刀張飛用矛趙云用槍各擅其長其殺敵則一也去病則一也中醫之認病法中醫之治病法斷不能以西醫眼光等量齊觀也寒窗醫話序埭溪張澹沖從學有年余之誨生徒也只授仲景傷寒論一書教之以讀法從有字處推之無字處只許搜求證據不尚空談理論凡六氣勝復五行生克標本中見等說概置高閣暫不談論一掃前人論注惡習雖未必推倒一時智勇庶可許開拓萬古心胸張生埋頭窗下三易寒暑風雨晦明討論無間執經問難頗能起子此醫話皆張生研究時所作也雖立說未必同於前賢或且攻擊前賢然為學之要在以獨得之見勘出真理固不必以前賢之說所囿也上海國醫學會徵求醫籍澹沖即以此作應徵余嘉其年青而能用心遵余之教而讀書故樂而為之序民國二十五年六月一日青浦陸士諤序於滬寓病家之心理醫家與病家為對待名詞然而醫之為家確然其難乎言之吾業醫吾深知醫之情狀深知醫之品性吾欲言醫吾不忍也醫之中有名醫有時醫有庸醫如何者是名醫如何者是時醫如何者是庸醫吾不難曲狀其情態繪形繪聲呼之欲出既心有所不忍只得借對待之病家一寫其心理病家者有病之家也有病而不自知延醫以求其知有病而不自治延醫以求其治然而延來醫家能否知病能否治病病家是否有辨別之能力病家心理以為場面闊綽者必是名醫風頭健旺者必是名醫功架十足者必是名醫神氣活現者必是名醫應酬圓到者必是名醫照此心理懸格以求南轅北轍矣延到病家不待診察手續之完畢急急動問所病何名愈在何日有無危險在病家急於求知急於求愈原不足怪而醫者假使未必診察隨口回答在病家看來以為此公不假思索熟極而流定是名醫而不知其隨口亂道出門不認貨全是胡謅也真是名醫出言吐語定然鄭重定然謹慎病家而不辨此心理雖遇名醫不能識也雖非名醫必誤認也診病記濕溫出紅疹重症余記何蓮根之診曾言尋常百姓家之病雖重易治富貴家之病雖輕難療此是事實並不是有激而言最近又有高德興一症頗有一記之價值高德興紹興人一賣鹹菜商也住上海虹口臨平路德潤裏弄三號門牌於二十五年六月二日來寓就診身熱已三日胸悶肢酸大便不行自言回紹興新婚婚後來滬途中冒風雨衣履盡濕透到滬後奮勉營業未得稍息故患病十分沉重余診其脈數甚舌苔色黃告之日此濕溫症非尋常感冒可比不能急愈為之立案曰濕遏熱伏胸悶身熱肢酸脈數舌苔黃不大便法與清熱化濕方則宋半夏三錢川連五分全瓜蔞三錢打焦枳實枳殼各八分陳皮二錢鮮菖蒲三錢竹二青三錢赤茯苓三錢六一散三錢包煎加鮮竹葉三錢枇杷葉三錢去毛包煎服一劑泄瀉而胸悶如故其家人持方來求減乃去瓜蔞加豬苓三錢澤瀉三錢六月四日二診身熱較減泄瀉如故案日濕熱症投小陷胸湯加味熱已減泄瀉口渴舌苔黃脈數法與清熱方則黃芩三錢生白芍三錢川連五分生甘草七分白茯苓三錢車前子三錢包金銀花三錢冬瓜皮三錢竹二青三錢加鮮竹葉三錢鮮蘆根一尺卻節服兩劑六月六日三診病者遍身紅疹透現矣案曰濕熱鬱蒸募原身熱遍發紅疹口渴舌苔灰脈數再與清熱方則連翹三錢金銀花四錢黃芩三錢生白芍三錢天花粉三錢生甘草八分知母三錢赤茯苓三錢車前子三錢包加鮮竹葉四錢鮮茅根三紮去心鮮蘆根一尺去節八日四診病者言昨日服藥後咳嗽吐出鮮血一大口余曰此熱傷血絡也無妨案曰濕熱症胸悶口渴身發紅疹咳血一口舌苔灰膩脈數以前法治之方則黃芩三錢生白芍三錢連翹三錢金銀花四錢天花粉三錢知母三錢鮮生地一兩竹二青三錢絲瓜絡三錢枇杷葉三錢去毛包白薇錢半桑葉三錢鮮蘆根一尺去節加鮮茅根三紮去心鮮竹葉四錢九日五診則胸次又悶紅疹白痦滿布矣案曰胸悶口渴紅疹白痦滿布脈弦數法與氣營兩清方則桑葉三錢牛蒡子三錢金銀花四錢連翹三錢枇杷葉三錢去毛包鮮竹葉三錢綠豆衣四錢天花粉四錢知母三錢生山梔三錢淡豆豉三錢天麥冬各三錢加鮮茅根三紮去心鮮蘆根一尺去節十一日六診案曰濕溫症遍發白痦胸悶已減脈緩舌苔黃膩法與清解方則桑葉三錢光杏仁三錢枇杷葉三錢去毛包天麥冬各三錢知母三錢天花粉三錢綠豆衣四錢鮮竹葉三錢鮮蘆根一尺去節加生穀芽三錢蓮子芯五分十三日七診身熱已退案曰濕溫遍發白痦投清解身熱已退舌苔糙脈弱法與和陰方則北沙參三錢金石斛三錢天麥冬各三錢生白芍三錢生甘草三分小生地三錢生穀芽三錢絲瓜絡三錢枇杷葉三錢去毛包鮮蘆根一尺去節十五日八診病者自言身體軟弱已極余曰此病去元虛也不必慮案曰濕溫身熱已瘥便溲皆少自汗舌苔較潤脈弱法與和陰方則北沙參四錢金石斛四錢玄參三錢天麥冬各三錢小生地四錢炙鱉甲六錢生白芍三錢生甘草四分知母三錢天花粉三錢絲瓜絡三錢白茯苓三錢加鮮蔗皮二節十八日九診精神已振惟汗多耳與以潛陽和陰之劑此病初診後見泄瀉四診後見吐血倘在富貴之家定然歸咎藥誤改就他醫乃高德興與何蓮根同一境況對於余之治法深信不疑故獲此微效云觀何蓮根與高德興二濕溫症陸公開首即用黃芩黃連之苦寒校者以為不切蓋開首盡可用芳香化濁法如藿香佩蘭朴花青蒿諸品蓋苦寒有遏濕之弊若在濕家之濕熱症則另議其證必較濕溫症尤重矣校者注

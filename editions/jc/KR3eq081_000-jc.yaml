根湯的煎法是七味藥以水一斗先煮麻黃葛根減去二升去上沫納諸藥煮取三升去渣倘使同煎就不對了葛根黃芩黃連湯是以水八升先煮葛根減二升納諸藥煮取二升去渣倘使同煎就不對了小柴胡湯的煎法偏又比眾不同是以藥七味水一斗二升煮取六升去渣再煎取三升倘使你不是去渣再煎還是不對柴胡桂枝湯的煎法偏是九味藥七升水同煮取三升去渣就是與普通湯藥一般了柴胡加龍骨牡蠣湯偏是以十二味藥八升水煮取四升然後納大黃更煮一二沸去渣溫服又是一個法子柴胡桂枝乾薑湯偏又是以水一斗二升煮取六升去渣再煎取三升偏又與大小二柴胡湯同法了柴胡加芒硝湯偏又是以藥八味水四升煮取二升去渣納芒硝再煮微沸了說它是一定的偏又不一定說它不是一定罷偏又是一定的梔子豉湯煎法以水四升先煮梔子得二升半然後納豉再煮取升半並且豉這一味藥是要綿裹的那梔子甘草豉湯是先煮梔子甘草梔子生薑豉湯是先煮梔子生薑那豉總是後入的只有梔子乾薑湯梔子厚朴枳實湯梔子柏皮湯是與普通煎藥法一般最奇怪不過的煎法是枳實梔子豉湯是先用清漿水七升空煮取四升納枳實梔子煮取三升下豉更煮五六沸去渣分溫再服那清漿水就是淘米的泔水久貯味酸為佳者大承氣湯的煎法又與他方不同藥只四味卻分作三回工作以水一斗先煮厚朴枳實取五升去渣然後納入大黃取二升去渣加入芒硝更上微火一兩沸分溫再服倘使枳朴大黃同煎就是小承氣湯不是大承氣湯了調胃承氣湯煎法是以水三升先煮大黃甘草取一升去渣納芒硝更上火微煮令沸少少溫服之與大小二承氣湯又不同了桃核承氣湯的煎法也與調胃承氣湯差不多抵當丸雖是丸藥也是煎服的十棗湯的煎法只煮棗子一味其餘三藥是搗作藥散用棗子湯調服的大陷胸湯煎法也要分做三回工作通只三味藥卻以水六升先煮大黃取二升去滓納芒硝煮一二沸再納甘遂末溫服一升小陷胸湯是先以瓜萎一枚水六升煮取三升去渣再納黃連半夏煮成二升去渣分溫做三服生薑瀉心湯甘草瀉心湯半夏瀉心湯的煎法也同小柴胡湯一個樣子是把藥煎好了去渣再煎的大黃黃連瀉心湯是把藥用麻沸湯漬之須臾絞去渣分溫再服的附子瀉心湯卻是大黃黃連黃芩用麻沸湯漬之絞去渣附子煎成汁和勻分溫再服竹葉石膏湯的煎法與白虎湯不同白虎之粳米是與諸藥同煎的竹葉石膏湯的粳米卻把藥煮好去渣後加入米的桂枝人參湯的桂枝是要後入的茵陳蒿湯的茵陳是要先煎的其餘如凡用阿膠總是煎好藥去渣納膠烊消凡用麻黃總是先煎去沫你看煎藥這一件事古人這麼的鄭重可以隨隨便便付託任何一個人干的麼總之麻黃葛根皆須先煎去沫柴胡瀉心皆須去滓重煎梔豉湯則梔須先煎豉須後入大承氣則枳實厚朴既須先煎又須去滓納大黃煎去黃納硝微沸先後次序絲毫不能通融依此法則效不依此法即不效然而現在的人知此法者能有幾人至於芳香之藥後入金石之藥先煎黏膩之品有毛之物皆須包煎此則用意甚淺今之人無不知之矣論痢疾痢疾這個病已經關及臟氣大凡一切病關及腑氣者輕關及臟氣者重就為在腑多實在臟多虛虛則宜補實則宜攻從前岐伯斷定腸澼便血身熱則死寒則生腸澼下白沫脈沉則生脈浮則死腸澼下膿脈懸絕則死滑大則生即使身不熱脈不懸絕也要滑大才是生脈懸澀依然是死脈腎移熱於脾傳為虛腸澼此症死不可治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死黃帝岐伯這兩位是我們中醫的老祖師他的一言一行都是為萬世法的他把痢疾瞧得這麼鄭重腸澼下血就是紅痢腸澼白沫就是白痢腸澼下膿就是五色痢可知痢之生死脈是最要緊的一件事張仲景是醫中之聖斷定五臟氣絕於內者痢不禁下甚者手足不仁又言下痢脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死又言下痢手足厥冷無脈者灸之不溫若脈不還反微喘者死又言下痢有微熱而渴脈弱者令自愈又言下痢詠數有微熱汗出令自愈設脈緊為未解又言下痢脈數而渴者令自愈設不瘥必清膿血以有熱故也又言下痢腹脹滿身體疼痛者先溫其裏乃攻其表前代醫聖岐伯是黃帝時人後代醫聖仲景是漢靈帝的人先聖後聖相去有二千五百年怎麼岐伯斷為死症的到了仲景手裏倒有辦法敢是仲景的本領強過岐伯麼原來醫學的進步愈後愈昌明這痢疾的發源地是在五臟的臟氣痢疾的所在地是在大腸的部位腸為六腑之一五臟宜補六腑宜通岐伯時代治病大半仗的是針灸內經上湯藥方子只有十二首病在腸治宜湯藥岐伯有病無方如何不要窘急猶之現代的西醫對於痢疾只能知道它有痢菌而不能辨出痢菌之屬熱屬寒是虛是實與某一臟有關某一腑相連粗疏簡陋只一通腸一法治之自然利弊毫無把握了仲景而後巢元方論病最詳其論痢疾曰痢而赤白者是熱乘於血血滲於腸內則赤也冷氣入腸搏腸間津液凝滯則白也冷熱相交故赤白相雜重者狀如膿涕而血雜之輕者白膿上有赤脈薄血狀如魚脂腦世謂魚腦痢也又言血痢者熱毒折於血入大腸故也又言休息痢者胃脘有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虛受之故為痢也又言痢如膏由臟腑虛冷氣入於大腸成痢冷氣積腸又虛滑脂凝如膏也蠱蛀痢毒氣侵於臟腑如病蠱蛀之象痢血雜膿瘀黑有片如雞肝與血俱下是也又言雜痢謂痢色無定或水穀或膿血或青或黃或赤或白變雜無常或雜色相兼而痢也挾熱則黃赤熱甚則變膿血也冷則白冷甚則青黑皆由飲食不節冷熱不調胃氣虛而故變易也岐伯發明痢疾之發源地仲景認清痢疾之所在地並定出治療之方藥巢氏詳述痢疾受病之因吾中醫不談痢疾菌而對於痢疾分析之細認症之確藥治之復雜豈彼只以通腸簡單治療為治痢無上妙法者所能夢見痢疾之方治方治根諸病源凡病皆是如此不僅痢疾一症也痢疾之病源既已千頭萬緒痢疾之方治亦當五花八門彼西醫認痢疾只有一種菌方治自然只有一種法考之中醫治痢古人有到三十三法並不是自尋煩惱欲求病之愈不得不如此桃花湯法赤石脂乾薑粳米白頭翁湯法白頭翁黃柏秦皮紫參湯法紫參甘草梨勒散訶梨勒甘草瀉心湯法甘草黃芩乾薑半夏黃連大棗黃芩湯法黃芩甘草芍藥大棗黃芩加半夏生薑湯法即前方加半夏生薑乾薑黃連黃芩人參湯法赤石脂禹餘糧湯法雄黃丸法毒暑在脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥甘草作湯服之安樂別作治療醫家大錯柴胡加芒硝湯法即柴胡湯方加芒硝瓜蔞散法外台療熱毒痢血痢臍下絞刺痛方法升麻地榆茜草黃連犀角生地梔子薤白香豉外台主赤自痢方法黃連阿膠外台療五疳蒸下痢方法苦參青葙甘草活人書薤自湯法豉薤白梔子局方訶梨勒丸法肉豆蔻木香乾薑砂仁訶梨勒皮川烏白礬龍骨赤石脂葛根湯法葛根黃芩黃連湯法當歸四逆湯法大承氣湯法小承氣湯法四逆散法四逆湯法白通加豬膽汁湯法白通湯法四逆加人參湯法通脈四逆湯法豬膚湯法陽毒升麻湯法生薑瀉心湯法烏梅丸法威喜丸法有涼有熱有攻有補有通有止不一其症即不一其方不一其法視彼西醫以通腸一法普治諸痢者難易大別天淵矣論戒煙眼前新興事業最發達的就是戒煙這件事本來政令有禁再要吸下去真是受累不淺戒煙的事我也輒鬧忙曾經在醫林中刊佈過兩張戒煙驗方從古到今個個人認直弗曲自己總說自己好我也當然不能例外我刊佈的兩張方子尤其是第一張紅茶白鹽黑膏的那方認為萬妥萬當絕無弊言偏偏有幾位多疑的仁兄偏偏寫信來問我此方是否靠得住我現在就在這兒答復請你放心此方十分可靠諸位也要想一想我與諸位素不相熟為什麼好端端弄一張方子來哄諸位問到林文忠公戒煙方那林方又是一張方子不能與我方相提並論林方有林方的好處我方有我方的好處歡喜林方時請向國藥鋪購買現成藥膏就是這林方是我們青浦前輩何書田先生撰的君臣佐使很不錯已經有相當的成績大致總可以放心的了我之方煙癮不論大小藥味毫無加減瞧方配服可也我再有一句話奉告鴉片這東西吸上它時不是一天兩天三日五日吸得上癮的那麼戒絕時光當然不能夠迅速來既不易去亦煩難偏偏現在的人要他騎牛而來飛機而去如何能夠立刻見功大背事理就要弄出事來我這方子就是不能夠快問到身體虛弱那是另一個問題究竟是陽虛還是陰虛血虛還是氣虛那是要請醫生調理的不在戒煙範圍之內論痰飲稠痰叫做痰稀痰叫做飲痰飲這一症古人分為四種一種叫痰飲一種叫懸飲一種叫溢飲一種叫支飲先講痰飲一個人素體肥盛忽然瘦起來水走腸間瀝瀝有聲這就叫痰飲其實不過是痰飲之一種以後當另題再論再講懸飲一個人飲下去的水不化而流在脅下必然要咳唾那咳唾的時候必然要引痛這就叫懸飲再談溢飲飲入的水流行歸於四肢很該汗出而解偏偏不汗出那麼身體疼重這就叫做溢飲更有咳嗽氣逆倚息短氣不得臥其形如腫這就叫做支飲在此四種飲症之外更有留飲與伏飲那留飲有五臟之分水飲在於心下其人的背部寒冷如手大心下偏又堅硬築築然短氣惡水不得飲這就是留飲在心的證狀水飲在於肺呢時時吐涎沫偏又時時欲飲水這就是留飲在肺的證狀水飲在於脾呢是既少氣又身重這就是留飲在脾的證狀水飲在於肝呢就見脅下支滿嚏而痛這就是留飲在肝的證狀水飲在腎就見心下悸這就是留飲在腎的證狀凡是脅下痛引缺盆咳嗽就是留飲的表示胸中有留飲其人短氣而渴四肢曆節痛脈必見沉這就是留飲證的脈講到伏飲的見證與留飲有個分別膈上病痰喘滿而咳吐發起來就寒熱背痛腰痛目泣自出其人振振身體顫動那就是伏飲了凡是飲不管它是痰飲是溢飲是支飲是懸飲是留飲是伏飲它的病源總為飲水太多水停在內不能化這是飲症的來源所以一個人到大渴的時候最忌的是牛飲指大量飲水古人啜茗稱品也是衛生之一法此外更有癖飲酒癖膈痰三個病症成形的飲症叫假癖為了飲水太多水停聚在兩脅之間遇著了寒氣水寒相搏結聚成塊亙起在脅下按之作水聲這就叫做癖飲為了飲酒過量口中大渴引飲無度酒與飲停滯在於脅肋下結聚成癖時時作痛他的病狀是脅下氣急而痛這就叫做酒癖本來痰水結於胸膈之上又犯了大寒遂致陽氣不行痰水格外的結聚不散於是陰氣上逆上與風痰相結上衝於頭就要頭痛有的痛到幾年之久到後來變成腦痛症倘然頭痛到手足寒冷至骨節那就要死了這就是膈痰之證我們中國人病痰飲的特別多那病痰飲的人必然有咳嗽必然多痰可憐西醫先生不認識痰飲本來面目一見痰飲咳嗽就要嚇得屁滾尿流說是肺病第二期肺病第三期趕快入醫院療養那病人的病休談到治癒倒嚇重了二三分呢我作此篇文字有兩個意思一個安慰病家患了咳嗽不一定是癆病不要自己嚇自己一個是教乖西醫先生知道咳嗽中還有一個痰飲咳嗽治療的法子與癆病咳嗽是大大不同的痰飲之治法痰飲症的病源病狀我已經講過痰飲症的咳嗽與肺病咳嗽大不相同大大的有別請咳嗽病家休要誤會休要聽信胡言自己嚇自己我現在把古人痰飲症治法詳詳細細講給諸位聽且請靜坐聽我道來卻說痰飲一症有病在心下的證見胸脅支滿目眩短氣有微飲這是很該使病從小便去的主用苓桂朮甘湯還有病者脈伏其人欲自利利過後倒反爽快雖然自利心下還是堅滿此乃是留飲欲去之故主用甘遂半夏湯由它從大便而去有脈沉而弦的懸飲內痛有數家脈弦的水症還有欬煩胸中痛的支飲症都是用十棗湯瀉去其水的有心下有水氣症那外證是乾嘔發熱或咳或利少腹滿而喘者主治小青龍湯的有膈間支飲症其人喘滿心下偏又痞堅面色偏又黧黑脈來偏又沉緊此病得之已有數十日醫家用過吐法下法都不效就可用木防己湯去治療倘然病勢不結實可以好了倘然病勢結實好過三日要復發的那麼就要用木防已湯去石膏加茯苓芒硝湯治療了有心下有支飲證見苦冒眩的主治用澤瀉湯嘔而不渴也是心下有支飲主治用小半夏湯倘使猝然嘔吐心下有痞膈間有水既眩且悸主治用小半夏加茯苓湯支飲不得息呢主治用葶藶大棗瀉肺湯還有效逆倚息不得臥服過小青龍湯還是多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與桂苓五味甘草湯治它的氣衝倘然服藥之後沖氣即低那就好了倘使沖氣雖低反倒胸滿而咳那就要用桂苓五味甘草湯去桂加薑辛以治其咳滿病情千變萬他倘使欬滿止後又口渴起來沖氣重又發作那是為了細辛千薑是熱藥服下去很該就渴現在顛倒渴反止了那就為了支飲之故支飲的症在法當冒冒的人必然嘔倘然見嘔再與苓甘五味加薑辛半夏湯倘然水去嘔止其人形腫者當加杏仁即與苓甘五味加薑辛半夏杏仁湯倘使面熱如醉這就是胃熱上衝熏其面當加大黃除其熱即是苓甘五味加薑辛半夏杏仁大黃湯更有支飲胸滿症是用厚朴大黃湯主治的我們中醫治痰飲有這許多法子豈是慣用老辭來嚇人對於病變一籌奠展者可比諸君我所說的還是漢以前的法子不過是治療痰飲的一部分方術那漢以後的新奇法子很多很多我為嫌它煩瑣暫時告一個段落西醫學術新聞報上有一篇小言標題是一身是病是丈二和尚的稿子他說戈公振先生遺體經紅十字會醫師剖解後說他除了患敗血症及腹膜炎外肺部胃部腰部以及心臟頭腦沒有一處不出毛病真可稱得一身是病了戈君是以新聞記者為業的他身體這樣的瘦弱多病足見平日的辛勞一旦百病叢生支撐不住只得一命嗚呼說起來好不慘然啊戈公振百病叢生除了敗血症腹膜炎之外還有肺部胃部腰部心臟頭腦沒有一處不是病不過這許多的病當戈公振入醫院就診時光西醫要算細心診察不曾發現這就可以明白西醫的科學醫術不過如此就是誤診為盲腸炎割治之後始知為腹膜炎後又認為敗血症一誤再誤也不曾知他肺部胃部腰部心臟頭腦有病直到他死後解剖才得發現這就可知西醫的科學醫術不過如此陸士諤先生說西醫學術破產還是客氣話還是抬舉西醫照事實講爽爽快快象西醫這種成績簡直可以說不配稱做學術本來沒有學術有什麼破產不破產旁觀客對西醫所言過激之辭應以歷史的眼光看待校者注西醫診斷之露骨透寫西醫究竟有多大學識多大本領慚愧我不是西醫不曾知曉也不敢輕量人家輕易評論現在看到程瀚章先生大作標題是從戈公振的死說到臨症診斷與病理解剖十分佩服我佩服這位程先生就是忠實兩個字不象其他的西醫江湖氣十足程先生不打自招把臨症診斷與病理解剖的衝突點赤裸裸地寫出來羅列敗血症的原因菌有到七種敗血症的續發病有到十八種就可知西醫的診病不要說是診得錯誤就是真知灼見絕無絲毫錯誤也不過在七種裏頭十八種裏頭捉迷藏似的胡拿瞎摸罷了較之云中捉月霧裏看花還要迷亂我說過中醫治病猶之著棋雖手段或有高下大眾公開共聞共見下面是程瀚章先生的大作登過新醫與社會的名記者戈公振先生因患病經中國紅十字會董醫師診治不幸逝世無論與先生有無交往成為之同聲悼惜惜中國新聞界喪失棟材也筆者與先生初無一面之雅惟於報端及著述中讀其文欽其才神交而已年來余更慨夫外侮日亟上下反利用其機會交相爭於市場兄弟閱牆彼此為些微之私見不惜興訟於有司環顧社會形同荊棘用是杜門謝客拼絕交際日維流覽報章恍如觀影幕幕變化永無窮盡茲數日內報章所記除金潮膨湃外又見關於戈氏之死後消息緣戈氏死後之解剖為戈氏遺囑之一病理上所見與原診醫師所診斷者有所出入於是同情於戈氏者隱約之間不免為春秋之責備然吾人設能多讀醫籍作一平心靜氣之語可以斷言醫師之臨症診斷未必盡與病理解剖所見相符固不僅此種突發之疾病為然也余既少交際與董醫師未嘗謀面而戈氏之病亦不能憑報章所載肯定其病名今日聞董醫師所述戈氏之死因似在於敗血症無疑查敗血症亦名膿毒症其原因菌甚多如鏈球菌葡萄球菌腦膜炎菌腐敗菌大腸茵肺炎菌淋菌等其中鏈球菌之毒性最為兇惡敗血症大都續發於他種多數疾病如生產後流產後創傷後齲齒中耳炎痢疾肝膿瘍癌腫膽道炎蚓突炎俗間及江湖醫稱盲腸炎盲腸周圍膿瘍俗間及江湖醫亦稱盲腸炎肺炎支氣管炎鼻炎肺膿瘍膿胸肺壞疽淋病尿道炎骨化膿等皆能續發敗血症故不可如新舊醫界所商榷者謂吾人平時惠喉病時常為此種菌作祟但常人抵抗力強故無多大妨害見十月三十一日時事新報此語亦似是而非蓋喉病之發於猩紅熱時者確為
body:
  text: 士諤醫話一日本漢醫復興記西醫學術首推歐洲之德國亞洲之日本英法美諸邦瞠乎後矣乃近年日本西醫界自覺其素所信仰之西醫學術對於治療上缺點甚多而又目睹漢醫按脈撰方對於西醫不能治療之症輒奏奇效於是虛心著手研究漢醫書籍特來中國訪道者不一其人原來日本盛行復興皇漢醫學運動皇者日本之土法草藥治療漢者中國傳往之醫學也自數萬人聯名奏請復興漢醫之後漢醫在日本已許正式掛牌開業民眾就診者日盛一日就為從前日本國內不信西醫者向以民間療法為重所謂民間療法就是用本草中藥治病講到實際維新以來漢醫勢力始終盛行於民間未嘗有一日間斷不過隱與顯之分別耳一旦禁令解除漢醫脫穎而出如雨後春筍勃發不已日本皇漢醫之開業者莫不生涯鼎盛漢醫界出版雜誌頗多其尤著者如漢方與漢藥皇漢醫藥雜誌等皇漢醫家之開業廣告遍登各雜誌中德國醫藥博士渡邊熙氏且以皇漢醫家之名義掛牌應世棄西醫學術而用漢方醫藥日本漢醫所組織之團體各地俱有其勢力之龐大為近年任何新興事業所鮮見東京有東洋醫道會即漢醫之大同盟日本議員豬野毛利榮高橋熊次郎等均為會員政界要人頭山滿田中弘之等成為顧問貴族院議員和田彥次郎陸軍中將海軍少將藥學博士理學博士等均為該會有力分子又有日本漢方醫學會本草學會均極負時望漢醫書之出版者本草學會新印本草書籍數十種本草綱目重編者已有四種本草綱目啟蒙國譯本草綱目等材料皆甚豐富東京帝國大學教授富士川為日本之醫學博士又得文學博士學位在學術界極負重望現出其家藏之醫籍考一書內載中醫書籍三千餘種之考證及提要精博為世所僅見由帝國教育會出版限印三百部售價奇昂非常名貴此糾出版之漢醫書籍為數甚多漢醫復興一事引起國內漢醫與西醫之信仰問題當世信仰西醫者大生動搖日本最近出版之報紙雜誌鹹以此為討論中心著名之雜誌均特辟皇漢醫學座談專欄漢醫藥方經各醫院試驗認為有神奇特效者已有肺病白濁腳氣三方本年三月日本帝國大學醫科講師南陽堂醫院院長留德醫學博士引地興五郎來華訪道偕同譯員童桂榮氏在滬訪費子彬國醫到蘇訪顧允若宋愛人顧月槎王聞喜茅子明諸國醫博士言本人致力醫學已逾二十載開業以來亦俱相當成績惟以學無止境遂復留德實習然以本人結果所得科學治療尚有賴乎皇漢醫學補充之必要近數年來每用新藥注射外助以漢藥湯劑成績特著德國醫界已有和漢醫學治療協同設施而醫科大學之畢業者多修習漢醫以充實新知由此推想漢醫傳至今日必有真理存在故特來華考察道經貴地與諸先生一為討論並予賜教為幸經諸國醫竭誠貢獻彼此互相討論博士均一一筆錄於冊教授系統歸納大旨漢醫基本學為素問靈樞漢醫病理學診斷學治療學方劑學首推後漢張機著述之傷寒金匱為大成正宗之學而後旁及千金外台宋元四家學說各以時間之關係為漢醫中代之變局清代為傷寒派溫熱派互相發明之時代故漢醫授學程式一以素問靈樞傷寒金匱為必由之徑千金外台等為考證之書四家為承先啟後中樞之軸清代以至晚近學說為臨機化裁之用此漢醫傳真之學也博士復書寫平時經驗漢方如盲腸炎之用龍膽清腸湯肺炎之用蘇於溫肺散均特倡之作博士對於新醫亦有切實之發表例如新醫治療之一皮膚病敷貼藥膏多不佳良進漢方煎服則預後特佳二割症後進漢方調治恢復康健特速三癌症迄無特效方鐳錠治療多有引起內臟衰弱致死惟於漢醫方中亦尚未得靈驗良方殊為引憾然考之漢醫方其普遍易曉者如六神丸小金丹犀黃丸醒消丸等以治癌之初起不無有良好之效果若癌已滋大以大補氣血而外參以通瘀行氣軟堅之法亦可緩緩消散惟潰而神氣衰敗者為不治博士云無靈驗良方者或指潰壞而言也博士此次來華交換智識表示滿意並云一俟回國當在青山南陽堂倡立漢醫研究社一本世界醫學大集合為宗旨徵集全國名醫刊行書報面委當座諸國醫師為當然社員極願精神上或物質上共同合作云余於日本漢醫復興一事深有所感覺得凡是一種學術成立於世必有其確切不磨之立腳點此立腳點即是人心之真理如日月經天江河緯地萬非政治威權所能破壞所能毀滅佛氏所謂火炎不能傷刀兵立摧折者即是指此吾國歷史人物最霸道最有權威者莫如秦始皇然充始皇之力只能夠併吞六國北逐匈奴其焚書坑儒不過取快一時身死屍骨未寒而儒家之六經已一字無缺的完全發現威權不能毀滅真理也西醫之破壞國醫毀滅國醫亦已不遺余力而真理在人心以日本西醫學術超越英法如此其精進政府威權之禁止漢醫如此其嚴厲且有今日之覺悟全國風起云湧迷途未遠今是昨非麗還觀吾國之西醫長夜漫漫酣夢沉沉雖大聲疾呼未能醒之也吾願博士載籍而去潛心研究究竟菌能致病還是病能產菌弓形菌杆形菌球形菌雙桿菌單桿菌雙球菌單球菌凡菌類之分析較之六淫七情之精究孰為緊要孰為有用吾國醫十二官之所主十二經之所行營衛氣血之分井營俞合之穴是否果無憑據果是玄說人身細胞原子鹽質鐵質磷質蛋白質澱粉質白血球赤血球之化驗分析是否果屬需要腦膜炎肋膜炎腹膜炎等諸膜之發炎肺炎腦脊髓炎盲腸炎等諸臟之發炎僅知其炎而不知其所以炎西醫認為微菌作祟因以致炎國醫歸咎氣血壅滯因產微菌而氣血之所以壅滯不出六淫外感七情內傷究竟何說為是國醫分經辨證六經各有其主症各有其副症且營衛氣血界限分明所以不論如何奇異新病雖書籍未有載過只要認清證據不患無藥可醫不必試驗而能獲效較之驗血驗痰驗尿之工作是否穩妥而簡要西醫以人體為對象國醫以病證為對象此猶淺之乎言之其實國醫所最注重者猶在病證之外凡人精神之所寄魂魄之所藏意志之所出是為生命之源泉國醫稱之為元氣元氣存雖病重不死元氣亡病雖輕必死所以同一病證而男女老幼強弱稟體不同南北習俗城鄉起居各異而施治遂不能齊一豈能以一種特效藥普治同樣之疾病此種地方尤須注意凡此種種問題一一皆須討論至於漢醫藥方君臣佐使之組織勝過科學化驗之西醫此則博士已知之不需吾言矣日本漢醫復興再記報載日本舉國復興皇漢醫學運動之際漢醫之受人崇拜信仰固不待言東洋和漢醫學研究會揭出現代醫學改進之烽火標幟以為號召意謂現代醫學亟須改造復興漢醫猶如山頂舉放烽火將令全世界為之回應該會會長渡邊熙氏為德國留學生得德國博士學位歸日本後歷任國內各大醫院院長之職今次發出宣言謂余每感西洋治療學術不敷應用又無充分把握乃決心習漢醫學成後始知前者藐視漢醫之心全為意氣用事故欲極力表揚漢醫為世界醫藥學辟一新途徑云云當此舉國注重漢醫若狂之際日本京都藥學專門學校有藥窗會之組織會長米倉昌達為日本子爵名重當世特請藥學博士中尾萬三氏編輯本草書目之考察一書於日皇大典紀念時出版此書之刊行目的即在導領全日本藥學界研究中國本草日本醫藥校學生視中國藥物本草為生藥學之重要課程其重視中藥出人意表惟返顧國內醫藥校西醫校視中藥如芥土能不令人氣阻日本帝國女子醫專藥科亦有專攻漢醫漢藥之組織藥學博士塚本氏監督進行已有出版物多種皆係研究中國醫藥者復興漢醫運動之陣容中為舉國所屬目者即國譯本草綱目之出版報紙競相刊載其事視為日本今日之新興盛事列名參加其事者為東京帝國大學名譽教授藥學博士白井光太郎氏任監修及校注之事東京帝大教授理學博士牧野富太郎氏為本草綱目之考定者尚有東京帝大教授理學博士脅水氏等均參與編譯及改定工作該書內容擴大為十五巨冊售日金八十元之巨中國古人李時珍先生為日本如此推崇足見中國醫學之真價值世界上已有初步之認識然而日本醫學博士眼光中只認識李時珍之本草綱目尚未認識鄒潤庵之本經疏證僅知藥性不識方義按西醫與中醫不僅病證診斷上不同病源認識上各異對於藥物中醫主合化集個性各別之群藥於一器加水熬煮而成特殊之藥汁西醫主分化以一藥分析各種成分而成各種之用此中西醫之不同處今日人研究漢醫注重本草不知方義去吾漢醫門牆猶不知若干裏然較之吾國之西醫則已高人一等論日本復興漢醫事日本漢醫復興一事余已兩次作記布諸金鋼鑽報余對於此事不作歡欣鼓舞之文何以故蓋吾深信吾漢醫之學術所以成立於此世界確有不可磨滅之立腳點顛僕不破之真理性萬非政治威權所能摧殘所能毀滅驗諸往古秦始皇焚書坑儒之虐政元世祖九儒十丐之暴令曾幾何時六經依然出現儒家仍為世重秦元之暴虐何曾損及儒家之毫末漢醫見病之真與儒家見理之確初無二致見儒之不減即知醫之常存好生惡死人之常情漢醫能去人之疾病保人之性命使人康強而多壽則人同此心心同此理政治縱極其威權而在學術上不過一時之顯隱日本西醫學術之進步已超出英美法比諸國堪與德國娓美而東洋和漢醫學研究會會長德國醫學博士渡邊熙氏發出宣言余每感西洋治療學術不敷應用又無充分把握乃決心學習漢醫學成後始知前者藐視漢醫之心全為意氣甩事故欲極力表揚漢醫為世界醫藥學辟一新途徑而日本政府解除禁止漢醫令後全國漢醫學團體風起云湧如雨後之春筍日譯本草綱目每部十五巨冊售價至日金八十元日本醫界何以有如此舉動就為漢醫自身自有真價值確有不可磨滅之立腳點顛僕不破之真理性然日人今日所研究只偏在藥性一方面去方義猶遠去病源尤遠以吾國醫看來尚不過認識吾國醫之初步耳尚望埋頭苦干不斷的繼續研究毋以一得自豪也因和漢醫學研究會有現代醫學改進之烽火之狂語故余論及之國醫軍陣傷科學概要序國醫治病大要分為三因一曰內因五志六欲七情之病其因皆自內出名之曰內因二曰外因風寒暑濕燥火六淫之邪皆由氣交外感而成病名曰外因三曰不內外因則指刀箭所傷跌僕所損筋斷骨折皮開肉碎諸病既不屬內又不屬外名之曰不內外因醫書汗牛充棟屬於內因外因者居多若夫不內外因屬於傷科此中人大都長於朮而絀於文道重師承秘由口授是以其文殊少所見董君志仁精於傷科特將生平經驗所得著成一書名目國醫軍陣傷科學概要其中各方又經名醫王一仁君逐一注釋將傷科不傳之秘公諸當世從今而後吾國醫界對於向所視為神秘之傷科亦得稍窺門徑矣因樂而為之序民國二十五年一月四日青浦陸士諤序於滬寓麻瘋病的問題麻瘋為癘風之一種自古稱為惡疾有署名憐香閣主者在新聞報宣佈廣東之麻瘋病其言曰麻瘋是比什麼都要可怕的一個不治之症如果一個人染了麻瘋他的一生就算完了在歐洲中葉的時候無論那一國凡捉住了患麻瘋的就立刻把他槍斃中國東北各省麻瘋病尚罕見在廣東就成為一個很嚴重的問題麻瘋穀廣東順德縣過去數十裏有一個很荒蕪的地方患麻瘋的人都聚集在此他們沒有職業沒有工作終日以求乞為生其求乞方法就是拿一根很長的木棒上結一個小鐵罐向經過該地的人乞錢如果不給他他就會用口涎來對待你據說這比什麼東西還要毒單身女人是不敢經過的因為時時有被擄去的危險賣瘋婦有錢人而患有麻瘋的其來源往往是從女色上得來因為女人患了麻瘋在表面上很難看得出而到外面去勾了一般狂放的子弟來減輕本身的病症這些上了當的人也娶了多量的女人來做妾侍也教他們去賣瘋這樣迴圈不已地增加是何等的可怖不過這是以前的話近來這個賣麻瘋的風氣也不大有了驗麻瘋極輕的麻瘋或得自遺傳的三代麻瘋祖父患麻瘋者外狀仍與常人無異惟皮膚稍呈線紋卻也很難分辨其唯一驗看方法可於夜間用黃色紙一種俗稱驗瘋紙在被驗人的面前燃燒之患麻瘋者面部立呈青紫之色成塊狀治麻瘋麻瘋雖是不治之症但也有一個減輕之法用活馬縱腹部割開使思者裸臥其中每四十八小時後又換一馬換馬愈多其病癒輕可免手足肌肉潰爛之虞但這是土法至於科學方法的治療術新醫界亦漸有發明但仍未見普遍耳如此嚴重之惡疾通國皆知其可怖偏偏西醫有意反對倡言不能傳染他人有香港呂一狂君函問近日西醫倡言麻瘋不能傳染他人及與麻人飲食居處亦無礙云云未蔔其言信否對於未出面者有法驗否倘荷不遺將國醫國藥之驗瘋愈瘋法明示俾得刊入報章亦造福蒼生之一道也余答國醫論風病有四百四種見病源麻瘋屬惡風癘風蠱風類均有傳染他人之可能性至於治法頭緒紛繁須先分經辨證最要詳列各種症狀舌苔脈象斷非簡單隨便所能答覆按經言癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客予脈而不去名目癘風此病之源亦病之癮結也西醫既有新知識發明麻瘋不會傳染即請該西醫親身實地試驗與麻瘋人同臥同食事實之證明勝於任何雄辯質之該西醫諒必首肯也姚名達問病記微菌之為物其形不一有弓形有杆形有球形有雙杆形單杆形最球形單球形西醫於此種種之菌精究其形狀分析其種類以為萬病之源皆由乎此病而一涉乎菌無不談虎色變在吾中醫對於微菌一物亦知可厭可憎惟不若西醫認為萬病之源吾中醫知另有病源決在微菌之外決不能張冠李戴捉生替死使真真病源反得邋遙法外肆虐以禍人吾中醫認人身以內之微菌猶人身以外之蟣虱同屬可厭可憎之物其為可厭其為可憎其為有害於人吾中醫亦何嘗否認惟決不肯誤認做萬病之源轉移吾醫者之目光精神貫注全注於菌真真之病源反致無暇顧及而病源反得潛滋暗長肆虐不已事實之證明勝於任何雄辯吾之謂此並非空言吾蓋有為而言也民國二十四年四月三十日鄉先輩陳蓮舫徵君之孫橘璿假西藏路寧波同鄉會行結婚典禮余以戚誼被邀往觀禮逮宴畢回寓已十時有半而老友朱大可陳澹龠同新友二人在診室俟余大可且攜其少君小可澹龠為余介紹新友之一係姚君名達暨南復旦兩大學教授也姚君為其夫人之疾求余設計余問其狀姚君曰余妻曾產五六胎現又懷孕已及六月前因頭痛就西醫診西醫認為肺病頗嚴重非先打去其胎不能治療余妻不願西醫日不肯打胎亦可惟不能速愈耳遂日日為之打針余問咳嗽否姚君日無余妻之頭痛雖經西醫悉心治療絲毫未見功效後來愈痛愈劇手臂亦遭延及斯時用愛克斯光照看始知肺病並不嚴重西醫又言此手臂之痛當是風病於是改打風濕之針亦未見效近來則頭痛更劇甚至夜不能眠項背皆強西醫言此症變成腦脊髓炎矣非入醫院不可連延數西醫語皆相同於是送入醫院院醫言此症嚴重已到不治地步絕無辦法要余簽字生死憑諸天命之紙姚君言時語帶江南方音大可恐余不解則為之翻譯大可言姚夫人乃當代女作家設女子書店於霞飛路五百二十三號該書店出品大半是姚夫人作品余大為感念此病者為吾國女界傑出人才定當竭吾之力為之診治因告姚君尊夫人既經眾多西醫細心診治認為無辦法之不治之症余何敢以未會診治之症認為決有把握但是病人住院所以求病之愈今該院醫既言絕無辦法則住院與不住院效果相等為君設計當以趕快出院為先決問題早一刻出院即可早一刻設法姚君要求先與一方藥余於是書一小方藥僅二昧仍是鮮竹葉六錢鮮生地二兩也姚君復問對於此症究竟有無把握余曰須診過才能下斷語現在最要就是出醫院一事次日為五月一日午後姚君電話來言病者狀況頗佳余問昨藥服否回已服完問何時出院回須明日二日餘晨午晚三次電話於女子書店問姚夫人已否回家回仍住醫院愛莫能助也三日午後姚君來寓余劈頭就問夫人已出院否姚言未曾出院餘日然則病勢當已減輕姚言病者兩目已昏不能視余訝日肝腎絕矣姚言院醫既無辦法又不許出院日惟抽病人脊部之水言次淚承睫此時余惟有以語言寬慰之而已余對於此事有疑問數個偶患頭痛何以確知其是肺病在吾中醫肺之脈不上頭頭痛何能斷為啼病西醫即不知脈頭與肺之距離當亦知之此種診斷余不能解一也即使確是肺病病在於肺治肺可也與胎何涉胎居胞宮在下肺居上焦在上肺與胎風馬牛不相關涉何以必以打胎為先決問題在吾中醫治病病不由胎即使同處下焦亦斷無舍病打胎之理此種診斷余不能解二也人命至重學識有限吾中醫遇到嚴重之病自審不能解決者必叫病家另請高明不但口頭囑咐並且書面寫明決不肯既無辦法又不放手貽誤病機也貴西醫之不放姚夫人出院吾中醫誠莫測高深此種辦法余不能解三也敢請貴西醫將以上理由在報紙上逐一披露企予望之姚名達問病記書後余草姚名達問病記才付刊遇朱君其石其石大可弟也與姚君亦相識其石曰名達夫人已死醫院中君知否餘日目昏不能視肝腎兩絕余早決其必死其石曰姚夫人若早延中醫診治當不至此餘日中醫雖未必盡愈諸病然分經用藥標本兼顧比較利多弊少其石日姚夫人死矣遺雛呱呱頓成失母之兒姚君晚歸幼兒牽衣索母此情此景可憫可傷餘日死者不可復生追悔亦已無及余願姚夫人死後姚夫人之友姚君之友常以姚夫人就診之情形志之於心刻之於骨永遠不忘余願世之人與姚夫人同病者亦以姚夫人之就診情況時時憶及引姚夫人為前車之鑒俾一誤不致再誤余猶恐姚夫人死而後之繼姚夫人而起者為姚夫人第二姚夫人第三則後顧茫茫殊可悲耳因於姚名達問病記後復伸紙濡筆作書後之篇枇杷膏市售枇杷膏觀報載廣告文字所述功效宣傳已不遺余力真若可信然此種枇杷膏究竟是枇杷所煎熬抑是枇杷葉所煎熬在藥性上則枇杷之功用與枇杷葉之功用不大相同國藥鋪之枇杷膏是用枇杷葉煎熬而成不是用枇杷煎熬而成考枇杷甘平潤肺滌熱生津多食即助濕生痰枇杷葉味苦氣平隆冬不凋盛夏不萎稟激濁揚清之性抱忘炎耐冷之姿靜而能宣凡風溫溫熱暑燥諸邪在肺者皆可藉以保柔金而肅治節香而不燥凡濕溫疫癘穢毒之邪在胃者皆可用以澄濁氣而廓中州所以枇杷葉臂能清肺化痰止嗽枇杷果膏能助濕生痰滑腸現在枇杷上市尚望熬膏者注意及此棄果用葉則於病人較能有益按枇杷為閑食品自古從未入藥果與葉品性懸殊萬難通融不可不知電臺醫學問題士諤大醫師道鑒年來讀金鋼鑽得誦洪篇巨論不勝敬佩數載於茲鄙人素好斯道第囿於愚陋勿能有得昨逢敝處醫士某涉談及溫熱一症彼據餓不死傷寒一語深言溫熱初起必不可食須病痊已後方能納穀即使纏綿不解兼旬累月亦遵是戒鄙意人以胃氣為本平人絕穀尚且傷生況以抱病之人豈可使絕食哉損穀則可耳此二說未知孰正敢乞一言以為遵守不悉能不責其荒謬而賜以教言否敬惠然不棄畀以片言即請於金鋼鑽上發揮且公同好則幸甚冒瀆清神不勝抱歉之至耑懇即祝道安林上傷寒原屬外感之總名溫熱亦是傷寒之一種俗稱餓不死傷寒當是指寒濕濕溫而言緣濕濁阻滯必有胸悶胃呆泛惡諸症此時胃中滿貯濕濁非但不欲食亦不能食也餓不死一語當是對病人家屬而言換一句話即叫他不欲強勸病人努力加餐並不是禁止病人進穀病人如果濕化知饑索食亦不禁也不過不能使之過飽耳若云一病傷寒即禁穀食實是誤會試觀仲景傷寒論服桂枝湯後須啜熱稀粥白虎湯桃花湯中俱有粳米仲景為醫聖其治傷寒之法如此胃為水穀之海人生在世有胃氣則生無胃氣則死謬語流傳實不可信為吾傳語浙東以免彼此貽誤敬復郎中之偷工減料郎中是國醫的普通名稱為了通俗起見秉筆為文我叫同道不曰國醫而曰郎中郎中瞧見了吾文休要動惱就為我自己也是個郎中記得聊齋有狐諧一則狐向人說我不罵人罵狐如何我現在也是狐罵狐的法子未曾開場先打招呼諸位郎中休再怒目相向郎中最歡喜偷工減料有講話上的偷工減料有寫字上的偷工減料有作文上的偷工減料先提起講話上的偷工減料如病證中之麻黃湯證桂枝湯證白虎湯證柴胡湯證梔豉湯證總要偷工減料減去一個湯字稱它為麻黃證桂枝證白虎證柴胡證梔豉證藥品中之枇杷葉膏是清熱泄風化痰止嗽要藥偏偏偷工減料減去一個葉字稱它為枇杷膏這一個字看去很是平常的卻不道關係很是重大幾被它大誤蒼生就為普通的人大都循名而不察實聽說是枇杷膏只道是枇杷煎熬的不復知是枇杷葉煎熬的那裏知道枇杷的藥性與枇杷葉的藥性枇杷的功用與枇杷葉的功用大是不同萬萬不可通融萬萬不可遷就枇杷的藥性是甘平潤肺枇杷葉的藥性是味苦氣平這是不同之一枇杷地功用是滌痰生津枇杷葉的功用是隆冬不凋盛夏不萎稟激濁揚清之性抱忘炎耐冷之姿靜而能宣凡風溫溫熱暑燥諸邪在肺者皆可藉以保柔金而肅治節香而不燥凡濕溫疫癘穢毒之邪在胃者皆可用以澄濁氣而廓中州這是不同之二多啖枇杷就要助濕生痰常服枇杷葉可以清暑辟穢這是不同之三枇杷是閑食品不是藥品枇杷煎熬的膏根本上絲毫沒有用處方子中之柴胡桂枝湯明明是小柴胡湯與桂枝湯的復方偏偏偷工減料減去胡字枝字兩個字變成了柴桂湯猛一瞧時只道此方只有柴胡桂枝二味藥呢這是講話上的偷工減料再講那寫字上的偷工減料如人參之參字寫作參字偷工減料也天門冬麥門冬之門字寫作門字偷工減料也澤瀉之瀉字寫作瀉字黃蘖之蘖字寫作柏字偷工減料也生薑的薑字寫作薑字穀芽之穀字寫作穀字偷工減料也茈胡之茈字寫作柴字竹筎之筎字寫作茹字偷工減料也此外如旋覆花之寫作全福花神麯之寫作神麯薿冬之寫作款冬無一非偷工減料積習既久習非成是假使你要矯正它藥名悉書原字連藥店中人都不認識我在松江時曾經試辦過鬧了不少的笑話結果還是老樣子這是寫字上的偷工減料談到作文上的偷工減料近來的國醫作家對於國醫學說是否已經明白對於本國文字是否能夠暢達我殊不敢懸斷假使說他國醫學說已經明白本國文字已經暢達那麼一瞧他的大作血球液體原子細胞淋巴腺肺管炎血壓微菌等種種不見經傳的名詞為其觸目皆是不說他非驢非馬不中不西只說他賣野人頭不說他賣野人頭只說他是文思枯窘不得不做這偷工減料的勾當這就是作文上的偷工減料這幾樁都是我們做郎中的偷工減料事實俱在欲瞞不得有人說郎中雖然偷工減料那國藥鋪卻很認真凡是國藥鋪中的枇杷膏卻都是用枇把葉刷淨了毛煎熬成膏的枇杷是一枚也不用並且加的糖都是冰糖很靠的住寫字上的偷工減料作文上的偷工減料雖然都是事實幸與一般民眾沒甚關係我們民眾都可以不問一任你們郎中自偷自減我聽了之後簡直是無言可答治癒肺病之奇方友人程子云中年忽得肺病醫藥罔效飲食既減起居亦不自如吐痰成黑綠色同人皆惡之程亦自分必死居停主人某見其狀促往某外國醫院醫治蓋該醫院為肺病專門也程信之即往求診外醫某診斷良久謂程曰君病已不治一月內必死可勿須住院矣程聞之慘然歸越數日有長親某自鄂來固儒而知醫者見程削瘦如鬼因問之程以病狀告且謂某外醫決其一月內必死言下虛欷落淚長親便為診視有頃笑日病雖危尚可治他藥無須服每日可食白桔若干生蒜子若干須百日不間斷切忌房事早睡早起呼吸清氣病當愈程以生死關係謹依其法至四十日後已略見起色百日既過強健如常人矣大喜過望遂赴外醫處示以不死外醫為之赧然久之此事程君親告我是疾病中最危險而難治之肺病白桔蒜子竟可愈之矣然此法知者似不甚多而國人每年之死於肺病者實不知凡幾不知白桔蒜子之於肺病究具若何功用陸士諤先生必知之審竊願聞其說焉治癒肺病方太甯君令友程子云所患肺病究竟是何種肺病蓋肺病一證在吾中醫決不如西醫之簡單診斷須判出是肺寒為病是肺熱為病是外感是內傷病因之不同既已如此麻煩即內傷一類中又須分出是肺痿是肺癰是肺癆肺癰偏於實肺痿肺癆偏於虛各有其病源各有其見症各異其治法倘未真知灼見斷難驟定治法今吾先要問太寧君貴友程君之肺病究竟是寒是熱屬實屬虛是外感是內傷是肺痿抑是肺癰肺癆如果不能真實回答那麼我的答案不過如無題之文無的之矢何能確當真切據述中年忽得肺病飲食既減起居亦不自如吐痰成黑綠色削瘦如鬼照此簡單記載當是肺熱成痿則其方之白枯蒜子則桔字當是芨字之誤藥雖只有二味一補一行白芨以補肺蒜子以行氣當然效如桴鼓並不奇也請問太甯君令友當日語聲是否如常此一點尤為緊要再白桔是否是白芨之誤亦諸查明見示均請仍在鑽報答我復陸士諤先生敝友程子云所患肺病經詢問後果是肺熱成痿白桔確係白芨之誤程君語聲患病時甚弱近已轉強如先生所言則肺病詎並非皆不治之症耶亦不須如西醫之開刀取骨耶乞高明教我再論肺病肺病有易治之症有難治之症外感之肺病如濕邪犯肺之類屬易治內傷之肺病屬難治肺癰肺痿肺癆皆屬難治而肺痿肺癆偏於虛尤為難治之難治至問開刀取骨吾中醫素無此項治法不能妄對吾中醫之治病猶之援溺救火目睹人之入水屋之被火則竭我心力以援之救之水勢之浩大與否火焰之猛烈與否不懼也不管也袖手旁觀不忍也倘以屋已焚燼人已溺死責備援者救者之過失雖屬無辜受謗而吾儕原諒遭禍者之身受慘痛舉動失常亦不忍與之計較設當人之初溺而預計之日是可援也是不可援也火之初起而預計之日是可救也是不可救也此非忍人必是別有作用吾中醫何忍出此敬復太寧君請太甯君毋再以觀察西醫之目光觀察吾中醫而幸甚肺熱成瘺在吾中醫初起只用沙參天冬麥冬諸藥失治而病進亦只用百合知母阿膠諸品用至白芨則病之嚴重已達極度所謂焦頭爛額之治也產後驚狂項君之夫人產科西醫也對於生理病理極深研究有徹底之瞭解本年國曆十一月初產一孩產後頗健至八日微覺不適乃往山海關路同德產科醫院開三接十二號病房住院求治病勢日增至十日神昏譫語發狂矣院醫束手無策項君睹狀惶急即延滬上著名西醫診治連延數醫均謝不敏病者偶或清醒因深解病理自知決無生望轉囑項君善撫諸孩項君悲不自勝時病者之姊某夫人言病既危急西醫已無辦法不妨改延國醫姑妄一試死馬當活馬醫不作必愈之奢望也項居然之乃來延余時十一月十日上午也余診其脈皆現芤象而兩尺頗為流利面色青黃舌苔白身熱凜寒時或戰傈時或如狂飲食入口欲吐慰之日此症決不會死乃是風熱內陷引動風陽所以如是怕人在吾國醫視作尋常不難治也君等既然延余診治余可負責惟有一要求除余所開湯藥外西醫之藥水藥粉概不許入口西醫之外治諸法藥水針等概不許近身能依吾法余即寫方不昕吾言余亦愛莫能助也項君日既然請到先生任憑診治自然十分信服余於是立案日產後八朝身熱欲吐時或凜寒戰傈時或如狂舌苔薄白脈芤兩尺頓流利此乃風熱內陷引動風陽之故法先宣絡透邪鎮驚息風方則桑葉白薇茯神夜交藤仙半夏琥珀茺蔚子飛滑石絲瓜絡蒼龍齒左牡蠣也十一日病者之姊來言服藥後驚狂已瘥身熱已減惟夜不能眠大便見溏胃頗思納舊方是否可服餘日病之狀態既已變遷藥方亦須變更來人要求懸擬一方余允之乃為之立案日據述驚狂已瘥身熱已減胃頗思納大便見溏惟眠不甚安耳擬與和陰方則朱茯神夜交藤煅龍齒煅牡蠣生穀芽浮小麥炙甘草紅棗也十二日又來相延言昨藥服後大便解下蛔蟲一條仍有身熱微汗診其兩脈已無芤象惟弱耳舌苔白尖微紅眠仍難安餘日此虛熱也非用微苦之藥泄其心火不可為之立案曰產後十朝驚狂皆瘥虛熱微汗眠猶難安大便解下蛔蟲小溲已氏舌苔白尖紅脈弱此乃陰傷使然法主和陰救液方則北沙參大白芍炙甘草朱茯神夜交藤蓮子心浮小麥紅棗煅龍齒煅牡蠣活磁石也十三日項鈞方君來言昨日服藥之後情形大佳驚狂虛熱皆瘥夜眠亦安大便小溲都行大致生命總可無妨矣餘日餘初次診脈即許以不死現在病已去其大半當然可以寬心項君日病人自己常常憂慮頗難寬慰餘日緣病者身為西醫經目已多見產後此種病症多屬不治是以憂心不知在吾國醫實非絕症尊夫人經此次親身試驗之後當信吾國醫確非大言欺人者項君唯唯是日方案日驚狂虛熱皆瘥夜眠已安溲便皆行產後已十一朝矣當與和陰西洋參大白芍炙甘草朱茯神夜交藤浮小麥紅棗葡萄乾煅龍齒煅牡蠣生穀芽此藥服後電話來報告病狀有變言兩乳作脹身有微汗時余出診在外尚未回家也十一月十四日往診病者告余遍體微汗兩乳作脹自覺煩熱溫度計測之不甚高也有無妨礙余慰之日無妨也兩乳作脹此為釀乳即使熱度極高亦不為害蓋為產後必要之過程切不可使用西法冰之以冰塊打之以退熱針庸人自擾致成大患病人日能為我消脹否余曰能病人又言口渴飲不能解余允為之設法脈象與前診無甚出入書案日產後十二朝驚狂虛熱不眠皆瘥小溲多微有汗乳微作脹舌苔潤口乾一法與養陰方則西洋參金石斛大白芍炙甘草香穀芽朱茯神夜交藤煅龍齒煅牡蠣制女貞紅棗也此藥服後口渴較減乳脹不瘥病者頗以為慮十五日之案日產後十三朝眠已安胃能納乳猶作脹肢麻法宜養陰兼與消乳方則吉林參須西洋參金石斛大白芍炙甘草朱茯神夜交藤煅龍齒煅牡蠣制女貞香麥芽焦山楂生穀芽也次日項君來言昨日之方大佳兩乳已不脹矣胃納已增夜眠亦安惟大便不通已有三日可否設法一通余答以診視過後再定方策及午後往診病人亦要求一通其便余曰礙難遵命此乃陰液虧損並非是積濁不下斷不能通倘與通瀉藥定生變端蓋吾國醫以病為物件雖同病大便不通而其所以不通之故既有寒熱虛實陰傷積穢之不同治法亦不齊一斷不敢以簡單純一之瀉藥通治各種便閉症國醫之比較麻煩就在此等處所是日乃十六日也案日產後十四朝眠安納增乳已不脹舌苔白脈已較和大便三日未行不可攻也法與養陰方則以前方去楂炭麥芽加小生地並加重白芍十七日大便猶未行眠不甚安眼花肢軟微汗乃於前方中加歸身秫米遠志棗仁服後諸恙皆瘥惟便仍未通再加淡蓯蓉一味大便始暢行於是欣然出醫院為與魏玉璜一貫煎調理而瘥復雨泉君單方氣死名醫之蠶豆鄧永年所服的是陳蠶豆我意新蠶豆陳蠶豆都可以用得很不必拘泥只要以豆代糧以湯代茶就是你老人家試過有效尚希函告此復雨泉君陸士諤啟秘方公開上海國醫學會為滬市學術團體之一辦事尚有精神既辦學堂叉辦醫院會中出版品有國醫雜誌國醫週刊國醫月報三種又有特刊一種考正丸散膏丹集每月五日二十日夜六時執委監委兩次聯席會議於討論會務之外研究國醫學術因此異藥秘方時有所聞余於昨晚會席偶提報載奇乞丐捕蛇事某君即言丐之醫蛇咬秘方我倒知道藥只二味得之極易且不必花錢其方乃用耳垢癟虱同研細末陰乾遇毒蛇咬傷以少許搽之立效痛定毒消靈驗無比更有一治流痰秘方流痰一症東愈西病其痰流走不定名醫為之縮手有一秘方治此極效藥僅二味隨處可采不必花錢其方是用石榴一枚挖空其中提活蜒蚰七條置入用綿紙封固煅存性即焦而勿使成灰也研細末貯磁瓶中勿洩氣每服三錢開水吞下重者五七服輕者三四服即瘥據某君言此兩個秘方均極靈驗耳垢癟虱須各等份或多或少即不效云電臺醫學問題士諤先生每於報端得讀大著輒為神馳論病探源具徹底之見解妙緒宏議作邃密之文章三復斯言無任欽佩茲有請益者友人於上年春初惠痢經七八月之久中西醫治百無一效病者已骨瘦如柴支離床褥已無生望一日忽思食蟹家中人初不之允旋有探病者至謂患者已危殆至此食蟹雖保其必死然不食蟹亦斷無望回生於是選購兩隻煮熟以進不謂病者食蟹之後痢即止不數日居然起床霍然而愈查蟹能治痢醫書不載質諸中西名醫皆莫能道其所以為此不揣冒昧請益高明得蒙有以教之幸甚幸甚耑此祗頌台綏陳席珍此必熱痢病邪已經入血按蟹性鹹寒能清熱行滯散血貴友之痢恰與此物相合對症發藥自然效如桴鼓再習俗食蟹必佐薑醋糖醬醋能入血薑為反佐糖醬能解毒和營則得蟹之利而能免蟹之害此亦一道也請查四馬路校經山房最近出版之國醫新話上冊第頁說蟹即知其理近來有來函問病不具真實姓名者礙難奉答士諤服務社會自信尚能竭誠而問者連一姓名之微猶吝忠實相告則其所述病狀是否真實確難保不成問題因於答陳君之暇順便及此為不答之答也國藥之特長有人主張中藥西制美其名曰改良國藥其法把中國所有藥材一一按照西國之法與以化驗與以提煉分析出成分制成藥品某分幾成某分幾成吾謂此事如果實現國醫的精神完全喪失不過市上多幾種國制新藥貢獻醫林留待試驗而已吾國醫之治療病症全在藥方之方義群諸藥而成方其組織法中配合君臣佐使務使與病絲絲入扣其所以能夠組織成方者全在利用各藥之完全個性若然把各藥提煉分析則個性不全何能使用勢必如外科之升藥降藥別成一種特性之效能與原有個性本來面目完全相失西藥之化驗提煉此正是西藥之短處所以每遇新病發生西醫即縮手無策何以故西醫所恃以治病者制成之西藥病既新生藥未預制自然無法可想在吾國醫以方治病只要證據全備任他百怪千奇可以分經論治按證定方自能收效於頃刻蓋吾之精義在方中之主藥應幾錢幾分佐使藥應幾分幾厘某藥須先煎某藥須遲入某某藥須同煎用若干水煎時須武火須文火而不在一藥中之某某成分若干猶之吾國文字之重六書五音四聲而不重拼音削足適履斷斷不可今之風俗崇尚摩登即關係生命之醫藥亦惟歐西是效本國五千年之良法美意敝屣不值也籲可歎可歎電臺醫學問題士諤先生台鑒謹啟者鄙人素業雕刻身頗薄衰終日坐而工作自去年八月間起坐則常患腰酸且小便常如黃色如立時及行動時毫無酸痛之患不知是否腎虧抑係久坐之害耳聞先生每日在無線電臺演說醫學常識經驗極富故特走筆請教可否望先生賜我一方或應如何醫治望乞示指教得能疾病脫體皆出於先生之所賜後當結草圖報敬此奉懇順頌籌安徐貴恙乃是久坐工作腰部欠於活動之故與腎虧毫無關涉奉上小方請服七帖當有效大豆卷三錢獨活錢半清水二杯煎成一杯去渣服一日一服共服七日士諤先生台鑒鄙人時聽先生於電臺貢獻人民對於國醫常識非常感謝而欽佩鄙人自患氣喘病已二十餘載每逢節氣發病少覺吃力併發時微有寒熱頭痛薄痰等狀未識用何法可治照先生眼界能否可除根懇請賜一良法不勝惑謝之至即請春安顧尊體所患者喘與痰兩病耳有治療法有良方雖未必能除根多少總可減少些痛苦至寒熱頭痛此乃時令暴感須就近請國醫診治不能預定方藥也治喘治痰之方在國醫新話民眾醫學常識內可檢抄照服自有效也國醫新話在四馬路校經山房出版陸士諤答伍非予君問絕孕方問原方云經前經後各服五帖經前云者是否預計天癸應至之期倒溯五日每日分服一帖經後云者是否於天癸淨盡時起算每日服一帖答經前是預計經水將行之前如上旬中旬下旬可逆算也經後即經淨第一日算起問該藥眼法是否每帖兩煎抑只服第一煎答一煎二煎隨便問哺乳期間如仍行天癸時可否照服答可以照服問常人於哺乳期間雖不行天癸亦能受孕者本方對於此種受孕亦能制止否如欲於所述情狀之下服用本方以免受孕所謂經前經後云者又應如何計算之答每月各服十帖服過三月自效此方方義甚巧而乃呶呶不休豈於國醫學是門外漢吾知內家一見即知必不問也絕孕方之解釋余撰國醫新話由上海四馬路校經山房出版後未及四月而初版六千部竟已售罄巴人下裏屬和遍國非始料所及也新話中刊有絕孕與戒煙兩方而四方賢豪對於絕孕一方一獨多疑問來函討論者日必數起答不勝答復不勝復殊為困苦而此方又為臺灣東西醫藥報所轉載天津中西匯通醫社孫張李三君又見懷疑函求解釋余因以來函與答語刊諸報端並以報孫張李三君者即以報國醫新話讀者諸君以後即承下問亦不答復懇望恕之孫張李三君原函如下士諤先生道長大鑒久仰大名知南中醫界物望成推先生以河山間阻恨未得一聆教言為憾茲閱臺灣東西醫藥報期內載先生介紹宋人停孕效方及解救方並稱其組織之精設想之巧當無不效云竊以此方藥僅六味平平無奇何以有如此神效且兩方藥味相同者四停孕方用黃柏知母解救方易以黃耆肉桂而功用即有天淵之不同鄙人等學識淺陋未能深窺其奧用特函訊先生敬祈將兩方用意所在詳為解釋或直接函示或披諸報端非特鄙人等得釋疑團而開茅塞抑亦醫界同人所樂聞也耑此敬候台綏孫張李同鞠躬答言此方並無深意不過占一個巧字試思六昧藥中除去知母黃柏其餘的四味是什麼藥知道了芎歸地芍就該研究芎歸地芍是個什麼湯知道了四物湯就該研究四物湯是有如何的效用能醫治什麼病知道了四物湯能夠調經專治婦人經水病就該研究經水從何而來研究到這一點就可以知道四物湯專治受孕了受孕與不受孕其責任全在血室現在以知母黃柏追隨四物而得進血室方可舒其效能則絕血室之生機生機既絕如何再會受孕黃耆肉桂之與知母黃柏藥性恰在反對地位肉桂溫暖血室黃耆鼓動生氣自然絕處逢生了尊論言平平無奇何以有如此神效余則謂正以平平所以要久服正以無奇所以稱巧方若專用破血霸藥粗而無理流弊百出不配稱精巧矣陸士諤敬復醫藥顧問大全近來坊間出品者類無一顧之價值豈古今人不相及耶良以倉卒編撰選擇未暇精審多坐是弊耳乃世界書局新出版醫藥顧問大全一書由余審定頗切實用可謂出版界之佼佼者特介紹其總論兩則如下煎藥須知煎藥法極為重要煎藥得法病勢易瘥不得其法善既未見禍反現焉此煎藥法不可不講也大抵外感病之藥類多香透不宜多煎多煎則香氣過性往往失其功效內傷之藥類多補正煎宜時久少煎則藥力不出功效不見煎外感病之藥宜用急火煎內傷之藥宜用緩火旋覆花枇杷葉等藥俱宜包煎不包每令致嗆以毛入肺內也丸散末時亦宜包煎則湯清而不渾膩易於上口砂仁蔻仁必須後入多煎則失其效用糯稻根必須去泥不去泥難以上口服藥須知服法極為重要服藥得法能收事半功倍之效大抵病在上者宜飯後服藥藥居飯上不致走下使藥力四散則上焦之病自瘥病在下者宜飯前服藥服藥後即食飯使藥居飯下則藥力下達功效自見病係假熱真寒宜熱藥涼服假寒真熱宜涼藥熱服吐血病藥宜涼服補益藥宜膏滋服久病宜服丸散凡此皆服藥之效法也切宜注意戒煙自煙禁嚴行而後癮君子無不慄慄危懼然市上戒煙藥萬妥萬當有百利而無一弊者極少余前在鑽報披露之方頗著效驗遵服見效來函稱謝者有三五十封之多後因索抄此方者日必數起爰將方子刊入上海四馬路校經山房出版之國醫新話中凡遇索方者令購新話自閱稍省麻煩然此方雖好猶嫌其手續太多客居者每感不大便利特將此方重行研究成一新戒煙方靈驗而又省便當於明日在本刊披露戒煙新方此方極靈極驗萬妥萬當有百利而無一弊上好紅茶葉二兩食鹽二兩清水三大碗文火煎成一碗藥汁濾去渣貯有蓋碗中俟冷盡加入煙膏一兩攪令勻每癮時用開水沖服藥汁一匙旁另置涼開水一碗服畢即加涼開水一匙於藥汁中蓋舀去一匙藥汁即加入一匙涼開水藥汁水分不減而藥性日薄約一個月可戒絕天氣炎熱時藥汁日日隔湯燉過此方方義煙乃火之餘火日炎上炎上作苦鹽是水所結水曰潤下潤下作鹹用鹽以剋制煙毒鴉片能走上十二經無經不入無絡不行茶葉亦能走十二經無絡不行無經不入鹽所不能到不通達之處用茶葉以引之則無微不至矣煙膏為藥之靈魂用為反佐取同類相招同氣相和也所以用煙膏不用煙灰者以灰係濁品腸胃中稍有渣滓存留即釀流弊膏則純係清品化氣而行絕無流弊逐漸減少不知不覺使陳癮積垢自能除盡有潛移默化之德開改過自新之路私心自許戒煙方無有再穩再妥於此者癮君子乎盍興乎來江西發現驚人之熱疫汀西南昌近來發現驚人之熱疫遭此劫者多屬三齡左右之孩童先後死者已逾三十人醫者束手無策江西省會公安局保安第一隊施濟民君不忍坐視郵函求治余佩其熱忱並尊重施君之意特將來函去方刊佈於左施來函士諤大國手先生台鑒敬啟者鄙人素閱上海新聞夜報所附刊之國醫週刊內容豐富闡揚醫藥之奧妙精研疾病之根由功在國民惠及群黎無待贊言矣查近月采南昌附近各街市及鄉村發生一種不治之症醫藥罔放醫家均認為絕症茲將大約病狀列下病者均係三歲以內孩童大略症候先發微度溫熱心煩口渴泄瀉便赤脈數稍洪再發壯熱驚搐手足亂舞抓口撕胸日夜咆哮不安喜飲茶湯面貌如平常人舌色邊赤中苔黃屎瀉青黃色如蛋花泡小便清白稍長身首角弓反張喉間稍有痰鳴頭部熱盛四肢溫腹中有響聲而帶飽脹問或嘔吐病兒多用手向口中抓挖最後之症狀則益加厲害喉作乾嘔大便黃而且濃小便頻數身體及聲音不如前之壯烈一息奄奄因而天殤統計至現在止將有三十名上下患此病而死者但在病中者亦為數不少以鄙人觀察各醫家所開方藥始則以清疏解表不效繼則以抑肝扶脾清心鎮驚之藥方治理然均愈治癒危亦有以慢驚方福幼編上方藥治理者皆無效毫無靈驗若依病狀而認以上開治法似屬正當何以一無應驗鄙人並非醫家不明醫理故不敢論證談方但以公安責任心所驅使不得不加注意素仰臺端醫學精深如秦華之再世對於此種小兒病定能妙手回春不畏冒瀆函請俯賜指示並希說明何症何病應用何種方藥分步診治才為有效如蒙裁示不勝感盼並請登於國醫週刊以公於世再者鄙人對於醫學頗具興趣凡每週的國醫週刊均經我彙集成冊但以無師指導之苦究有若何辦法可想或購買何種容易入門之醫書自行誦讀統祈指示為禱謹此敬候鈞安施陸士諤復函此熱疫症也闔戶沿村千人同病千病同狀如役使然古名曰疫以病發由於蘊熱名之曰熱疫綜其見證初病不過是陽明經腑兩病身熱煩渴脈洪確是陽明經症泄瀉便赤確是陽明腑症經腑兩病治當從經著手經病解腑病不攻自愈失治則病勢內陷變成陽明厥陰雙傳症就難治矣以胃口膜原鄰近三焦故傳入厥陰極易易壯熱口渴頭部熱肢溫腹脹舌苔黃糞色青黃無一不是陽明見證驚搐手足亂舞抓口撕胸喜飲舌邊赤角弓反張小便清長嘔吐日夜不安無一不是厥陰見證法當與氣血兩清之法至傳入三陰則病者陰陽兩竭縱有神丹亦難挽救以熱減音低為陽竭之徵乾嘔為陰竭之徵小便頻數陽不攝陰也一息奄奄氣陰兩盡矣非但不能救亦不及救鄙見如此是否有當尚希海內同道指教第一方鮮竹葉四錢生石膏八錢甘中黃八分生知母三錢天花粉四錢鮮竹茹四錢第二方生大黃三錢生川連五錢以上二味泡入藥不要煎黃芩三錢知母四錢天花粉六錢連翹三錢鮮生地一兩磨沖犀角尖五分磨沖羚羊角尖五分鮮竹葉四錢鮮竹茹四錢甘中黃八分以上兩方服後效果如何希示知為感至問國醫初學入門指導之書則上海世界出局出版之醫學南針最為合用參考之書世界書局最新出版有醫藥顧問大全校經山房有國醫新話皆可看得陸士諤醫林開場白鑽報新辟醫林抱有最大之希望三希望國人對於本國醫學之認識希望世界對於吾國醫學之認識希望做醫生者對於國醫真面目之認識中國醫學有五千年之歷史五千年之經驗炎帝軒皇伊尹發明藥性湯液按摩導引針灸砭石諸術於前扁鵲倉公仲景元化叔和弘景王燾思邈繼志述事於後金元四大家明清各名家繼往開來因時制宜民少夭折族繁人眾為世界冠此皆醫學之功國人不可不認識世界各邦醫術日新月異然其弊在全仗器械之精利反蔽耳目之聰明對於人體最要緊之手足十二經臟腑十二官營衛氣血之分井營輸合之穴反不認識明見萬里不能目睹其睫忙忙碌碌不過是抱了小孩尋小孩現在東鄰日本巳知研究漢醫希望世界醫林急起直追認識吾國醫也近來作醫生者見異思遷喜學時髦不妨人云亦云難免張冠李戴此其禍大者害及整個的學術小者關及個人之名譽皆緣未曾認識國醫真面目耳希望做醫至者放開慧眼掃除障礙認清吾國醫之真面目開場白是過請看下麵正文論中西醫或有問於余目海通以來歐美與我接觸日繁新病之發生月異而歲不同而吾國醫術猶是五千年相傳之舊法以陳舊之醫術療新生之奇病是猶仗弓刀騎射抵抗飛機大炮也烏能有功余曰人體之組織古今相同也古人有五官四肢今人亦只五官四肢未嘗聞今人之五官四肢有增於古之人為六官為七官為五肢六肢古人有五臟六腑今人亦只五臟六腑未嘗聞今人之五臟六腑有增於古之人為六臟七臟七腑八腑人體之組織既古今相同則病來雖新而吾中醫只消認清六經三焦辨明營衛氣血審實風寒暑濕燥火之屬於那一邪表裏虛實臟腑之屬於那一類診視確當自然絕無錯誤弓刀騎射飛機大炮都是身外之物與身內之組織絕不相類舉以此況可謂擬不於倫或曰診斷即使確當一治療有無方藥余目此可不必慮中醫治病在方之組織不在藥之神靈不比西醫仗特效藥為唯一之武器病而新生藥非夙制即行束手無法對付矣吾中醫既審確病之所在知其在表在裏在腑在臟屬熱屬寒是虛是實即可因證撰方使藥直抵病所故新病何名雖未確定而治之不悉無方此則中醫之所長萬非西醫所能企及雖中醫亦有成藥丸散膏丹類乎西醫之特效然所貴圓機活法在乎變通因證加減從未有執死方治活病者吾敢斷言或曰學術無國界古亦有言泰山不讓土壤河海不擇細流今爾輩中醫對於西醫學說掩耳卻走拒之惟恐不遠墨守舊法自封固步中國之醫學何能進步餘日凡是一種學術必有其根據地必有其立腳點絲毫不能遷就絲毫不能通融現在中醫以風寒暑濕燥火為外感病之總因愛惡悲恐驚喜怒為內傷病之總因與彼萬病由菌之說能相通否中醫以表裏虛實臟腑營衛氣血為病之所與彼某部炎某臟炎之說能相通否假使必以遷就西醫學說勾入時立案論證滿紙發炎細菌則根據盡失立腳毫無就為西醫之病名惟西藥能主治用中藥治西醫之病為西醫書所不載毫無根據此其一也而中醫書上素無發炎細菌等新奇名詞中醫方藥又從無治療此種新病之紀載試問有何根據有何把握膽敢以人為試驗品以草根樹皮醫治發炎細菌私心自用絕無師承毫無根據此又其一也論病盲從西醫處方仍用中藥治而得愈西醫定誣吾為幸中治而不愈病家定咎吾有過失試問主張學術無國界者身當其境將用何法以對付中西醫學比較中西醫學說大判天淵中醫主張六氣西醫倡言微菌一恃經驗為武器一仗科學為壁壘旗幟鮮明各不肯屈然而人同此身身同此病當病魔纏繞時呻吟床褥困苦萬狀惟冀醫者速愈吾病更無余暇管理六氣學說微菌學說之孰是孰非經驗牌子科學牌子之誰長誰短試觀一切設備極科學化之西醫西式之診室舶來之診器藥針藥水藥片藥膏無一不購自歐西或采自東瀛觀其頭銜煌煌乎博士學士聽其論文幾可推倒岐雷排斥倉扁真若可信一旦有小疾苦就使診治無不輕病變重重病變危議論與事實之不相似也形式與效果之適相反也有如此再觀中醫雖沒有西醫之神氣活現開出口來老老實實又不及西醫之大吹特吹相形之下不免有一點土氣但是他的診病目視口問耳聞指切五官並甩精神貫注十餘分鐘功夫早診察得疾苦所在使病無遁形撰方用藥君臣佐使組織得此方之藥可以直抵病所藥效捷如桴鼓使病者覆杯而愈形式上比較西醫為優治療上比較中醫為優器械上比較西醫為勝藥效上比較中醫為勝為迎合世界潮流應用西醫為配合國人體質應用中醫准諸既往逆測將來吾中醫不但暢行於中國必且普遍於全球吾敢斷言好生惡死好健康惡疾苦無古無今無中無外人同此心心同此理世界各邦見中醫之學術如此其優勝自然舍彼就此日本之復興漢醫即是鐵證再論中西醫中醫對症發藥按病定方猶之各菜館各飯莊之廚師可以憑了顧客的意志配了吃客的口味簇嶄新鮮做起菜來總使你吃的人滿意西醫診病用藥猶之各食品公司的罐頭食物雖然一般的用鴨雞魚肉一般的是葷素名肴吃在口中是否能夠人人滿意恐怕不能無問題吧食品對於口味沒甚大關係至多不過是可口不可口可口多吃些不可口少吃些獨是藥品之對於病症那就有生命出入的大關係絲毫不能通融絲毫不能遷就再有一件事中醫審定是熱症就用涼性之藥根本治療西醫審定是熱症則甩大塊寒冰冰其外面譬如救火不用水澆卻用大量冰塊圍繞火宅四周雖高疊如牆試問於宅中之火是否有絲毫影響至於假寒真熱假熱真寒認錯病證諸事我都不談吾所談者見病知源中西醫的眼光都不曾錯其治都各合法而見效已大判天淵最好請西醫諸公平心靜氣再研究我中醫書百尺竿頭更進一步則於醫術上必然大放出異樣色彩西醫諸公其有意乎企予望之論盲從西醫之害國醫界中有一股投機份子眼見這個年頭西醫十分時髦十分神氣大為社會所重視不免因羨生慕不惜降志辱身做起效顰的東施來他那種做作攢眉蹙額我見了真欲作三日嘔中醫學西醫樣抄襲西醫病名拾人唾余就顯見得中醫沒出息無志氣如果光是沒出息無志氣也還罷了那裏知道經你這麼一來就有兩種大害一種是害人一種是害己提起害人這一件事中醫的學說對於人體除肌肉腠裏骨骼毛髮之外最重要的是臟腑十二官手足十二經營衛氣血之分井營俞合之穴現在一切都不講只談那原子細胞神經淋巴腺赤血球白血球一派西醫話外人見了總以為中醫的學說靠不住所以棄此就彼自己打倒自己這是人體學說上的動搖對於疾病中醫分做內傷外感風寒暑濕燥火病之由外來者名叫六淫喜怒哀樂悲驚恐病之由內起者名叫七情再要判分寒熱表裏虛實現在一切都不講只談那某部炎某膜炎某某菌某某菌一派西醫話外人見了總以為中醫的學說靠不住所以棄此就彼自己打倒自己就是疾病學說上的動搖這是屬於害人一方的提起害己這一件事中醫斷病開方都有依據都有來歷某方專入某經某藥主治某病自神農本草經黃帝內經扁鵲難經
藥分析成分成為數種失其互相救濟之功成為偏而又偏之物偏而又偏之極點此則偏之為害偏極成毒而久服難免上癮了我們中藥就沒有此弊雞蛋搜驚小兒驚風有急慢之分急驚屬熱慢驚屬寒急驚多實慢驚多虛所以急驚之藥不能移治慢驚慢驚之藥不能移治急驚乃藥肆發售丸丹往往以一藥而統治急慢驚風真不通之論也驚風有外治一法有利無弊萬妥萬安且著效異常迅速就為小兒臟腑柔嫩投藥偶一不當其弊立見兼之不會講話身有病痛難於表示醫者之能聆音察理見貌辨色者能有幾人外治不比內服自然比較穩妥此外治法名日搜驚余得自松江病家二十年前余在松江西門外寬街章進士第設診乃病客告余者其法用雞蛋七枚加水煮之極熟煮得越老越好趁熱取一枚敲碎剝去殼在病兒身上著肉周身滾之蛋熱兒怕燙則快滾之以滾得快則皮肉可不致受燙惟滾時須從上而下即以蛋自頭部順滾至足切不可自下逆滾而上第一個蛋滾得已不熱急須換上第二個仍從第一個蛋滾法順滾勿逆第二第三繼續滾下病輕者三個蛋已愈重者須五個最重者非七個滾完不可病去與否有一證據滾過之雞蛋剝去白視其黃蛋黃有小刺密佈如楊梅刺者兒病盡在此蛋逐一剝視滾過之蛋刺少者病已輕刺無者病已盡再有一句話此種滾過之雞蛋須打之極爛棄諸路上謹防人家拾去吞食則大毒傷命變成殺命者矣論泄瀉症泄瀉這一個症原因很多有屬於寒的有屬於熱的有屬於飲食不調的內中屬寒屬熱都是間接為病只有飲食不調症是與脾胃直接為病屬寒的泄瀉就是洞瀉寒中屬熱的泄瀉就是熱急旁流屬於飲食不調的泄瀉就是食傷泄瀉分出傷脾傷胃兩種有人說泄瀉明明是腸病你們中醫偏要說它是脾胃病真沒理由泄瀉的病因為了飲食不潔帶進了微生物微生物佔據了人的胃腸潛滋暗長廣播丑類遂成此病關什麼寒呀熱呀說出這種不科學的話我回他中醫與西醫不同倘用主觀眼光看西醫之法看中醫那就大大不對胃主納腸主出脾主化西醫僅知腸胃不識脾化這是知末而不知本並且中醫最要是手足十二經臟腑十二官所以我們對於腸胃只叫陽明不稱胃腸腸胃是中醫話胃腸是西醫話所以叫陽明不叫腸胃的緣故就為陽明是經名腸與胃是腑名經病可以包腑腑病不可以包經手陽明大腸足陽明胃一稱陽明腸與胃皆在其中不但如此在經之病在腑之病也都包含在裏頭呢熱瀉寒瀉都有確實證據不能憑空捏造如何說是無關至於說西醫之微生物論我亦知道有微生物於病證亦有關係但決不敢認它為萬病之源我有一個簇嶄新鮮的老大證據舉給你看我有一個親戚豢養著兩隻猢猻那猢猻乖覺異常瞧它的知識只不過差人一等什麼都知道我那親戚愛護這兩隻猢猻也同人差不多那裏知道這兩隻猢猻竟然病起來了患的什麼病就是我標做題目的泄瀉一日一夜瀉到個幾十遍我那親戚頓時慌起來了向我求治我回說我雖是內科醫卻只會醫人不會醫獸猢猻雖是乖覺究竟不離獸類我可敬謝不敏我那親戚說人醫不肯醫獸我也不能勉強但是人與獸雖然異形究竟同是血肉之軀請你研究研究好端端的兩頭猢猻為什不約而同泄瀉起來我問他猢猻來的時光不瀉麼親戚回我不瀉我一轉念頭注意到飲食上面問他們給什麼東西讓猢猻吃親戚回我人吃什麼猢猻也吃什麼我向他笑道這就壞了可知兩猢猻的泄瀉都是你做成的親戚問我緣故我回說你不想猢猻的腸胃與人的腸胃是否相同人是吃慣熟食的粥飯魚肉猢猻是吃慣生食的鮮果乾果吃慣熟食的人一旦不食粥飯換食水果食物到肚就要水土不服變成泄瀉吃慣生食的猢猻一旦不食果子換食粥飯食物到肚也要水土不服變成泄瀉現在你盲從西醫的話說泄瀉都是為了微生物不錯微生物果然能夠致人泄瀉難道人吃了生食有微生物猴吃了熟食也會生產微生物出來不成那人無言而退泄瀉與微生物試問食慣熟食的人改食了生食水果當然未經煮熟的東西附帶進口的微生物很多很多微生物在胃腸中作怪自然釀成泄瀉猢猻食慣的是水果生食都沒有煮熟當然在未曾煮熟的水果上微生物是很多很多的照理猢猻平時就該泄瀉了為什麼倒不瀉倘說猴的生理不同乎人人的抵抗力弱猴的抵抗力強所以一般的微生物到了人的腸胃就要瀉到了猴的腸胃就不會瀉果然如此那有微生物的水果因抵抗力強而不致於泄瀉一到已經煮熟的熟食微生物都被煮死那是再穩再妥沒有的了恁是抵抗力素來薄弱的人吃下去也不會泄瀉似猴子這麼的腸胃當然不會再泄瀉那裏知道事實之證明猴子吃了熟食立刻就泄瀉敢是微生物這件東西在人依附在生食上在猴依附在熟食上不成照我們中醫看來食物進腸胃有慣與不慣的關係人慣了熟食猴慣了生食不慣就瀉慣就不瀉所以我叫那親戚只給猴生食吃禁止熟食進口親戚聽了我的話不到三天兩頭猴子就都好了所以我要虛心請教泄瀉與微生物究竟是怎麼一個問題我之中醫改良觀大家搖旗呐喊高唱中醫改良我也贊成不過我雖贊成我的觀念卻與大家稍有一點分別我雖贊成改良我卻認定是中醫良與不良全以中醫為標準中醫為歸宿中醫以外的學說中醫以外的名目不能夾入一些帶進一點倘然翻譯幾部生理書西醫病理書診斷學西藥書抄襲幾個西醫名詞就算是改良中醫天下從無如此便當的事本國數千年的學術可以把他國學說改頭換面生吞活剝一朝就算做自己的學術改良工作只可以算國文國語的西醫不能算是中醫猶之日奪的西醫用的都是日文日語日本人未嘗稱之為改良東方醫仍舊稱之為泰西醫學也如何工作才可以說是中醫改良如神農時代原恃藥性治病到黃帝時發明湯藥內經有藥方十二首改良之一也伊尹著湯液經仲景作傷寒論湯液之治大備改良之一也古時診脈手足上下遍診扁鵲改為獨取寸口成為現今之診法改良之一也孫真人著方論腳氣改良之一也劉河間主清火李東垣主補脾胃張子和主汗吐下朱丹溪主補陰改良之一也清代葉天士發明溫熱改良之一也明代張景岳主頤睥胃改良之一也俞東扶之著醫案按柯韻伯之著傷寒來蘇集鄒潤庵之著本經疏證改良之一也凡以本有之學術發揮之闡明之對勘之才是真確之改良工作叉麻雀將與著圍棋都是玩藝之一種但是本國人之對於麻雀將叉法已經數度改良如老法叉新法叉築雙層方城單層方城又有自摸和加倍贏放人和加倍輸全求人全不求人除么斷九等種種方法及日本人之圍棋著法亦與吾國少異都是自出心裁逐次改良經大眾公認為妥善未曾從撲克等法譯出參加觀於玩藝之麻雀圍棋則改良如此對於五千年學術之醫學則改良如彼豈麻雀圍棋反重於醫學歟吾中醫之在今日已否登峰造極恁何學者恁何名家不敢下此斷語則中醫之在學術界尚有問題我們既是以醫為學以醫為業則積極研究積極改良責無旁貸很該擔這一個工作只要看葉天士的言論他言溫邪上受首先犯肺逆傳心包肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異蓋傷寒之邪留戀在表然後化熱入裏溫邪則熱變最速未傳心包邪尚在肺肺主氣其合皮毛故云在表又言其病有類傷寒其驗之之法傷寒多有變證溫熱雖久在一經不移以此為辨葉天士為中醫改良名家發明溫熱之治天士之前醫家慣以傷寒法混治溫病所誤實多經天士之改良而其弊始已天士改良中醫自出心裁自打出路何嘗摸著人家屁股後面人步亦步人趨亦趨張冠李戴削足就履還要自詡為改良派之新中醫也鄒潤庵對於仲景傷寒論有真確之認識從前注傷寒論的都如宋儒之說理說來話去非不頭頭是道終嫌近乎理想未曾腳踏實地只有鄒潤庵用經學的眼光揭破傷寒底蘊鄒潤庵確是傷寒論注家之大改良者他的議論是論藥論方論病各有界限第方以一味出入而所主迥絕以羅列殊致而治效略同不從異同闡抉於何明藥性之底蘊病有絲毫變異頓別陰陽有寒熱互陳須嫻操縱不執兩端究詰如何識處方之化裁以是篇中每緣論藥竟直論方並成論病觀此就可以知道鄒先生學說了先生的傷寒通解我雖不曾看過讀了本經疏證我已經非常的滿意中醫對於內損吐血從來沒有穩妥治法只有元末明初蘇州出了一位葛可久先生對於內損症研究有紊因證立方定出治法雖然先生的方書托諸神仙多少總帶點了神話但是十首方子先後次序一絲不亂藥之配合方之組織大有巧思不愧為名作那葛可久可以算是內損症的改良家我們現在遇到病症只要辨其經是陽是陰辨其症是表是裏辨其邪是寒是熱辨其脈是實是虛就可以知道是什麼症用何治法了研究工作如是做起改良工作也如是做起改良中醫之工作中醫改良這一件事已經鬧得馬仰人翻但是良與不良從哪里鑒別改與不改從何處入手這是唱改良高調的幾位爺們很該注意的摹仿西醫影戤西醫響牌子一是沒志氣不長進二是對於中醫的根據既然喪失對西醫的根據又靠不著進退失據真是這麼做了遇見了壞人難免就要吃官司受法律的制裁所以摹仿西醫的這個念頭只好打消要自己打天下殺出一條血路呢一要有見識見識不足就難免要顛倒是非淆惑黑白二要有膽量膽量不足那裏能夠百折不撓勇往直前據我偏見對於古書須要信仰真理不要信仰古人我們研究學問的人有一個惡習慣是把真理與古人並為一談不肯分析如研究內經的往往說內經不是黃帝所作舉出證據說是十二州地名夏禹平水之後才有又說酒漿兩字禹前所無好似內經的重要在黃帝不黃帝不在真確不真確我則獨謂內經確是黃帝所作倘然不合真理我們也不能夠盲從內經確非黃帝所作但是很合真理我們也該極端信仰仲景傷寒論研究家用盡心機辨明某幾句是仲景原文某幾句是叔和改作某條該移方向前某條該退之使後吃飽了清水白米飯沒事做把這些工作來消遣依我張件條也不是我的親家王叔和也不是我的冤家究竟那一位動的筆我也不曾親眼看見我現在只要瞧他合理不合理王叔和合理我也該信仰張忡景不合理我也該駁斥古人是古人書是書理是理一一分析不得稍有含混遇到於理有未合處發生疑問便當反復推勘以求徹底如鄒潤庵之疏本草讀傷寒一字一句不肯輕易放過必求其奧必得其理這才是中醫改良工作自打天下殺開一條血路不是去依傍人家影戤人家的響牌子有意改良中醫的一位爺們就請你老人家少唱幾聲高調雪窗螢火埋頭苦干的做給我們瞧吧傷寒論之我見傷寒論是張仲景一部筆記所載六經病證都是隨筆記錄之言你看仲景講稱余宗族索多向余二百建安紀年已來猶未十稔其死亡者三分有二傷寒十居其七感往昔之淪喪傷橫夭之莫救等話就顯見得那時姓張的二百多家聚族而居十年中死亡的計算三分有二死亡的既有三分有二患病的無論如何總在三分有二之上不見得病的人個個死的傷寒死者既有十分之七那病傷寒的人無論如何總在十分之七以上不見得病的人個個死的你想十年來病傷寒的人即是這麼多古人又最重宗誼往來探病某伯某叔某哥某弟某姑某姊某嫂所病傷寒並非仲景一手診治所以有醫以丸以下之非其治也之記載仲景也不是懷技自眩之輩不過知無不言言無不盡所以有橫夭莫救之傷感意在言外隨筆記錄日子久了自然積帙成書後來王叔和是個識寶的波斯把仲景原作分經編次世界上才知道有這一部傷寒論依我叔和還是傷寒論大功臣呢傷寒論既是隨筆記錄之文可知各條自為起訖無先後次序可言又何必段段爭論這一條該在前那一條該在後呢可汗可吐可下不可汗不可吐不可下也不過是見到說到總之讀傷寒論該知實事求是因症論治不可思入微妙涉及空談伏邪論風寒暑濕之邪或由肌膚感冒或由口算吸入一觸就病的名叫暴感一樣的邪入於人身不即發作由經入絡潛伏在裏頭待時而動猶之莠民伏莽當政治嚴明時候不過是輟耕歎息機會一到他就要揭竿而起稱王作霸了所以有人問我邪是何病伏在那裏我說當他潛伏不動時仙人也瞧不透總要有些朕兆發現才能夠知道伏邪種種有伏風症有伏寒症有伏暑症有伏痰症伏有淺深或在營分或在氣分或在血分或在陽經或在陰經總之一句話伏邪症不論他所伏淺深不有外感暴觸是不會發動的總是先有暴感然後引動伏邪內應外合成為大病有極輕微的病愈治癒重就使延來名手也不能夠一掃而空都是關涉著伏邪就為伏邪病治法既不能發表又不能攻裏須要安心定志慢慢把病邪引出見景生情因症立方否則有力沒處使英雄無用武之地倘用霸藥立見變端從前扁鵲見齊桓侯望色而請治桓侯病的就是伏邪症仲景見王仲宣望色而與藥仲宣病的也是伏邪症桓侯仲宣不聽而死史冊所載非虛語也人身之六經六經是什麼東西經就是經脈人身上的脈有縱有橫橫的叫做絡脈縱的叫做經脈那經脈共有六條三條是陽經三條是陰經三陰三陽就是六經六經各有名目三陽經一是太陽二是陽明三是少陽三陰經一是太陰二是少陰三是厥陰六經的病症各各不同治法也各各不同並且講到六經的病症不運是經脈為病還有經氣為病那經氣比了經脈還要重要從前柯韻伯講六經經氣最為透切他把周朝地理來譬解他說六經猶之周朝的列國腰以上為三陽經地面三陽主外而本乎裏裏邊的心就是三陽經氣夾界的地方內由心胸外自巔頂前至額顱後至肩背下及於足內含膀胱都是太陽地面這一經統領榮衛主一身之表症猶之近邊禦敵之國內自心胸至胃及腸外自額顱由面至腹下及於足都是陽明地面這一經多氣多血統領一身的肌肉由心至咽出口頰上耳目斜至巔外自脅內屬膽都是少陽地面統領一身之腠理外鄰太陽內近陽明猶之京畿地方腰以下是三陰地面三陰經主裏不及外愎部就是三陰經夾界的地方從大腹由脾及二腹魄門為太陰地面從腹內到兩臂及膀胱溺道為少陰地面自腹內由肝上膈至心從脅肋下及小愎宗筋為厥陰地面這厥陰一經通行三焦主一身之裏症猶之周京夾鋪之國太陰陽明同居異治猶之周公召公分陝的故事少陰太陽厥陰少陽四經的部位有內外出入上下牽引之不同猶之周天子分土域民犬牙相錯的制度所以六經之經氣猶之列國之地面六經之經脈猶之周家之道路六經之病有正邪客邪合病並病屬脾屬胃者猶之寇賊充斥或在本境或在鄰國或入京師太陽經經氣地面最大內鄰少陰外鄰陽明故病都有相關者如小便不利原是膀胱為病偏偏少陰病裏頭也有小便不利症那是邪已及到太陽地界了腰痛本來是腎病偏偏太陽病也有腰痛症那是邪已到了步陰的地界了六七日不大便明明是陽明症偏偏兼有頭痛身熱那是陽明熱邪已經侵及太陽地界了頭項強痛明明是太陽病偏偏兼有鼻鳴乾嘔那是太陽風邪已經侵著陽明地界了心胸的部位明明是陽明地面偏偏又是太陽的通衢大道就為太陽主營衛心胸確是營衛的本根營與衛環周不休猶之邊邑下的吏民士卒會於京畿往來不絕即如喘而胸滿這一症確是太陽外邪進了陽明地面大大的騷擾所以稱它為太陽陽明合病倘使頭不痛項不強胸中痞硬氣衝咽喉不得息那不是邪從太陽來實是陽明實邪結於胸中猶之亂民騷聚本境而為患心為六經之主所以六經都有心煩症倘使沒有頭項強痛那麼這個煩不屬太陽沒有往來寒熱那麼這個煩不屬少陽沒有見三陰症那麼這個煩不屬三陰了所以心憒憒心怵惕心懊忄農一切的虛煩都屬陽明為的是心就住在陽明的地位陽明差不多就是京師所以心呀腹呀都在那裏邪在心症見虛煩邪在腹症見實熱就為心在上為陽屬於無形腹在下為陰屬於有形人身上的病動與心腹相關陽邪聚在心裏頭陰邪聚在腹裏頭肝為陰中之陽故能使陰邪上搏於心陽明主在裏之陽故能使陽邪下聚於腹再以兵法來譬喻用兵之要在明地形必先明乎六經之路才知賊寇所從來知道某方是某府的來路某方是某部的去路來路是邊關三陽經就是來路是外境三陰經就是去路是內域六經的來路各各不同太陽是條大路少陽是條僻路陽明是條直路那太陰是近路少陰是後路厥陰是斜路客邪多從三陽來正邪多由三陰起猶之外寇從邊關至亂民自內地生明六經的地形始得握百病之樞機詳六經的來路乃得操治病之規則以症來論傷寒是大寇病從外來中風是流寇病因旁及雜病是亂民病由中起所以治病之法第一須認明是何等之寇第二須認明由何地而起發於其境便禦之本境移禍鄰郡即兩路夾攻如邪入太陽地面即汗而散之猶之敵軍陳利兵於要害乘其未定而擊之也邪之輕者在衛分重者在營分尤重者在胸矚猶之寇淺者在關外其深者在關上尤深者在關內也所以麻黃湯為關外之師桂枝湯葛根湯為關上之師大青